    <h3 style="color:var(--rouge);margin-bottom:8px">Annuler la commande ${esc(o.num)}</h3>
    ${paidWarn}
    <p class="muted" style="margin-bottom:8px">Cette action est définitive. Une trace est conservée${o.delivered?" et le stock sera réintégré":""}.</p>
    <label>Motif de l'annulation</label>
    <select id="co-reason"><option>Erreur de saisie</option><option>Annulation client</option><option>Rupture de stock</option><option>Doublon</option><option>Litige / réclamation</option><option>Autre</option></select>
    <input id="co-reason-other" placeholder="Précisez le motif…" style="margin-top:6px;display:none">
    <div class="row" style="justify-content:flex-end;gap:8px;margin-top:16px">
      <button class="btn ghost" id="co-cancel">Retour</button>
      <button class="btn" style="background:var(--rouge)" id="co-ok">Confirmer l'annulation</button>
    </div></div></div>`;
  const sel=el("co-reason"), other=el("co-reason-other");
  sel.onchange=()=>{ other.style.display = sel.value==="Autre"?"block":"none"; };
  el("co-cancel").onclick=()=>{ el("confirm").innerHTML=""; };
  el("cobg").onclick=e=>{ if(e.target.id==="cobg") el("confirm").innerHTML=""; };
  el("co-ok").onclick=async ()=>{
    const reason = sel.value==="Autre" ? (other.value.trim()||"Autre") : sel.value;
    if(o.delivered){ o.lines.forEach(l=>{ const p=S.products.find(p=>p.id===l.productId); if(p) p.stock+=l.qty; }); }
    o.status="cancelled"; o.delivered=false; o.cancelReason=reason; o.cancelledBy=me().name; o.cancelledAt=now();
    log("Commande ANNULÉE : "+o.num+" — "+reason);
    el("confirm").innerHTML=""; await save(); render(); closeModal(); toast("Commande "+o.num+" annulée");
  };
}
window.cancelOrderWithReason = cancelOrderWithReason;
/* ===================== VAGUE 4 : FICHES PLEIN ÉCRAN (style NetSuite) ===================== */
const RECORD_TABS  = { client:"clients", order:"orders", invoice:"invoices", supplier:"suppliers", product:"products", quote:"quotes" };
const RECBACK_LABEL = { clients:"Clients", orders:"Commandes", invoices:"Factures", quotes:"Devis", suppliers:"Fournisseurs", products:"Produits", cash:"Caisse", dash:"Accueil" };
const RECGUARD = { supplier:"suppliers", quote:"orders_create" };

function parseRoute(){
  const h = (location.hash||"").replace(/^#/,"");
  const m = h.match(/^fiche\/([a-z]+)\/(.+)$/);
  if(!m) return null;
  const type = m[1]; const id = decodeURIComponent(m[2]);
  if(!(type in RECORD_TABS)) return null;
  return { type, id };
}
function recordHref(type, id){ return "#fiche/"+type+"/"+encodeURIComponent(id); }
function goRecord(type, id){
  const href = recordHref(type, id);
  if(location.hash === href){ render(); }      // déjà dessus : rafraîchir
  else location.hash = href;                    // déclenche hashchange -> render
}
function exitRecord(){
  route = null;
  if(location.hash){ try{ history.replaceState(null,"",location.pathname+location.search); }catch(e){ location.hash=""; } }
}
window.addEventListener("hashchange", ()=>{
  if(!S.users.length || !session || !me()) return;
  render();
});

/* --- coquille commune d'une fiche --- */
function recSumRows(rows){ return (rows||[]).map(r=>`<div class="recsum-row ${r.cls||""}"><span class="k">${r.k}</span><span class="val">${r.v}</span></div>`).join(""); }
function recShell(o){
  // o = {type, id, title, sub(html), status:{label,kind}, actions:[html], sections:[{title,html,collapsed}], summary:[{k,v,cls}], summaryTitle, backTab}
  const backTab = o.backTab || RECORD_TABS[o.type] || "dash";
  const backLabel = RECBACK_LABEL[backTab] || "Retour";
  const href = recordHref(o.type, o.id);
  const status = o.status ? `<span class="recstatus ${o.status.kind||""}">${esc(o.status.label)}</span>` : "";
  const actions = (o.actions||[]).join("");
  const sections = (o.sections||[]).map((s,i)=>`
    <div class="reccard ${s.collapsed?"collapsed":""}">
      <div class="reccard-h" data-sectoggle>${esc(s.title)}<span class="chev">▼</span></div>
      <div class="reccard-b">${s.html}</div>
    </div>`).join("");
  const summary = (o.summary&&o.summary.length) ? `
    <aside class="recside">
      <div class="recsum">
        <div class="recsum-h">${esc(o.summaryTitle||"Synthèse")}</div>
        <div class="recsum-b">${recSumRows(o.summary)}</div>
      </div>
    </aside>` : "";
  return `<div class="recpage">
    <div class="rectoolbar">
      <div class="rectoolbar-l">
        <button class="recback" data-recback="${backTab}">← ${esc(backLabel)}</button>
        <div class="rectitle"><div class="rectitle-main">${esc(o.title)}</div>${o.sub?`<div class="rectitle-sub">${o.sub}</div>`:""}</div>
        ${status}
      </div>
      <div class="rectoolbar-r">
        <div class="recactions">${actions}</div>
        <a class="reclink" href="${href}" target="_blank" rel="noopener" title="Ouvrir cette fiche dans un nouvel onglet">🗗 Nouvel onglet</a>
        <button class="reclink" data-reccopy="${href}" title="Copier le lien de cette fiche">🔗 Lien</button>
      </div>
    </div>
    <div class="recbody">
      <div class="recmain">${sections}</div>
      ${summary}
    </div>
  </div>`;
}

function renderRecordPage(r){
  if(RECGUARD[r.type] && !can(RECGUARD[r.type])){
    return `<div class="recpage"><div class="rectoolbar"><div class="rectoolbar-l"><button class="recback" data-recback="dash">← Accueil</button><div class="rectitle"><div class="rectitle-main">Accès non autorisé</div></div></div></div><div class="reccard"><div class="reccard-b empty">Vous n'avez pas la permission de consulter cette fiche.</div></div></div>`;
  }
  let html = null;
  if(r.type==="client") html = recClientPage(r.id);
  else if(r.type==="order"||r.type==="invoice") html = recOrderPage(r.id);
  else if(r.type==="supplier") html = recSupplierPage(r.id);
  else if(r.type==="product") html = recProductPage(r.id);
  else if(r.type==="quote") html = recQuotePage(r.id);
  if(html==null){
    return `<div class="recpage"><div class="rectoolbar"><div class="rectoolbar-l"><button class="recback" data-recback="${RECORD_TABS[r.type]||"dash"}">← Retour</button><div class="rectitle"><div class="rectitle-main">Fiche introuvable</div></div></div></div><div class="reccard"><div class="reccard-b empty">Cet enregistrement n'existe pas ou a été supprimé.</div></div></div>`;
  }
  return html;
}

/* --- COMMANDE / FACTURE --- */
function recOrderPage(id){
  const o = S.orders.find(o=>o.id===+id); if(!o) return null;
  const c = S.clients.find(c=>c.id===o.clientId)||{};
  const due = orderDue(o), paid = orderPaid(o), total = orderTotal(o);
  const overdue = o.payMode==="credit" && o.dueDate && due>0 && o.dueDate<today();
  const isInv = !!o.invoiceNum;
  let st;
  if(o.status==="cancelled") st={label:"Annulée", kind:"bad"};
  else if(isInv && due<=0) st={label:"Payée", kind:"ok"};
  else if(isInv && paid>0) st={label:"Partielle", kind:"warn"};
  else if(isInv) st={label:"Impayée", kind:"bad"};
  else if(o.delivered) st={label:"Livrée", kind:"info"};
  else st={label:"À livrer", kind:"warn"};

  const lignes = o.lines.map(l=>`<tr><td>${esc(prodName(l.productId))}</td><td class="num">${l.qty}</td><td class="num">${fmt(l.price)}</td><td class="num">${fmt(l.qty*l.price)}</td></tr>`).join("");
  const pays = (o.payments||[]).length ? o.payments.map(p=>`<tr><td>${p.date}</td><td>${esc(p.method||"—")}</td><td class="muted">${esc(p.by||"")}</td><td class="num" style="color:var(--vert)">${fmt(p.amount)}</td><td>${can("orders_pay")?`<button class="del" data-cancelpay="${p.id}" title="Annuler ce versement">✕</button>`:""}</td></tr>`).join("") : `<tr><td colspan="5" class="empty">Aucun versement.</td></tr>`;

  const infoSection = `<div class="recgrid">
    <div class="recfield"><div class="reclbl">Client</div><div class="recval"><a href="${recordHref("client",o.clientId)}" style="color:var(--bleu);font-weight:700;text-decoration:none">${esc(c.name||"—")}</a></div></div>
    <div class="recfield"><div class="reclbl">Téléphone</div><div class="recval">${esc(fullPhone(c)||"—")}</div></div>
    <div class="recfield"><div class="reclbl">Zone</div><div class="recval">${esc(c.zone||"—")}</div></div>
    <div class="recfield"><div class="reclbl">Date</div><div class="recval">${o.date||"—"}</div></div>
    <div class="recfield"><div class="reclbl">Paiement</div><div class="recval">${o.payMode==="credit"?("Crédit"+(o.dueDate?" · éch. "+o.dueDate:"")):"Comptant"} ${overdue?'<span class="badge alert">échue</span>':""}</div></div>
    <div class="recfield"><div class="reclbl">Livraison</div><div class="recval">${o.delivered?("Livrée"+(o.deliveredDate?" le "+o.deliveredDate:"")+(o.deliveredBy?" · "+esc(o.deliveredBy):"")):"Non livrée"}</div></div>
    ${isInv?`<div class="recfield"><div class="reclbl">N° de facture</div><div class="recval"><b style="color:var(--bleu)">${esc(o.invoiceNum)}</b></div></div>`:""}
    ${o.blNum?`<div class="recfield"><div class="reclbl">Bon de livraison</div><div class="recval">${esc(o.blNum)}</div></div>`:""}
    ${o.status==="cancelled"&&o.cancelReason?`<div class="recfield"><div class="reclbl">Motif d'annulation</div><div class="recval" style="color:var(--rouge)">${esc(o.cancelReason)}</div></div>`:""}
  </div>`;
  const linesSection = `<div class="tablewrap"><table><tr><th>Produit</th><th class="num">Qté</th><th class="num">P.U.</th><th class="num">Total</th></tr>${lignes}</table></div>`;
  const paysSection = `<div class="tablewrap"><table><tr><th>Date</th><th>Moyen</th><th>Par</th><th class="num">Montant</th><th></th></tr>${pays}</table></div>${due>0&&isInv?`<p class="muted" style="margin-top:8px">💰 L'encaissement des versements se fait depuis la Caisse.</p>`:""}`;

  const A=[];
  if(!o.delivered&&o.status!=="cancelled"&&can("orders_deliver")) A.push(`<button class="btn b" data-md-deliver="${o.id}">Livrer</button>`);
  if(o.status!=="cancelled"&&can("orders_edit")) A.push(`<button class="btn ghost" data-md-edit="${o.id}">✎ Modifier</button>`);
  A.push(`<button class="btn ghost" data-md-receipt="${o.id}">🧾 Reçu</button>`);
  A.push(`<button class="btn" style="background:var(--vert)" data-md-bl="${o.id}">🚚 Bon de livraison${o.blNum?" ("+esc(o.blNum)+")":""}</button>`);
  A.push(`<button class="btn b" data-md-invoice="${o.id}">📄 Facture</button>`);
  A.push(`<button class="btn ghost" data-md-invpdf="${o.id}">⬇ PDF</button>`);
  if(o.invoiceNum&&orderPaid(o)===0&&can("orders_pay")) A.push(`<button class="btn ghost" style="color:var(--rouge)" data-md-cancelinv="${o.id}">Annuler facture</button>`);
  if(o.status!=="cancelled"&&can("orders_cancel")) A.push(`<button class="btn" style="background:var(--rouge)" data-md-cancelorder="${o.id}">Annuler commande</button>`);

  const sum=[];
  if(orderTVA(o)>0){ sum.push({k:"Sous-total HT", v:fmt(orderHT(o))}); sum.push({k:"TVA ("+tvaRate()+" %)", v:fmt(orderTVA(o))}); }
  sum.push({k:"Total TTC", v:fmt(total), cls:"total"});
  sum.push({k:"Payé", v:fmt(paid), cls:"paid"});
  sum.push({k:"Reste dû", v:fmt(due), cls:"due"});

  const title = isInv ? ("Facture "+o.invoiceNum) : ("Commande "+o.num);
  const sub = isInv ? ("Commande "+esc(o.num)+" · "+esc(clientName(o.clientId))) : esc(clientName(o.clientId));
  return recShell({ type:"order", id:o.id, title, sub, status:st, actions:A, backTab:isInv?"invoices":"orders",
    sections:[ {title:"Informations principales", html:infoSection}, {title:"Articles ("+o.lines.length+")", html:linesSection}, {title:"Versements ("+(o.payments||[]).length+")", html:paysSection} ],
    summary:sum, summaryTitle:"Synthèse" });
}

/* --- CLIENT --- */
function recClientPage(id){
  const c = S.clients.find(c=>c.id===+id); if(!c) return null;
  const co = S.orders.filter(o=>o.clientId===+id && o.status!=="cancelled").sort((a,b)=>b.id-a.id);
  const delivered = co.filter(o=>o.delivered);
  const caTotal = delivered.reduce((a,o)=>a+orderTotal(o),0);
  const credit = delivered.reduce((a,o)=>a+orderDue(o),0);
  const nbCmd = co.length;
  const panier = delivered.length ? caTotal/delivered.length : 0;
  const lastDate = co[0]?co[0].date:"—";
  const overdue = co.filter(o=>o.payMode==="credit"&&o.dueDate&&orderDue(o)>0&&o.dueDate<today());
  const rows = co.length? co.map(o=>`<tr style="cursor:pointer" data-rec-order="${o.id}"><td><b>${esc(o.num)}</b></td><td>${o.date}</td><td class="num">${fmt(orderTotal(o))}</td><td class="num">${orderDue(o)?'<span style="color:var(--terra)">'+fmt(orderDue(o))+'</span>':"—"}</td><td>${deliveryLabel(o)} ${payLabel(o)}</td></tr>`).join("") : `<tr><td colspan="5" class="empty">Aucune commande.</td></tr>`;

  const canEditP = can("clients_edit")||can("clients_manage");
  const cp = c.customPrices||{};
  const keys = Object.keys(cp).filter(pid=>S.products.some(p=>p.id===+pid));
  const cpRows = keys.map(pid=>{ const p=S.products.find(p=>p.id===+pid); const cat=+p.price||0; const net=+cp[pid]; const pct=cat?Math.round((cat-net)/cat*100):0; return `<tr><td>${esc(p.name)}</td><td class="num muted">${fmt(cat)}</td><td class="num"><b style="color:var(--vert)">${fmt(net)}</b></td><td class="num">${pct>0?"−"+pct+" %":(pct<0?"+"+(-pct)+" %":"—")}</td>${canEditP?`<td><button class="del" data-cp-rm="${pid}" title="Retirer">✕</button></td>`:""}</tr>`; }).join("");
  const negSection = `${keys.length?`<div class="tablewrap"><table><tr><th>Produit</th><th class="num">Catalogue</th><th class="num">Prix négocié</th><th class="num">Écart</th>${canEditP?"<th></th>":""}</tr>${cpRows}</table></div>`:`<p class="muted" style="margin:0 0 6px">Aucun prix négocié.${canEditP?" Ajoutez-en un ci-dessous : il sera prioritaire sur la catégorie tarifaire pour ce client.":""}</p>`}
    ${canEditP&&S.products.length?`<div class="row" style="gap:6px;flex-wrap:wrap;margin-top:8px">
      <select id="cp-prod" style="flex:1;min-width:220px">${S.products.map(p=>`<option value="${p.id}">${esc(p.name)} — catalogue ${fmt(p.price)}</option>`).join("")}</select>
      <input id="cp-price" type="number" min="0" placeholder="Prix net (F)" style="width:160px">
      <button class="btn sm b" id="cp-add">Définir</button>
    </div>`:""}`;

  const infoSection = `<div class="recgrid">
    ${c.matricule?`<div class="recfield"><div class="reclbl">Matricule</div><div class="recval"><b style="color:var(--bleu)">${esc(c.matricule)}</b></div></div>`:""}
    <div class="recfield"><div class="reclbl">Type</div><div class="recval">${esc(c.type||"—")}</div></div>
    <div class="recfield"><div class="reclbl">Zone</div><div class="recval">${esc(c.zone||"—")}</div></div>
    <div class="recfield"><div class="reclbl">Téléphone</div><div class="recval">${esc(fullPhone(c)||"—")}</div></div>
    <div class="recfield"><div class="reclbl">Catégorie tarifaire</div><div class="recval"><span class="badge" style="background:var(--terra)">💳 ${esc(clientTariffLabel(c))}</span></div></div>
    <div class="recfield"><div class="reclbl">Dernière commande</div><div class="recval">${lastDate}</div></div>
  </div>
  ${overdue.length?`<div class="alertbox" style="margin-top:12px">⏰ ${overdue.length} crédit(s) échu(s) : ${overdue.map(o=>esc(o.num)+" ("+fmt(orderDue(o))+")").join(", ")}</div>`:""}`;
  const histSection = `<div class="tablewrap"><table><tr><th>N°</th><th>Date</th><th class="num">Total</th><th class="num">Dû</th><th>Statut</th></tr>${rows}</table></div>`;

  const A=[];
  if(can("orders_create")) A.push(`<button class="btn b" data-md-neworder="${c.id}">+ Nouvelle commande</button>`);
  if(c.phone) A.push(`<a class="btn" style="background:#25D366" href="https://wa.me/${esc((c.dial+c.local).replace(/[^\d]/g,""))}" target="_blank" rel="noopener">WhatsApp</a>`);
  if(canEditP) A.push(`<button class="btn ghost" data-md-cedit="${c.id}">✎ Modifier la fiche</button>`);

  const sum=[
    {k:"CA livré", v:fmt(caTotal), cls:"total"},
    {k:"Crédit en cours", v:fmt(credit), cls:"due"},
    {k:"Commandes", v:String(nbCmd)},
    {k:"Panier moyen", v:fmt(panier)},
  ];
  if(S.settings&&S.settings.loyaltyEnabled) sum.push({k:"Points fidélité ⭐", v:String(c.points||0), cls:"paid"});

  const cstatus = credit>0 ? {label:"Crédit "+fmt(credit), kind:"warn"} : {label:"À jour", kind:"ok"};
  return recShell({ type:"client", id:c.id, title:c.name, sub:`${esc(c.type||"")}${c.zone?" · "+esc(c.zone):""}`, status:cstatus, actions:A,
    sections:[ {title:"Informations principales", html:infoSection}, {title:"💠 Prix négociés (spécifiques à ce client)", html:negSection}, {title:"Historique des commandes ("+nbCmd+")", html:histSection} ],
    summary:sum, summaryTitle:"Synthèse client" });
}

/* --- PRODUIT --- */
function recProductPage(id){
  const p = S.products.find(p=>p.id===+id); if(!p) return null;
  let qtyVendue=0, caGen=0, margeGen=0; const recent=[];
  S.orders.filter(o=>o.status!=="cancelled").sort((a,b)=>b.id-a.id).forEach(o=>{
    const l=o.lines.find(l=>l.productId===+id);
    if(l){ if(o.delivered){ qtyVendue+=l.qty; caGen+=l.qty*l.price; margeGen+=l.qty*(l.price-(p.cost||0)); } if(recent.length<10) recent.push({o,l}); }
  });
  const marge = p.price-(p.cost||0);
  const margePct = p.price? Math.round(marge/p.price*100):0;
  const stockLow = p.stock<=(p.alert||0);
  const rows = recent.length? recent.map(({o,l})=>`<tr style="cursor:pointer" data-rec-order="${o.id}"><td><b>${esc(o.num)}</b></td><td>${o.date}</td><td>${esc(clientName(o.clientId))}</td><td class="num">${l.qty}</td><td class="num">${fmt(l.qty*l.price)}</td></tr>`).join("") : `<tr><td colspan="5" class="empty">Aucune vente.</td></tr>`;

  const infoSection = `${p.img?`<div style="text-align:center;margin:0 0 14px"><img src="${esc(p.img)}" style="max-width:220px;max-height:220px;border-radius:12px;border:1px solid #eee"></div>`:""}
  <div class="recgrid">
    <div class="recfield"><div class="reclbl">Famille</div><div class="recval">${esc(p.family||"—")}</div></div>
    <div class="recfield"><div class="reclbl">Prix de vente</div><div class="recval"><b style="color:var(--bleu)">${fmt(p.price)}</b></div></div>
    <div class="recfield"><div class="reclbl">Coût d'achat</div><div class="recval">${fmt(p.cost||0)}</div></div>
    <div class="recfield"><div class="reclbl">Marge unitaire</div><div class="recval" style="color:var(--vert)"><b>${margePct} %</b> (${fmt(marge)})</div></div>
    <div class="recfield"><div class="reclbl">Seuil d'alerte</div><div class="recval">${p.alert||0}</div></div>
  </div>
  ${stockLow?`<div class="alertbox" style="margin-top:12px">⚠ Stock bas (seuil : ${p.alert||0}). Pensez à réapprovisionner.</div>`:""}`;
  const histSection = `<div class="tablewrap"><table><tr><th>N°</th><th>Date</th><th>Client</th><th class="num">Qté</th><th class="num">Montant</th></tr>${rows}</table></div>`;

  const A=[];
  if(can("products_manage")) A.push(`<button class="btn ghost" data-md-pedit="${p.id}">✎ Modifier le produit</button>`);

  const sum=[
    {k:"En stock", v:String(p.stock), cls:stockLow?"due":""},
    {k:"Valeur du stock", v:fmt(p.stock*(p.cost||0))},
    {k:"Quantité vendue", v:String(qtyVendue)},
    {k:"CA généré", v:fmt(caGen), cls:"total"},
    {k:"Marge générée", v:fmt(margeGen), cls:"paid"},
  ];
  const pstatus = stockLow ? {label:"Stock bas", kind:"bad"} : {label:"En stock", kind:"ok"};
  return recShell({ type:"product", id:p.id, title:p.name, sub:esc(p.family||""), status:pstatus, actions:A,
    sections:[ {title:"Informations principales", html:infoSection}, {title:"Ventes récentes", html:histSection} ],
    summary:sum, summaryTitle:"Performance" });
}

/* --- DEVIS (nouvelle fiche) --- */
function recQuotePage(id){
  const q = S.quotes.find(x=>x.id===+id); if(!q) return null;
  const c = S.clients.find(c=>c.id===q.clientId)||{};
  const ttc=quoteTotal(q), tva=quoteTVA(q), ht=ttc-tva;
  const expired = q.validity && q.validity<today() && q.status!=="converti";
  let st;
  if(q.status==="converti") st={label:"Converti", kind:"ok"};
  else if(q.status==="accepté") st={label:"Accepté", kind:"info"};
  else if(q.status==="refusé") st={label:"Refusé", kind:"bad"};
  else st={label: expired?"Expiré":"En attente", kind: expired?"bad":"warn"};

  const lignes = q.lines.map(l=>`<tr><td>${esc(prodName(l.productId)||l.name||"")}</td><td class="num">${l.qty}</td><td class="num">${fmt(l.price)}</td><td class="num">${fmt(l.qty*l.price)}</td></tr>`).join("");
  const infoSection = `<div class="recgrid">
    <div class="recfield"><div class="reclbl">Client</div><div class="recval"><a href="${recordHref("client",q.clientId)}" style="color:var(--bleu);font-weight:700;text-decoration:none">${esc(c.name||"—")}</a></div></div>
    <div class="recfield"><div class="reclbl">Date</div><div class="recval">${frDate(q.date)}</div></div>
    <div class="recfield"><div class="reclbl">Validité</div><div class="recval" style="${expired?"color:var(--rouge)":""}">${q.validity?frDate(q.validity):"—"}${expired?" (expiré)":""}</div></div>
    ${c.type?`<div class="recfield"><div class="reclbl">Type client</div><div class="recval">${esc(c.type)}</div></div>`:""}
    ${q.createdBy?`<div class="recfield"><div class="reclbl">Créé par</div><div class="recval">${esc(q.createdBy)}</div></div>`:""}
    ${(clientDiscount(c)>0||(c.customPrices&&Object.keys(c.customPrices).length))?`<div class="recfield"><div class="reclbl">Tarif client</div><div class="recval"><span class="badge" style="background:var(--terra)">${esc(clientTariffLabel(c))}</span></div></div>`:""}
  </div>`;
  const linesSection = `<div class="tablewrap"><table><tr><th>Désignation</th><th class="num">Qté</th><th class="num">P.U.</th><th class="num">Montant</th></tr>${lignes}</table></div>`;

  const A=[];
  A.push(`<button class="btn ghost" data-q-pdf="${q.id}">⬇ PDF</button>`);
  if(q.status!=="converti") A.push(`<button class="btn b" data-q-conv="${q.id}">→ Convertir en commande</button>`);
  if(q.status!=="converti"&&q.status!=="accepté") A.push(`<button class="btn" style="background:var(--vert)" data-q-accept="${q.id}">✓ Marquer accepté</button>`);

  const sum=[];
  if(tva>0){ sum.push({k:"Sous-total HT", v:fmt(ht)}); sum.push({k:"TVA ("+tvaRate()+" %)", v:fmt(tva)}); }
  sum.push({k:"Total TTC", v:fmt(ttc), cls:"total"});
  return recShell({ type:"quote", id:q.id, title:"Devis "+q.num, sub:esc(clientName(q.clientId)), status:st, actions:A,
    sections:[ {title:"Informations principales", html:infoSection}, {title:"Lignes du devis ("+q.lines.length+")", html:linesSection} ],
    summary:sum, summaryTitle:"Synthèse devis" });
}

/* --- liaisons des fiches plein écran --- */
function bindRecordPage(r){
  const root = el("root");
  const Q  = sel => root.querySelector(sel);
  const QA = sel => root.querySelectorAll(sel);

  const bk = Q("[data-recback]"); if(bk) bk.onclick=()=>{ const t=bk.dataset.recback||"dash"; exitRecord(); tab=t; searchQ=""; render(); window.scrollTo(0,0); };
  QA("[data-sectoggle]").forEach(h=> h.onclick=()=>{ const card=h.closest(".reccard"); if(card) card.classList.toggle("collapsed"); });
  const cpL = Q("[data-reccopy]"); if(cpL) cpL.onclick=()=>{
    const url = location.origin + location.pathname + cpL.dataset.reccopy;
    const ok = ()=> toast("Lien copié ✓");
    const fb = ()=>{ const t=document.createElement("textarea"); t.value=url; t.style.position="fixed"; t.style.opacity="0"; document.body.appendChild(t); t.select(); try{document.execCommand("copy");}catch(e){} t.remove(); ok(); };
    if(navigator.clipboard&&navigator.clipboard.writeText) navigator.clipboard.writeText(url).then(ok).catch(fb); else fb();
  };
  QA("[data-rec-order]").forEach(row=> row.onclick=()=> goRecord("order", +row.dataset.recOrder));

  // COMMANDE / FACTURE
  const o = S.orders.find(x=>x.id===+r.id);
  if(o){
    if(Q("[data-md-deliver]")) Q("[data-md-deliver]").onclick=()=>{ confirmAction({title:"Confirmer la livraison", message:`Marquer la commande <b>${esc(o.num)}</b> comme livrée à <b>${esc(clientName(o.clientId))}</b> ?<br><br>Le stock sera décrémenté. Le paiement se fera ensuite à la Caisse.`, okLabel:"Oui, livrer"}, ()=>{ deliverOrder(o.id); }); };
    if(Q("[data-md-edit]")) Q("[data-md-edit]").onclick=()=>{ exitRecord(); startEditOrder(o.id); };
    if(Q("[data-md-receipt]")) Q("[data-md-receipt]").onclick=()=>{ printHTML(orderReceiptHTML(o)); };
    if(Q("[data-md-bl]")) Q("[data-md-bl]").onclick=async ()=>{ await issueDeliveryNote(o.id); render(); };
    if(Q("[data-md-invoice]")) Q("[data-md-invoice]").onclick=async ()=>{ assignInvoiceNum(o); await save(); render(); toast("Facture "+o.invoiceNum+" générée ✓ — encaissement à la Caisse"); printHTML(invoiceHTML(o)); };
    if(Q("[data-md-invpdf]")) Q("[data-md-invpdf]").onclick=async ()=>{ assignInvoiceNum(o); await save(); render(); downloadInvoicePDF(o); };
    if(Q("[data-md-cancelinv]")) Q("[data-md-cancelinv]").onclick=()=> cancelInvoice(o.id);
    if(Q("[data-md-cancelorder]")) Q("[data-md-cancelorder]").onclick=()=> cancelOrderWithReason(o.id);
    QA("[data-cancelpay]").forEach(b=> b.onclick=()=> cancelPayment(o.id, +b.dataset.cancelpay));
  }

  // CLIENT
  const c = S.clients.find(x=>x.id===+r.id);
  const no=Q("[data-md-neworder]"); if(no) no.onclick=()=>{ exitRecord(); startNewOrderFor(+no.dataset.mdNeworder); };
  const ce=Q("[data-md-cedit]"); if(ce) ce.onclick=()=>{ exitRecord(); editClientId=+ce.dataset.mdCedit; tab="clients"; render(); window.scrollTo(0,0); };
  const cpAdd=Q("#cp-add"); if(cpAdd) cpAdd.onclick=async ()=>{
    const pid=+el("cp-prod").value; const price=+el("cp-price").value;
    if(!pid||!(price>0)) return toast("Choisissez un produit et un prix valide");
    if(c){ c.customPrices=c.customPrices||{}; c.customPrices[pid]=Math.round(price); log("Prix négocié : "+(S.products.find(p=>p.id===pid)?.name||"")+" → "+fmt(price)+" ("+c.name+")"); await save(); render(); }
  };
  QA("[data-cp-rm]").forEach(b=> b.onclick=async ()=>{ const pid=b.dataset.cpRm; if(c&&c.customPrices) delete c.customPrices[pid]; log("Prix négocié retiré ("+(c?c.name:"")+")"); await save(); render(); });

  // FOURNISSEUR
  const se=Q("[data-md-sedit]"); if(se) se.onclick=()=>{ exitRecord(); editSupplierId=+se.dataset.mdSedit; tab="suppliers"; render(); window.scrollTo(0,0); };

  // PRODUIT
  const pe=Q("[data-md-pedit]"); if(pe) pe.onclick=()=>{ exitRecord(); tab="products"; render(); window.scrollTo(0,0); };

  // DEVIS
  const qp=Q("[data-q-pdf]"); if(qp) qp.onclick=()=>{ const q=S.quotes.find(x=>x.id===+qp.dataset.qPdf); if(q) downloadQuotePDF(q); };
  const qc=Q("[data-q-conv]"); if(qc) qc.onclick=()=>{ const id=+qc.dataset.qConv; exitRecord(); tab="orders"; convertQuoteToOrder(id); };
  const qa=Q("[data-q-accept]"); if(qa) qa.onclick=async ()=>{ const q=S.quotes.find(x=>x.id===+qa.dataset.qAccept); if(q){ q.status="accepté"; log("Devis accepté : "+q.num); await save(); render(); toast("Devis marqué accepté ✓"); } };
}

function openClientDetail(id){
  if(!isMobileG()){ goRecord("client", id); return; }
  const c = S.clients.find(c=>c.id===id); if(!c) return;
  const co = S.orders.filter(o=>o.clientId===id && o.status!=="cancelled").sort((a,b)=>b.id-a.id);
  const caTotal = co.filter(o=>o.delivered).reduce((a,o)=>a+orderTotal(o),0);
  const credit = co.filter(o=>o.delivered).reduce((a,o)=>a+orderDue(o),0);
  const nbCmd = co.length;
  const panier = nbCmd? caTotal/co.filter(o=>o.delivered).length||0 : 0;
  const lastDate = co[0]?co[0].date:"—";
  const overdue = co.filter(o=>o.payMode==="credit"&&o.dueDate&&orderDue(o)>0&&o.dueDate<today());
  const rows = co.length? co.map(o=>`<tr style="cursor:pointer" data-md-order="${o.id}"><td><b>${esc(o.num)}</b></td><td>${o.date}</td><td class="num">${fmt(orderTotal(o))}</td><td class="num">${orderDue(o)?'<span style="color:var(--terra)">'+fmt(orderDue(o))+'</span>':"—"}</td><td>${deliveryLabel(o)} ${payLabel(o)}</td></tr>`).join("") : `<tr><td colspan="5" class="empty">Aucune commande.</td></tr>`;

    c.customPrices=c.customPrices||{}; c.customPrices[pid]=Math.round(price);

    await save(); openClientDetail(id);
  };
  el("modal").querySelectorAll("[data-cp-rm]").forEach(b=> b.onclick=async ()=>{ const pid=b.dataset.cpRm; if(c.customPrices) delete c.customPrices[pid]; log("Prix négocié retiré ("+c.name+")"); await save(); openClientDetail(id); });
}

function openSupplierDetail(id){
  if(!isMobileG()){ goRecord("supplier", id); return; }
  const s = S.suppliers.find(s=>s.id===id); if(!s) return;
  const pu = S.purchases.filter(p=>p.supplierId===id).sort((a,b)=>b.id-a.id);

function openProductDetail(id){
  if(!isMobileG()){ goRecord("product", id); return; }
  const p = S.products.find(p=>p.id===id); if(!p) return;
  // ventes de ce produit (commandes livrées non annulées)
  const live = S.orders.filter(o=>o.status!=="cancelled" && o.delivered);
  let qtyVendue=0, caGen=0, margeGen=0;
  const recent=[];
  S.orders.filter(o=>o.status!=="cancelled").sort((a,b)=>b.id-a.id).forEach(o=>{
    const l=o.lines.find(l=>l.productId===id);
    if(l){ if(o.delivered){ qtyVendue+=l.qty; caGen+=l.qty*l.price; margeGen+=l.qty*(l.price-(p.cost||0)); }
      if(recent.length<8) recent.push({o,l}); }
  });
  const marge = p.price-(p.cost||0);
  const margePct = p.price? Math.round(marge/p.price*100):0;
  const stockLow = p.stock<=(p.alert||0);
  const rows = recent.length? recent.map(({o,l})=>`<tr style="cursor:pointer" data-md-order="${o.id}"><td><b>${esc(o.num)}</b></td><td>${o.date}</td><td>${esc(clientName(o.clientId))}</td><td class="num">${l.qty}</td><td class="num">${fmt(l.qty*l.price)}</td></tr>`).join("") : `<tr><td colspan="5" class="empty">Aucune vente.</td></tr>`;
  openModal(`<div class="row" style="justify-content:space-between"><h3>${esc(p.name)}</h3><button class="x" onclick="closeModal()">×</button></div>
    ${p.img?`<div style="text-align:center;margin:8px 0"><img src="${p.img}" style="max-width:200px;max-height:200px;border-radius:12px;border:1px solid #eee"></div>`:""}
    <p class="muted">${esc(p.family||"—")}</p>
    <div class="cards" style="margin:10px 0">
      <div class="card ${stockLow?'t':''}"><div class="v" style="font-size:16px">${p.stock}</div><div class="l">En stock${stockLow?" ⚠":""}</div></div>
      <div class="card"><div class="v" style="font-size:16px">${fmt(p.price)}</div><div class="l">Prix de vente</div></div>
      <div class="card"><div class="v" style="font-size:16px">${fmt(p.cost||0)}</div><div class="l">Coût d'achat</div></div>
      <div class="card g"><div class="v" style="font-size:16px">${margePct}%</div><div class="l">Marge unitaire</div></div>
    </div>
    <div class="cards" style="margin-bottom:6px">
      <div class="card"><div class="v" style="font-size:16px">${qtyVendue}</div><div class="l">Quantité vendue</div></div>
      <div class="card"><div class="v" style="font-size:16px">${fmt(caGen)}</div><div class="l">CA généré</div></div>
      <div class="card g"><div class="v" style="font-size:16px">${fmt(margeGen)}</div><div class="l">Marge générée</div></div>
      <div class="card"><div class="v" style="font-size:16px">${fmt(p.stock*(p.cost||0))}</div><div class="l">Valeur du stock</div></div>
    </div>
    ${stockLow?`<div class="alertbox">⚠ Stock bas (seuil d'alerte : ${p.alert||0}). Pensez à réapprovisionner.</div>`:""}
    <h4 style="margin:8px 0 4px;color:var(--bleu)">Ventes récentes</h4>
    <div class="tablewrap"><table><tr><th>N°</th><th>Date</th><th>Client</th><th class="num">Qté</th><th class="num">Montant</th></tr>${rows}</table></div>
    <div class="row" style="margin-top:14px">
      ${can("products_manage")?`<button class="btn ghost" data-md-pedit="${p.id}">Modifier le produit</button>`:""}
      <button class="btn ghost" onclick="closeModal()">Fermer</button>
    </div>`);
  el("modal").querySelectorAll("[data-md-order]").forEach(r=> r.onclick=()=>openOrderDetail(+r.dataset.mdOrder));

}

/* ================== MESSAGERIE (réclamations → conversation) ================== */
function openClaimThread(id){
  const c = webClaims.find(x=>x._id===id); if(!c) return;
  const replies = c.replies||[];
  const thread = `
    <div style="background:#F5F1E8;border-radius:8px;padding:10px;margin:4px 0">
      <div style="font-size:11px;color:#888">${esc(c.author_name||"Client")} · ${(c.created||"").slice(0,16).replace("T"," ")}</div>
      <div style="margin-top:3px">${esc(c.message||"")}</div>
    </div>
    ${replies.map(r=>`<div style="background:${r.from==="DISTRIVIA"?"#0F2A4A":"#F5F1E8"};color:${r.from==="DISTRIVIA"?"#fff":"#1A1A1A"};border-radius:8px;padding:10px;margin:4px 0;${r.from==="DISTRIVIA"?"margin-left:30px":"margin-right:30px"}">
      <div style="font-size:11px;opacity:.8">${esc(r.from)} · ${(r.date||"").slice(0,16).replace("T"," ")}</div>
      <div style="margin-top:3px">${esc(r.text)}</div></div>`).join("")}`;
  openModal(`<div class="row" style="justify-content:space-between"><h3>💬 ${esc(c.author_name||"Client")}</h3><button class="x" onclick="closeModal()">×</button></div>
    <p class="muted">${esc(c.type||"Message")}${c.ref?" · réf. "+esc(c.ref):""} · <span class="badge ${c.status==="resolved"?"paid":"pending"}">${c.status==="resolved"?"Traitée":"Ouverte"}</span></p>
    <div style="max-height:40vh;overflow:auto;margin:10px 0">${thread}</div>
    <label>Votre réponse</label><textarea id="cl-reply" rows="3" placeholder="Écrivez votre réponse au client..."></textarea>
    <div class="row" style="margin-top:10px">
      <button class="btn b" id="cl-send">Envoyer la réponse</button>
      <button class="btn ghost" id="cl-resolve">${c.status==="resolved"?"Rouvrir":"Marquer traitée"}</button>
      <button class="btn ghost" onclick="closeModal()">Fermer</button>
    </div>`);
  const send = el("modal").querySelector("#cl-send");
  if(send) send.onclick = async ()=>{
    const txt = el("cl-reply").value.trim(); if(!txt) return toast("Écrivez une réponse");
    const newReplies = [...(c.replies||[]), { from:"DISTRIVIA", text:txt, date:now(), by:me().name }];
    if(FB.updateDoc) await FB.updateDoc("portal_claims", c._id, { replies:newReplies, status:"answered" });
    c.replies = newReplies; c.status="answered";
    log("Réponse envoyée à "+(c.author_name||"client"));
    toast("Réponse envoyée ✓"); openClaimThread(id);
  };
  const resolve = el("modal").querySelector("#cl-resolve");
  if(resolve) resolve.onclick = async ()=>{
    const ns = c.status==="resolved" ? "pending" : "resolved";
    if(FB.updateDoc) await FB.updateDoc("portal_claims", c._id, { status:ns });
    c.status=ns; toast(ns==="resolved"?"Marquée traitée ✓":"Rouverte"); openClaimThread(id);
  };
}


/* ================== MON PROFIL (changer mot de passe) ================== */
function openProfile(){
  const u = me();
  openModal(`<div class="row" style="justify-content:space-between"><h3>Mon profil — ${esc(u.name)}</h3><button class="x" onclick="closeModal()">×</button></div>
    <p class="muted">Identifiant : <b>${esc(u.login)}</b> · Rôle : ${u.role==="admin"?"Administrateur":"Employé"}</p>
    <label>Mot de passe actuel</label><input id="pf-old" type="password" autocomplete="current-password">
    <label>Nouveau mot de passe</label><input id="pf-new" type="password" autocomplete="new-password">
    <label>Confirmer le nouveau mot de passe</label><input id="pf-new2" type="password" autocomplete="new-password">
    <div class="row" style="margin-top:14px"><button class="btn" id="pf-save">Changer mon mot de passe</button><button class="btn ghost" onclick="closeModal()">Fermer</button></div>`);
  el("pf-save").onclick = async ()=>{
    const old=el("pf-old").value, n1=el("pf-new").value, n2=el("pf-new2").value;
    const h = await sha256(u.salt+old);
    if(h!==u.hash) return toast("Mot de passe actuel incorrect");
    if(n1.length<4) return toast("Nouveau mot de passe : 4 caractères minimum");
    if(n1!==n2) return toast("Les mots de passe ne correspondent pas");
    u.salt = Math.random().toString(36).slice(2,10); u.hash = await sha256(u.salt+n1);
    log("Mot de passe changé (profil)");
    await save(); closeModal(); toast("Mot de passe mis à jour ✓");
  };
}

function pdfMoney(n){ return (Math.round(n)||0).toLocaleString("fr-FR").replace(/[\s\u202f\u00a0]/g," ")+" F"; }
// En-tête de marque DISTRIVIA dessiné dans le PDF (logo wordmark + barre terracotta)
function pdfBrandHeader(doc, opts){
  opts = opts||{};
  const W = doc.internal.pageSize.getWidth();
  const co = (S.settings && S.settings.company) || {};
  const name = co.name || "DISTRIVIA";
  // bandeau bleu nuit
  doc.setFillColor(15,42,74); doc.rect(0,0,W,26,"F");
  doc.setTextColor(255,255,255); doc.setFont("helvetica","bold"); doc.setFontSize(20);
  doc.text(name, 14, 13);
  // barre terracotta (signature)
  doc.setFillColor(200,94,45); doc.rect(14, 16, 34, 1.6, "F");
  doc.setFont("helvetica","normal"); doc.setFontSize(7); doc.setTextColor(200,210,225);
  doc.text((co.tagline||"DISTRIBUTION GROUP"), 14, 22);
  // coordonnées à droite
  doc.setFontSize(8); doc.setTextColor(220,228,238);
  const st = S.settings||{};
  const contactLine = [co.email||"", co.phone1||""].filter(Boolean).join(" · ");
  const right = [co.address||"Dakar · Sénégal", contactLine];
  if(st.ninea||st.rccm){ right.push((st.ninea?"NINEA "+st.ninea:"")+(st.ninea&&st.rccm?" · ":"")+(st.rccm?"RCCM "+st.rccm:"")); }
  right.forEach((line,i)=> doc.text(line, W-14, 9+i*4.5, {align:"right"}));
  // titre du document
  if(opts.title){
    doc.setTextColor(15,42,74); doc.setFont("helvetica","bold"); doc.setFontSize(15);
    doc.text(opts.title, 14, 38);
  }
  if(opts.subtitle){
    doc.setTextColor(120,120,120); doc.setFont("helvetica","normal"); doc.setFontSize(9);
    doc.text(opts.subtitle, 14, 44);
  }
  return opts.title ? 50 : 32;
}
function pdfFooter(doc, note){
  const W = doc.internal.pageSize.getWidth(), H = doc.internal.pageSize.getHeight();
  const co = (S.settings && S.settings.company) || {};
  doc.setDrawColor(225,221,212); doc.line(14, H-16, W-14, H-16);
  doc.setFont("helvetica","normal"); doc.setFontSize(7.5); doc.setTextColor(140,140,140);
  doc.text(note||((co.name||"DISTRIVIA")+" · "+(co.address||"Dakar, Sénégal")), 14, H-11);
  doc.text("Édité le "+frDate(today()), W-14, H-11, {align:"right"});
}
// FACTURE en PDF téléchargeable
function pdfInvoice(o){
  const { jsPDF } = window.jspdf; const doc = new jsPDF({unit:"mm",format:"a4"});
  const W = doc.internal.pageSize.getWidth();
  const c = S.clients.find(c=>c.id===o.clientId)||{};
  const num = o.invoiceNum || "—";
  const ttc=orderTotal(o), tva=orderTVA(o), ht=ttc-tva, paid=orderPaid(o), due=orderDue(o);
  pdfBrandHeader(doc, {});
  // bloc numéro facture
  doc.setFillColor(15,42,74); doc.roundedRect(W-74, 30, 60, 16, 2, 2, "F");
  doc.setTextColor(200,210,225); doc.setFontSize(7); doc.text("FACTURE", W-70, 36);
  doc.setTextColor(255,255,255); doc.setFont("helvetica","bold"); doc.setFontSize(13); doc.text(num, W-70, 43);

  doc.text("Date : "+frDate(o.date), W-14, 52, {align:"right"});
  doc.text("Réf. commande : "+(o.num||""), W-14, 57, {align:"right"});
  // client
  doc.setTextColor(140,140,140); doc.setFontSize(8); doc.text("FACTURÉ À", 14, 36);
  doc.setTextColor(26,26,26); doc.setFont("helvetica","bold"); doc.setFontSize(12);
  doc.text((c.name||"Client")+(c.matricule?"  ("+c.matricule+")":""), 14, 43);
  doc.setFont("helvetica","normal"); doc.setFontSize(9); doc.setTextColor(80,80,80);
  let cy=48; if(c.type){ doc.text(c.type, 14, cy); cy+=4.5; }
  if(c.phone){ doc.text(c.phone, 14, cy); cy+=4.5; }
  if(c.zone){ doc.text(c.zone+", Dakar", 14, cy); cy+=4.5; }
  if(c && (clientDiscount(c)>0 || (c.customPrices&&Object.keys(c.customPrices).length))){ doc.setTextColor(200,94,45); doc.setFont("helvetica","bold"); doc.setFontSize(8.5); doc.text("Tarif client : "+clientTariffLabel(c), 14, cy); cy+=5.5; doc.setFont("helvetica","normal"); doc.setTextColor(80,80,80); }
  // conditions
  doc.setTextColor(140,140,140); doc.setFontSize(8); doc.text("CONDITIONS", W-14, 64, {align:"right"});
  doc.setTextColor(60,60,60); doc.setFontSize(9);
  doc.text(o.payMode==="credit"?("Crédit"+(o.dueDate?" — échéance "+frDate(o.dueDate):"")):"Comptant", W-14, 69, {align:"right"});
  doc.text("Livraison : "+(o.delivered?"effectuée":"à venir"), W-14, 73, {align:"right"});
  // tableau lignes
  let y = Math.max(cy, 78) + 4;
  doc.setFillColor(15,42,74); doc.rect(14, y, W-28, 8, "F");
  doc.setTextColor(255,255,255); doc.setFont("helvetica","bold"); doc.setFontSize(8.5);
  doc.text("Désignation", 16, y+5.5);
  doc.text("Qté", W-78, y+5.5, {align:"right"});
  doc.text("P.U. HT", W-48, y+5.5, {align:"right"});
  doc.text("Montant HT", W-16, y+5.5, {align:"right"});
  y+=8; doc.setTextColor(40,40,40); doc.setFont("helvetica","normal"); doc.setFontSize(9);
  o.lines.forEach((l,i)=>{
    if(y>250){ doc.addPage(); y=20; }
    const lineTTC=l.qty*l.price; const puHT=tva>0?l.price/(1+tvaRate()/100):l.price; const lineHT=tva>0?lineTTC/(1+tvaRate()/100):lineTTC;
    if(i%2){ doc.setFillColor(245,241,232); doc.rect(14,y,W-28,7,"F"); }
    doc.text(String(prodName(l.productId)||l.name||"").slice(0,52), 16, y+5);
    doc.text(String(l.qty), W-78, y+5, {align:"right"});
    doc.text(pdfMoney(puHT), W-48, y+5, {align:"right"});
    doc.text(pdfMoney(lineHT), W-16, y+5, {align:"right"});
    y+=7;
  });
  // totaux
  y+=4; const bx=W-90;
  doc.setFont("helvetica","normal"); doc.setFontSize(9.5); doc.setTextColor(80,80,80);
  doc.text("Total HT", bx, y); doc.text(pdfMoney(ht), W-16, y, {align:"right"}); y+=6;
  if(tva>0){ doc.text("TVA "+tvaRate()+" %", bx, y); doc.text(pdfMoney(tva), W-16, y, {align:"right"}); y+=6; }
  else { doc.setTextColor(140,140,140); doc.text("Non assujetti à la TVA", bx, y); y+=6; }
  doc.setFillColor(245,241,232); doc.rect(bx-4, y-4.5, W-16-(bx-4)+4, 9, "F");
  doc.setFont("helvetica","bold"); doc.setFontSize(12); doc.setTextColor(15,42,74);
  doc.text("TOTAL"+(tva>0?" TTC":""), bx, y+1.5); doc.text(pdfMoney(ttc), W-16, y+1.5, {align:"right"}); y+=11;
  doc.setFontSize(9.5);
  if(paid>0){ doc.setTextColor(46,107,62); doc.setFont("helvetica","normal"); doc.text("Déjà payé", bx, y); doc.text(pdfMoney(paid), W-16, y, {align:"right"}); y+=6; }
  if(due>0){ doc.setTextColor(200,94,45); doc.setFont("helvetica","bold"); doc.text("Reste à payer", bx, y); doc.text(pdfMoney(due), W-16, y, {align:"right"}); y+=6; }
  else { doc.setTextColor(46,107,62); doc.setFont("helvetica","bold"); doc.text("✓ Facture acquittée", bx, y); y+=6; }
  // QR agent
  const qr = qrDataURL(orderTrackURL(o));
  if(qr){ try{ doc.addImage(qr, "GIF", 14, y-2, 24, 24); doc.setFontSize(7); doc.setTextColor(140,140,140); doc.setFont("helvetica","normal"); doc.text("Scan agent : facture", 14, y+25); }catch(e){} }
  // mention
  doc.setFont("helvetica","normal"); doc.setFontSize(8.5); doc.setTextColor(90,90,90);
  doc.text("Arrêtée la présente facture à la somme de "+pdfMoney(ttc)+".", 44, y+6, {maxWidth:W-58});
  doc.text("Règlement par espèces, Wave, Orange Money, virement ou chèque à l'ordre de DISTRIVIA. Merci de votre confiance.", 44, y+11, {maxWidth:W-58});
  pdfFooter(doc);
  return doc;
}

/* ============ SESSION DE CAISSE (ouverture / fermeture) ============ */
// Calcule les mouvements (encaissements/dépenses) entre ouverture et clôture d'une session
function sessionMovements(openedAt, closedAt){
  const lo = openedAt, hi = closedAt || (now().replace(" ","T")+":59");
  const within = ts => { if(!ts) return false; const t=String(ts).replace(" ","T"); return t>=String(lo).replace(" ","T") && t<=String(hi).replace(" ","T"); };
  // Les versements/dépenses portent une date (jour). On approxime via la date + on inclut tout ce qui a été saisi pendant la session.
  const ins=[], outs=[];
  S.orders.forEach(o=>(o.payments||[]).forEach(p=>{ if(within(p.ts)|| (!p.ts && withinDay(p.date,lo,hi))) ins.push({amount:p.amount, method:p.method||"Espèces", label:(o.invoiceNum||o.num)+" — "+clientName(o.clientId), by:p.by, date:p.date}); }));
  S.expenses.forEach(e=>{ if(within(e.ts) || (!e.ts && withinDay(e.date,lo,hi))) outs.push({amount:e.amount, method:e.method||"Espèces", label:e.label+" ("+e.category+")", by:e.by, date:e.date}); });
  return {ins, outs};
}
function withinDay(d, lo, hi){ if(!d) return false; const loD=String(lo).slice(0,10), hiD=String(hi).slice(0,10); return d>=loD && d<=hiD; }
function openCashSession(){
  if(!can("orders_pay")) return toast("Droit insuffisant");
  if((S.cashSessions||[]).some(s=>!s.closedAt)) return toast("Une session est déjà ouverte");
  el("confirm").innerHTML = `<div class="modalbg" id="csbg" style="z-index:120"><div class="modal" style="max-width:400px">
    <h3 style="color:var(--bleu);margin-bottom:8px">Ouvrir la caisse</h3>
    <p class="muted" style="margin-bottom:10px">Indiquez le fonds de caisse initial (espèces présentes en début de journée).</p>
    <label>Fonds de caisse initial (FCFA)</label><input id="cs-float" type="number" min="0" value="0">
    <div class="row" style="justify-content:flex-end;gap:8px;margin-top:16px">
      <button class="btn ghost" id="cs-cancel">Annuler</button>
      <button class="btn b" id="cs-ok">Ouvrir la caisse</button>
    </div></div></div>`;
  el("cs-cancel").onclick=()=>{ el("confirm").innerHTML=""; };
  el("csbg").onclick=e=>{ if(e.target.id==="csbg") el("confirm").innerHTML=""; };
  el("cs-ok").onclick=async ()=>{
    const float=Math.max(0, Math.round(+el("cs-float").value||0));
    S.cashSessions.push({ id:nid(), openedAt:now(), openedBy:me().name, openingFloat:float, closedAt:null });
    log("Caisse ouverte — fonds initial "+fmt(float));
    el("confirm").innerHTML=""; await save(); render(); toast("Caisse ouverte ✓");
  };
}
function closeCashSession(){
  if(!can("orders_pay")) return toast("Droit insuffisant");
  const s=(S.cashSessions||[]).find(x=>!x.closedAt); if(!s) return toast("Aucune session ouverte");
  const mv=sessionMovements(s.openedAt, null);
  const totalIn=mv.ins.reduce((a,m)=>a+m.amount,0), totalOut=mv.outs.reduce((a,m)=>a+m.amount,0);
  const cashIn=mv.ins.filter(m=>m.method==="Espèces").reduce((a,m)=>a+m.amount,0);
  const cashOut=mv.outs.filter(m=>m.method==="Espèces").reduce((a,m)=>a+m.amount,0);
  const theoCash=(s.openingFloat||0)+cashIn-cashOut;
  el("confirm").innerHTML = `<div class="modalbg" id="ccbg" style="z-index:120"><div class="modal" style="max-width:440px">
    <h3 style="color:var(--rouge);margin-bottom:8px">Fermer la caisse — arrêté</h3>
    <div style="background:var(--creme);border-radius:8px;padding:10px;font-size:13px;margin-bottom:10px">
      <div class="row" style="justify-content:space-between"><span>Fonds initial</span><b>${fmt(s.openingFloat||0)}</b></div>
      <div class="row" style="justify-content:space-between"><span>Encaissements espèces</span><b style="color:var(--vert)">+ ${fmt(cashIn)}</b></div>
      <div class="row" style="justify-content:space-between"><span>Dépenses espèces</span><b style="color:var(--rouge)">− ${fmt(cashOut)}</b></div>
      <div class="row" style="justify-content:space-between;border-top:1px solid #ddd;margin-top:4px;padding-top:4px"><span><b>Solde théorique espèces</b></span><b style="color:var(--bleu)">${fmt(theoCash)}</b></div>
      <div class="row" style="justify-content:space-between;font-size:12px;color:#888;margin-top:4px"><span>Wave / OM / autres encaissements</span><span>${fmt(totalIn-cashIn)}</span></div>
    </div>
    <label>Espèces réellement comptées en caisse (FCFA)</label><input id="cc-counted" type="number" min="0" value="${theoCash}">
    <div id="cc-gap" class="muted" style="font-size:13px;margin-top:6px"></div>
    <div class="row" style="justify-content:flex-end;gap:8px;margin-top:16px">
      <button class="btn ghost" id="cc-cancel">Retour</button>
      <button class="btn" style="background:var(--rouge)" id="cc-ok">Clôturer & générer l'arrêté PDF</button>
    </div></div></div>`;
  const counted=el("cc-counted"), gap=el("cc-gap");
  const showGap=()=>{ const g=(Math.round(+counted.value||0))-theoCash; gap.innerHTML = g===0?'<span style="color:var(--vert)">✓ Caisse juste, aucun écart.</span>':(g>0?'<span style="color:var(--terra)">Excédent de '+fmt(g)+'</span>':'<span style="color:var(--rouge)">Manquant de '+fmt(-g)+'</span>'); };
  counted.oninput=showGap; showGap();
  el("cc-cancel").onclick=()=>{ el("confirm").innerHTML=""; };
  el("ccbg").onclick=e=>{ if(e.target.id==="ccbg") el("confirm").innerHTML=""; };
  el("cc-ok").onclick=async ()=>{
    const countedAmount=Math.max(0,Math.round(+counted.value||0));
    s.closedAt=now(); s.closedBy=me().name; s.openingFloatSnap=s.openingFloat||0;
    s.totalIn=totalIn; s.totalOut=totalOut; s.cashIn=cashIn; s.cashOut=cashOut;
    s.expectedCash=theoCash; s.countedAmount=countedAmount; s.gap=countedAmount-theoCash;
    s.byMethodIn={}; mv.ins.forEach(m=>{ s.byMethodIn[m.method]=(s.byMethodIn[m.method]||0)+m.amount; });
    log("Caisse fermée — compté "+fmt(countedAmount)+" / théorique "+fmt(theoCash)+" (écart "+fmt(s.gap)+")");
    el("confirm").innerHTML=""; await save(); render();
    downloadCashClosingPDF(s);
    toast("Caisse clôturée ✓ — arrêté PDF généré");
  };
}

function pdfCashClosing(s){
  const { jsPDF } = window.jspdf; const doc = new jsPDF({unit:"mm",format:"a4"});

  // tableau synthèse espèces

  // autres encaissements (Wave/OM)

// Génère un QR code (image data-URL) à partir d'un texte. Vide si la lib n'est pas chargée.
function qrDataURL(text, cell){
  try{
    if(typeof qrcode==="undefined") return "";
    const qr = qrcode(0, "M"); qr.addData(text); qr.make();
    return qr.createDataURL(cell||4, 8);
  }catch(e){ console.warn("QR:", e); return ""; }
}

function frDate(d){ if(!d) return ""; const [y,m,j]=d.split("-"); return j+"/"+m+"/"+y; }
function frDateTime(dt){ if(!dt) return ""; const s=String(dt).replace("T"," "); const [d,h]=s.split(" "); return frDate(d)+(h?" à "+h.slice(0,5):""); }
function moisAnnee(d){ if(!d) return ""; const mois=["janvier","février","mars","avril","mai","juin","juillet","août","septembre","octobre","novembre","décembre"]; const [y,m]=d.split("-"); return mois[(+m)-1]+" "+y; }

function dl(filename, blob){ const a=document.createElement("a"); a.href=URL.createObjectURL(blob); a.download=filename; a.click(); }
function toCSV(rows){ return "\uFEFF"+rows.map(r=>r.map(v=>'"'+String(v??"").replace(/"/g,'""')+'"').join(";")).join("\n"); }
function exportData(kind, format, from, to){
  let rows, name;
  const inRange = d => (!from || d>=from) && (!to || d<=to);
  const periodLabel = (from||to) ? (" ("+(from||"…")+" → "+(to||"…")+")") : "";
  if(kind==="orders"){
    rows = [["N°","Date","Client","Téléphone","Produit","Qté","P.U.","Total ligne","Paiement","Échéance","Livrée","Statut","Payé (cmd)","Reste dû (cmd)"]];
    S.orders.filter(o=>inRange(o.date)).forEach(o=>{ const c=S.clients.find(c=>c.id===o.clientId)||{};
      o.lines.forEach((l,i)=> rows.push([o.num,o.date,clientName(o.clientId),c.phone||"",prodName(l.productId),l.qty,l.price,l.qty*l.price,o.payMode,o.dueDate||"",o.delivered?"Oui":"Non",o.status,i===0?orderPaid(o):"",i===0?orderDue(o):""])); });
    name="distrivia-commandes-"+today();
  } else if(kind==="clients"){
    rows = [["Nom","Type","Zone","Téléphone","CA total","Crédit en cours","Nb commandes"]];
    S.clients.forEach(c=>{ const co=S.orders.filter(o=>o.clientId===c.id&&o.status!=="cancelled");
      const ca=co.filter(o=>o.delivered).reduce((a,o)=>a+orderTotal(o),0);
      const cr=co.filter(o=>o.delivered).reduce((a,o)=>a+orderDue(o),0);
      rows.push([c.name,c.type,c.zone,c.phone,ca,cr,co.length]); });
    name="distrivia-clients-"+today();
  } else if(kind==="suppliers"){
    rows = [["Fournisseur","Pays","Contact","Téléphone","Total achats","Nb achats"]];
    S.suppliers.forEach(s=>{ const pu=S.purchases.filter(p=>p.supplierId===s.id);
      rows.push([s.name,s.country||"",s.contact||"",s.phone||"",pu.reduce((a,p)=>a+p.amount,0),pu.length]); });
    name="distrivia-fournisseurs-"+today();
  } else if(kind==="accounting"){
    const E = buildEntries(from,to);
    rows = [["Date","Journal","Pièce","Compte","Intitulé","Libellé","Débit","Crédit"]];
    E.forEach(e=>e.lines.forEach(l=> rows.push([e.date,e.journal,e.num,l.account,accName(l.account),l.label,l.debit||"",l.credit||""])));
    name="distrivia-comptabilite-"+today();
  } else if(kind==="marketing"){
    rows = [["Campagne","Canal","Cible","Début","Fin","Budget","Touchés","Conversions","Taux %","Statut","Note"]];
    S.campaigns.forEach(c=> rows.push([c.name,c.channel,c.target||"",c.start||"",c.end||"",c.budget||0,c.reached||0,c.conversions||0,(c.reached?Math.round((c.conversions||0)/c.reached*100):0),c.status,c.note||""]));
    name="distrivia-marketing-"+today();
  } else if(kind==="hr"){
    rows = [["Nom","Poste","Département","Contrat","Téléphone","Salaire","Congés (j)","Embauche","État"]];
    S.employees.forEach(e=> rows.push([e.name,e.role,e.dept,e.contract,(e.local?e.dial+" "+e.local:""),e.salary||0,e.leave||0,e.hire||"",e.active!==false?"Actif":"Inactif"]));
    name="distrivia-rh-"+today();
  } else { // cash
    rows = [["Date","Type","Libellé","Moyen","Par","Entrée","Sortie"]];
    const moves=[];
    S.orders.forEach(o=>(o.payments||[]).forEach(p=>{ if(inRange(p.date)) moves.push({date:p.date,label:"Versement "+o.num+" — "+clientName(o.clientId),method:p.method||"",by:p.by,in:p.amount,out:0}); }));
    S.expenses.forEach(e=>{ if(inRange(e.date)) moves.push({date:e.date,label:e.label+" ("+e.category+")",method:e.method||"",by:e.by,in:0,out:e.amount}); });
    moves.sort((a,b)=> a.date<b.date?-1:1);
    moves.forEach(m=>rows.push([m.date, m.in?"Encaissement":"Dépense", m.label, m.method, m.by||"", m.in||"", m.out||""]));
    name="distrivia-caisse-"+today();
  }
  const titles = {orders:"Export des commandes",clients:"Base clientèle",suppliers:"Fournisseurs & achats",accounting:"Comptabilité SYSCOHADA",marketing:"Campagnes marketing",hr:"Ressources humaines",cash:"Brouillard de caisse"};
  if(format==="csv"){ dl(name+".csv", new Blob([toCSV(rows)],{type:"text/csv"})); log("Export CSV : "+kind); }
  else if(format==="xlsx"){
    const ws = XLSX.utils.aoa_to_sheet(rows); const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, kind.slice(0,28)); XLSX.writeFile(wb, name+".xlsx"); log("Export Excel : "+kind);
  } else { // pdf
    const { jsPDF } = window.jspdf; const doc = new jsPDF({orientation:"landscape", unit:"mm", format:"a4"});
    doc.setFillColor(15,42,74); doc.rect(0,0,297,16,"F");
    doc.setTextColor(255); doc.setFont("helvetica","bold"); doc.setFontSize(13); doc.text("DISTRIVIA", 12, 11);
    doc.setFontSize(9); doc.setTextColor(200,210,225); doc.text(titles[kind]+periodLabel+" · édité le "+today(), 60, 11);
    let y=24; const head=rows[0]; const body=rows.slice(1);
    const colW = 273/head.length;
    doc.setFontSize(7); doc.setTextColor(255); doc.setFillColor(15,42,74);
    doc.rect(12,y-5,273,6,"F"); head.forEach((h,i)=>doc.text(String(h).slice(0,16), 13+i*colW, y-1));
    doc.setTextColor(30); y+=2;
    body.forEach((r,ri)=>{ if(y>195){ doc.addPage(); y=20; } if(ri%2){ doc.setFillColor(245,241,232); doc.rect(12,y-4,273,5.5,"F"); }
      r.forEach((v,i)=>{ let s=String(v??""); if(!isNaN(v)&&v!==""&&i>=5) s=Number(v).toLocaleString("fr-FR"); doc.text(s.slice(0,22), 13+i*colW, y); }); y+=5.5; });
    doc.save(name+".pdf"); log("Export PDF : "+kind);
  }
  toast("Export "+format.toUpperCase()+" généré ✓");
}

// Génère les écritures à partir des opérations (ventes, encaissements, achats, dépenses)
function buildEntries(from, to){
  const E = []; // {date, journal, num, label, lines:[{account, label, debit, credit}]}
  const inRange = d => (!from || d>=from) && (!to || d<=to);
  // Ventes (à la livraison) : 411 Clients D (TTC) / 701 Ventes C (HT) / 443 TVA facturée C
  S.orders.filter(o=>o.status!=="cancelled" && o.delivered).forEach(o=>{
    if(inRange(o.date)){
      const ttc=orderTotal(o); const tva=orderTVA(o); const ht=ttc-tva;
      const lines=[{account:"411",label:"Client "+clientName(o.clientId),debit:ttc,credit:0},
                   {account:"701",label:"Ventes marchandises",debit:0,credit:ht}];
      if(tva>0) lines.push({account:"443",label:"TVA facturée",debit:0,credit:tva});
      E.push({date:o.date, journal:"VE", num:o.num, label:"Vente "+clientName(o.clientId), lines});
    }
    // Encaissements : 521/571 D / 411 C
    (o.payments||[]).forEach(p=>{ if(inRange(p.date)){
      const acc = (p.method==="Espèces")?"571":"521";
      E.push({date:p.date, journal:acc==="571"?"CA":"BQ", num:o.num+"/P"+p.id, label:"Encaissement "+clientName(o.clientId)+" ("+(p.method||"")+")",
        lines:[{account:acc,label:p.method||"Règlement",debit:p.amount,credit:0},{account:"411",label:"Client "+clientName(o.clientId),debit:0,credit:p.amount}]});
    }});
  });
  // Achats : 601 Achats D (HT) / 445 TVA déductible D / 401 Fournisseurs C (TTC)
  S.purchases.forEach(p=>{ if(inRange(p.date)){ const s=S.suppliers.find(x=>x.id===p.supplierId);
    const tva=purchaseTVA(p); const ht=p.amount-tva;
    const lines=[{account:"601",label:"Achats marchandises",debit:ht,credit:0}];
    if(tva>0) lines.push({account:"445",label:"TVA déductible",debit:tva,credit:0});
    lines.push({account:"401",label:"Fournisseur "+(s?s.name:""),debit:0,credit:p.amount});
    E.push({date:p.date, journal:"AC", num:p.num, label:"Achat "+(s?s.name:""), lines});
  }});
  // Dépenses : 6xx D / 571 Caisse C
  const catAcc = {"Loyer":"622","Salaires":"661","Transport / carburant":"612","Achat marchandise":"601","Douane / transit":"641","Marketing":"627p","Administratif":"646","Autre":"646"};
  S.expenses.forEach(e=>{ if(inRange(e.date)){
    E.push({date:e.date, journal:"CA", num:"DEP"+e.id, label:e.label,
      lines:[{account:catAcc[e.category]||"646",label:e.label,debit:e.amount,credit:0},{account:"571",label:"Caisse",debit:0,credit:e.amount}]});
  }});
  E.sort((a,b)=> a.date<b.date?-1:1);
  return E;
}
function accName(code){ const a=COA.find(c=>c[0]===code); return a?a[1]:code; }

/* ===== Déclaration TVA ===== */
function computeTVA(from, to){
  const inRange = d => (!from || d>=from) && (!to || d<=to);
  let baseHT=0, collectee=0, ventesExo=0, deductible=0, achatsHT=0;
  S.orders.filter(o=>o.status!=="cancelled" && o.delivered && inRange(o.date)).forEach(o=>{
    const tva=orderTVA(o); const ht=orderTotal(o)-tva;
    if(tva>0){ baseHT+=ht; collectee+=tva; } else { ventesExo+=orderTotal(o); }
  });
  S.purchases.filter(p=>inRange(p.date)).forEach(p=>{
    const tva=purchaseTVA(p); deductible+=tva; achatsHT+=p.amount-tva;
  });
  const aPayer = collectee - deductible;
  return { baseHT, collectee, ventesExo, deductible, achatsHT, aPayer };
}

function pdfAccountingDoc(title, head, body, opts){

  const startX=14;
  doc.setFillColor(15,42,74); doc.rect(startX,y-5,W-28,7,"F");
  doc.setTextColor(255,255,255); doc.setFont("helvetica","bold"); doc.setFontSize(8);
  let x=startX; head.forEach((h,i)=>{ const al=opts.align&&opts.align[i]==="r"; doc.text(String(h), al?x+colW[i]-2:x+1.5, y, {align:al?"right":"left"}); x+=colW[i]; });
  y+=6; doc.setTextColor(40,40,40); doc.setFont("helvetica","normal"); doc.setFontSize(7.6);
  body.forEach((r,ri)=>{

    if(ri%2){ doc.setFillColor(245,241,232); doc.rect(startX,y-3.6,W-28,5.2,"F"); }
    if(r.__bold){ doc.setFont("helvetica","bold"); } else { doc.setFont("helvetica","normal"); }
    x=startX; (r.cells||r).forEach((c,i)=>{ const al=opts.align&&opts.align[i]==="r"; doc.text(String(c==null?"":c).slice(0,opts.maxChars||40), al?x+colW[i]-2:x+1.5, y, {align:al?"right":"left"}); x+=colW[i]; });
    y+=5.2;
  });
  pdfFooter(doc, title+" · DISTRIVIA");
  return doc;

function closingData(from, to){
  const E=buildEntries(from,to); const bal=acctBalance(E);
  const sumClass = pref => Object.keys(bal).filter(c=>c.startsWith(pref)).reduce((a,c)=>a+(bal[c].c-bal[c].d),0); // produits = crédit
  const sumClassD = pref => Object.keys(bal).filter(c=>c.startsWith(pref)).reduce((a,c)=>a+(bal[c].d-bal[c].c),0); // charges = débit
  const inR=d=>(!from||d>=from)&&(!to||d<=to);
  const live=S.orders.filter(o=>o.status!=="cancelled"&&o.delivered&&inR(o.date));
  const ca=live.reduce((a,o)=>a+orderTotal(o),0);
  const cogs=live.reduce((a,o)=>a+(typeof orderCost==="function"?orderCost(o):0),0);
  const ventesHT=live.reduce((a,o)=>a+(orderTotal(o)-orderTVA(o)),0);
  let encaisse=0; S.orders.forEach(o=>(o.payments||[]).forEach(p=>{ if(inR(p.date)) encaisse+=p.amount; }));
  const depenses=S.expenses.filter(e=>inR(e.date)).reduce((a,e)=>a+e.amount,0);

  const chargesByCat={}; S.expenses.filter(e=>inR(e.date)).forEach(e=>{ chargesByCat[e.category||"Autre"]=(chargesByCat[e.category||"Autre"]||0)+e.amount; });
  // achats marchandises
  const achats=(S.purchases||[]).filter(p=>inR(p.date||p.created||"")).reduce((a,p)=>a+(p.amount||0),0);

  const tva=live.reduce((a,o)=>a+orderTVA(o),0);

  return {ca,ventesHT,cogs,encaisse,depenses,chargesByCat,achats,creances,tva,resultat,nbOrders:live.length,nbClients:S.clients.length};
}

// Agrège les réalisations d'un mois donné ("YYYY-MM")
function monthActuals(mk){
  const inM = d => monthKey(d)===mk;
  const live = S.orders.filter(o=>o.status!=="cancelled" && o.delivered && inM(o.date));
  const ca = live.reduce((a,o)=>a+orderTotal(o),0);
  const marge = live.reduce((a,o)=>a+orderTotal(o)-orderCost(o),0);
  const orders = live.length;
  let encaissement = 0; S.orders.forEach(o=>(o.payments||[]).forEach(p=>{ if(inM(p.date)) encaissement+=p.amount; }));
  const newClients = S.clients.filter(c=>c.created && inM(c.created)).length;
  return { ca, marge, orders, encaissement, newClients };
}
// Liste des mois couverts par la période (ou les 6 derniers si non bornée)
function periodMonths(f, t){
  const months = [];
  let start, end;
  if(f && t){ start = f.slice(0,7); end = t.slice(0,7); }
  else {
    const now = new Date(); end = now.toISOString().slice(0,7);
    const d6 = new Date(now.getFullYear(), now.getMonth()-5, 1); start = d6.toISOString().slice(0,7);
  }
  let [y,m] = start.split("-").map(Number);
  const [ey,em] = end.split("-").map(Number);
  let guard=0;
  while((y<ey || (y===ey && m<=em)) && guard++<60){ months.push(y+"-"+String(m).padStart(2,"0")); m++; if(m>12){m=1;y++;} }
  return months;
}
function varCell(actual, target){
  if(!target) return `<td class="num">${fmt(actual)}</td><td class="num muted">—</td><td class="num muted">—</td>`;
  const gap = actual-target; const pct = Math.round(actual/target*100);
  const col = pct>=100?"var(--vert)":pct>=80?"var(--terra)":"var(--rouge)";
  return `<td class="num">${fmt(actual)}</td><td class="num" style="color:${col}">${gap>=0?"+":""}${fmt(gap)}</td><td class="num"><b style="color:${col}">${pct} %</b></td>`;
}

/* ================== MONITORING — PERFORMANCE ÉQUIPE ================== */
// Calcule les performances par utilisateur (acteur) sur une période
function monitorStats(f, t){
  const inR = d => (!f||d>=f) && (!t||(d||"").slice(0,10)<=t);
  const stats = {}; // name -> {created, createdAmount, delivered, deliveredAmount, collected, ordersPaid}
  const ensure = n => stats[n] = stats[n] || {created:0, createdAmount:0, delivered:0, deliveredAmount:0, collected:0};
  S.orders.forEach(o=>{
    if(o.status==="cancelled") return;
    if(o.createdBy && inR(o.date)){ const s=ensure(o.createdBy); s.created++; s.createdAmount+=orderTotal(o); }
    if(o.delivered && o.deliveredBy && inR(o.deliveredDate||o.date)){ const s=ensure(o.deliveredBy); s.delivered++; s.deliveredAmount+=orderTotal(o); }
    (o.payments||[]).forEach(p=>{ if(p.by && inR(p.date)){ const s=ensure(p.by); s.collected+=p.amount; } });
  });
  return stats;
}
function vMonitoring(){
  const f=monitorPeriod.from, t=monitorPeriod.to;
  const stats = monitorStats(f,t);
  const names = Object.keys(stats).sort((a,b)=>stats[b].collected-stats[a].collected);
  // objectifs individuels mensuels : S.objectives.team[name] = {ca, collected, orders}
  const teamObj = (S.objectives && S.objectives.team) || {};
  const totals = names.reduce((a,n)=>{const s=stats[n];a.created+=s.created;a.createdAmount+=s.createdAmount;a.delivered+=s.delivered;a.collected+=s.collected;return a;},{created:0,createdAmount:0,delivered:0,collected:0});
  // liste des acteurs possibles = utilisateurs + employés (pour fixer objectifs)
  const actors = [...new Set([...S.users.map(u=>u.name), ...names])];
  return `

    <div class="card t"><div class="v">${fmt(totals.collected)}</div><div class="l">Total encaissé (équipe)</div></div>
  </div>

  <div class="panel"><h3>Performance par collaborateur</h3><div class="tablewrap"><table>
    <tr><th>Collaborateur</th><th class="num">Cmd créées</th><th class="num">Montant créé</th><th class="num">Cmd livrées</th><th class="num">Encaissé</th><th class="num">Objectif encaissé</th><th class="num">Atteinte</th></tr>
    ${names.length?names.map(n=>{
      const s=stats[n]; const ob=teamObj[n]||{};

      return `<tr><td><b>${esc(n)}</b></td><td class="num">${s.created}</td><td class="num">${fmt(s.createdAmount)}</td>

/* ===== IMPORT CATALOGUE (coller une liste) ===== */
function normalizeFamily(s){
  const x=(s||"").toLowerCase().trim();
  const map={
    "restauration":"Restauration & take-away","take-away":"Restauration & take-away","resto":"Restauration & take-away","restauration & take-away":"Restauration & take-away",
    "hygiène":"Hygiène & entretien","hygiene":"Hygiène & entretien","entretien":"Hygiène & entretien","hygiène & entretien":"Hygiène & entretien",
    "médical":"Médical","medical":"Médical","santé":"Médical","sante":"Médical",
    "événementiel":"Événementiel","evenementiel":"Événementiel","fête":"Événementiel",
    "écologique":"Écologique","ecologique":"Écologique","éco":"Écologique","bio":"Écologique",
    "informatique":"Consommables informatiques","consommables informatiques":"Consommables informatiques","info":"Consommables informatiques",
    "matériel de bureau":"Matériel de bureau","materiel de bureau":"Matériel de bureau","bureau":"Matériel de bureau","fourniture":"Matériel de bureau",
    "mobilier":"Mobilier de bureau","mobilier de bureau":"Mobilier de bureau"
  };
  if(map[x]) return map[x];
  // correspondance partielle
  for(const k in map){ if(x && (x.includes(k)||k.includes(x))) return map[k]; }
  return FAMILIES[0];
}
function parseNum(s){ return Math.round(parseFloat(String(s||"").replace(/[^\d.,-]/g,"").replace(/\s/g,"").replace(",","."))||0); }
function parseImport(text){
  const rows=[];
  String(text||"").split(/\r?\n/).forEach(line=>{
    if(!line.trim()) return;
    // séparateur : tabulation, point-virgule, ou virgule (mais pas la virgule des nombres)
    let parts = line.includes("\t") ? line.split("\t") : line.includes(";") ? line.split(";") : line.split(/,(?![0-9])/);
    parts = parts.map(p=>p.trim());
    const name = parts[0]; if(!name) return;
    // ignore une éventuelle ligne d'en-tête
    if(/^(nom|produit|désignation|designation)$/i.test(name)) return;
    rows.push({ name, family:normalizeFamily(parts[1]), cost:parseNum(parts[2]), price:parseNum(parts[3]), stock:parseNum(parts[4]), alert: parts[5]!==undefined&&parts[5]!==""?parseNum(parts[5]):20, img: (parts[6]!==undefined && /^https?:/i.test(parts[6].trim()))?parts[6].trim():null });
  });
  return rows;
}

    <div class="mg-sheet-sec">Toutes les sections</div>
    <div class="mg-sheet-list">
      ${items.map(k=>`<button class="mg-sheet-item" data-mggo2="${k}"><span class="mgsi-ic">${mgIco(k)}</span><span style="flex:1">${MG_LABELS[k]}</span></button>`).join("")}

      <button class="mg-sheet-item" id="mg-logout" style="color:#A33B3B"><span class="mgsi-ic">${mgIco('back')}</span><span style="flex:1">Déconnexion</span></button>
