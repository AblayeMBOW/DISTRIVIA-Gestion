<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DISTRIVIA Gestion - ERP Complet</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%230F2A4A'/%3E%3Ctext x='32' y='42' font-family='Arial,sans-serif' font-size='34' font-weight='bold' fill='white' text-anchor='middle'%3ED%3C/text%3E%3Crect x='20' y='48' width='24' height='4' fill='%23C85E2D'/%3E%3C/svg%3E">
<style>
  :root{
    --bleu:#0F2A4A; --bleu2:#1B3D63; --terra:#C85E2D; --creme:#F5F1E8;
    --anthra:#1A1A1A; --gris:#888880; --blanc:#FFFFFF; --vert:#2E6B3E; --rouge:#A33B3B;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{font-family:'Segoe UI', system-ui, -apple-system, sans-serif; background:var(--creme); color:var(--anthra); font-size:14px;}
  header{background:var(--bleu); padding:10px 18px; display:flex; align-items:center; gap:14px; flex-wrap:wrap;}
  .brand{display:flex; flex-direction:column; flex-shrink:0;}
  .wordmark{color:#fff; font-weight:800; letter-spacing:6px; font-size:19px;}
  .bar{width:70px; height:3px; background:var(--terra); margin:3px 0;}
  .sub{color:#C9D4E2; font-size:9px; letter-spacing:3px;}
  .hsearch{flex:1 1 240px; position:relative; min-width:180px;}
  .hsearch input{width:100%; padding:9px 14px 9px 34px; font-size:14px; border-radius:20px; border:none; background:#fff; color:var(--anthra);}
  .hsearch::before{content:"🔍"; position:absolute; left:11px; top:50%; transform:translateY(-50%); font-size:13px; opacity:.6;}
  .hsearch-results{position:absolute; top:42px; left:0; right:0; background:#fff; border-radius:10px; box-shadow:0 8px 30px rgba(0,0,0,.25); z-index:50; max-height:420px; overflow:auto; display:none;}
  .hsearch-results.show{display:block;}
  .hsr-cat{font-size:10px; font-weight:700; letter-spacing:1px; text-transform:uppercase; color:var(--terra); padding:8px 12px 4px;}
  .hsr-item{padding:8px 12px; border-bottom:1px solid #F0EBDF; cursor:pointer; font-size:13px; color:var(--anthra);}
  .hsr-item:hover{background:var(--creme);}
  .hsr-item b{color:var(--bleu);}
  .hsr-empty{padding:14px; color:var(--gris); font-style:italic; font-size:13px; text-align:center;}
  .uzone{display:flex; align-items:center; gap:10px; color:#C9D4E2; font-size:13px; flex-shrink:0;}
  .uzone b{color:#fff;}
  nav{display:flex; background:var(--bleu2); overflow-x:auto; -webkit-overflow-scrolling:touch; flex-wrap:wrap;}
  nav button{flex:0 0 auto; padding:11px 14px; background:none; border:none; color:#C9D4E2; font-weight:600; font-size:12px; cursor:pointer; border-bottom:3px solid transparent; white-space:nowrap;}
  nav button.active{color:#fff; border-bottom-color:var(--terra); background:rgba(255,255,255,.05);}
  main{max-width:1200px; margin:0 auto; padding:16px;}
  h2{color:var(--bleu); font-size:19px; margin:6px 0 12px; border-left:4px solid var(--terra); padding-left:12px;}
  h3{color:var(--terra); font-size:13.5px; margin:14px 0 8px; text-transform:uppercase; letter-spacing:1px;}
  .cards{display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:10px; margin-bottom:16px;}
  .card{background:#fff; border-radius:10px; padding:13px; box-shadow:0 1px 4px rgba(15,42,74,.10);}
  .card .v{font-size:20px; font-weight:800; color:var(--bleu);}
  .card .l{font-size:11.5px; color:var(--gris); margin-top:2px;}
  .card.t .v{color:var(--terra);} .card.g .v{color:var(--vert);} .card.r .v{color:var(--rouge);}
  .panel{background:#fff; border-radius:10px; padding:14px; box-shadow:0 1px 4px rgba(15,42,74,.10); margin-bottom:14px;}
  table{width:100%; border-collapse:collapse; font-size:13px;}
  th{background:var(--bleu); color:#fff; text-align:left; padding:8px; font-size:11px; letter-spacing:.5px; text-transform:uppercase;}
  td{padding:8px; border-bottom:1px solid #EDE7DA; vertical-align:middle;}
  tr:nth-child(even) td{background:#FAF7F0;}
  .num{text-align:right; font-variant-numeric:tabular-nums;}
  .btn{background:var(--terra); color:#fff; border:none; border-radius:7px; padding:9px 14px; font-weight:700; cursor:pointer; font-size:13px; transition:opacity 0.2s;}
  .btn:hover{opacity:0.85;}
  .btn.b{background:var(--bleu);} .btn.ghost{background:#EDE7DA; color:var(--bleu);}
  .btn.sm{padding:5px 9px; font-size:11px;}
  .btn:disabled{opacity:.45; cursor:not-allowed;}
  .row{display:flex; gap:8px; flex-wrap:wrap; align-items:center;}
  .grid2{display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:10px;}
  label{display:block; font-size:11px; font-weight:700; color:var(--bleu); margin:8px 0 3px; text-transform:uppercase; letter-spacing:.5px;}
  input,select,textarea{width:100%; padding:8px; border:1.5px solid #D8D2C4; border-radius:7px; font-size:13px; background:#fff;}
  input:focus,select:focus{outline:none; border-color:var(--terra);}
  .badge{display:inline-block; padding:3px 9px; border-radius:20px; font-size:10px; font-weight:700; color:#fff; white-space:nowrap;}
  .badge.pending{background:var(--gris);} .badge.delivered{background:var(--bleu);} .badge.paid{background:var(--vert);}
  .badge.alert{background:var(--rouge);} .badge.ok{background:var(--vert);} .badge.credit{background:var(--terra);}
  .badge.admin{background:var(--bleu);} .badge.emp{background:var(--gris);} .badge.off{background:var(--rouge);}
  .alertbox{background:#FCEFE7; border-left:4px solid var(--terra); padding:10px 12px; border-radius:6px; margin-bottom:10px; font-size:13px;}
  .infobox{background:#EDF2F8; border-left:4px solid var(--bleu); padding:10px 12px; border-radius:6px; margin-bottom:10px; font-size:13px;}
  .empty{color:var(--gris); font-style:italic; padding:14px; text-align:center;}
  .lines .ln{display:grid; grid-template-columns:1fr 80px 100px 30px; gap:6px; margin-bottom:6px; align-items:center;}
  .del{background:none; border:none; color:var(--rouge); font-size:17px; cursor:pointer;}
  .total{font-size:17px; font-weight:800; color:var(--bleu); text-align:right; margin-top:8px;}
  .muted{color:var(--gris); font-size:11px;}
  .tablewrap{overflow-x:auto;}
  .perms{display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:4px 14px; margin-top:6px;}
  .perms label{display:flex; align-items:center; gap:7px; text-transform:none; font-size:12px; font-weight:500; color:var(--anthra); margin:3px 0;}
  .perms input{width:auto;}
  .login{max-width:400px; margin:7vh auto; background:#fff; border-radius:12px; padding:26px; box-shadow:0 4px 18px rgba(15,42,74,.15);}
  .login .wordmark{color:var(--bleu); text-align:center; letter-spacing:7px; font-size:24px;}
  .login .bar{margin:6px auto;} .login .sub{color:var(--gris); text-align:center; letter-spacing:3px;}
  #toast{position:fixed; bottom:18px; left:50%; transform:translateX(-50%); background:var(--bleu); color:#fff; padding:10px 16px; border-radius:8px; font-weight:600; display:none; z-index:50; box-shadow:0 4px 14px rgba(0,0,0,.25); max-width:90vw; text-align:center; font-size:13px;}
  .modalbg{position:fixed; inset:0; background:rgba(15,42,74,.55); display:flex; align-items:center; justify-content:center; padding:14px; z-index:60;}
  .modal{background:#fff; border-radius:12px; padding:20px; width:100%; max-width:500px; max-height:92vh; overflow:auto; box-shadow:0 10px 40px rgba(0,0,0,.3);}
  .modal h3{margin-top:0;}
  .x{background:none; border:none; font-size:22px; color:var(--gris); cursor:pointer; line-height:1;}
  @media(max-width:560px){ .lines .ln{grid-template-columns:1fr 60px 80px 30px;} main{padding:10px;} nav button{padding:8px 10px; font-size:10px;} }
  @media print{ body *{visibility:hidden;} #printarea, #printarea *{visibility:visible;} #printarea{position:absolute; left:0; top:0; width:100%; padding:10px;} }
</style>

<body>
<div id="root"></div>
<div id="modal"></div>
<div id="printarea" style="display:none"></div>
<div id="toast"></div>

<script>
// ==================== CONSTANTES ====================
const FAMILIES = ["Restauration & take-away","Hygiène & entretien","Médical","Événementiel","Écologique","Consommables informatiques","Matériel de bureau","Mobilier de bureau"];
const CLIENT_TYPES = ["Dibiterie / gargote","Restaurant / fast-food","Traiteur / événementiel","Boulangerie","Boutique revendeuse","Clinique / pharmacie","Hôtel","Entreprise / école","Autre"];
const PERMS = [
  ["orders_create","Créer des commandes"],["orders_edit","Modifier les commandes"],["orders_cancel","Annuler les commandes"],
  ["orders_deliver","Livrer les commandes"],["orders_pay","Encaisser les paiements"],["clients_manage","Ajouter / modifier les clients"],
  ["clients_edit","Modifier les clients existants"],["products_manage","Gérer les produits et prix"],["stock_receive","Réceptionner du stock"],
  ["cash_view","Voir la caisse et les soldes"],["cash_expense","Enregistrer des dépenses"],["suppliers","Gérer les fournisseurs et achats"],
  ["accounting","Voir la comptabilité"],["control","Voir le contrôle de gestion"],["logistics","Gérer la logistique"],
  ["marketing","Voir et gérer le marketing"],["hr","Voir et gérer les RH"],["monitoring","Voir le monitoring"]
];
const COUNTRY_CODES = [
  ["+221","🇸🇳 Sénégal"],["+223","🇲🇱 Mali"],["+225","🇨🇮 Côte d'Ivoire"],["+222","🇲🇷 Mauritanie"],
  ["+224","🇬🇳 Guinée"],["+226","🇧🇫 Burkina"],["+227","🇳🇪 Niger"],["+228","🇹🇬 Togo"],["+229","🇧🇯 Bénin"],
  ["+233","🇬🇭 Ghana"],["+234","🇳🇬 Nigéria"],["+212","🇲🇦 Maroc"],["+216","🇹🇳 Tunisie"],["+33","🇫🇷 France"],
  ["+86","🇨🇳 Chine"],["+90","🇹🇷 Turquie"],["+1","🇺🇸 USA/Canada"],["+44","🇬🇧 UK"],["+971","🇦🇪 Émirats"]
];
const CHANNELS = ["WhatsApp","SMS","Facebook","Instagram","Terrain / visite","Affichage","Radio","Bouche à oreille","Autre"];
const HR_CONTRACTS = ["CDI","CDD","Stage","Prestation","Journalier"];
const HR_DEPARTMENTS = ["Direction","Commercial","Logistique","Administratif","Marketing","Livraison"];
const PAY_METHODS = ["Espèces","Wave","Orange Money","Virement bancaire","Chèque"];
const SUPPLIER_ZONES = ["Chine","Turquie","Maroc","Local Sénégal","Autre"];
const KEY = "distrivia-erp-v1";
const KEY_SESSION = "distrivia-session";

// ==================== STOCKAGE ====================
const store = {
  async get(k){ try { return localStorage.getItem(k); } catch(e){ return null; } },
  async set(k,v){ try { localStorage.setItem(k, v); } catch(e){} },
  async del(k){ try { localStorage.removeItem(k); } catch(e){} }
};

// ==================== ÉTAT ====================
let S = { version:5, users:[], products:[], clients:[], orders:[], expenses:[], suppliers:[], purchases:[], campaigns:[], employees:[], objectives:{}, logs:[], seq:1, orderSeq:1, poSeq:1 };
let session = null;
let tab = "dash";
let draft = null;
let editUserId = null, editOrder = null, editClientId = null, editSupplierId = null, editCampaignId = null, editEmployeeId = null;
let searchQ = "";
let acctPeriod = { from:"", to:"" }, ctrlPeriod = { from:"", to:"" }, cashPeriod = { from:"", to:"" }, monitorPeriod = { from:"", to:"" };

// ==================== HELPERS ====================
const fmt = n => (Math.round(n)||0).toLocaleString("fr-FR") + " F";
const today = () => new Date().toISOString().slice(0,10);
const now = () => new Date().toISOString().slice(0,16).replace("T"," ");
const monthKey = d => (d||today()).slice(0,7);
const el = id => document.getElementById(id);
const esc = s => String(s??"").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
function toast(msg){ const t = el("toast"); t.textContent = msg; t.style.display = "block"; setTimeout(()=>t.style.display="none", 2500); }
function nid(){ return S.seq++; }

// ==================== AUTH ====================
async function sha256(txt){
  if(window.crypto?.subtle){
    const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(txt));
    return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,"0")).join("");
  }
  let h=0; for(let i=0;i<txt.length;i++){ h = (h*31 + txt.charCodeAt(i))|0; } return "x"+(h>>>0).toString(16);
}
const me = () => S.users.find(u=>u.id===session?.userId) || null;
const isAdmin = () => me()?.role === "admin";
const can = p => isAdmin() || !!me()?.perms?.[p];
function log(action){ S.logs.unshift({ d: now(), u: me()?.name || "—", a: action }); if(S.logs.length>300) S.logs.length=300; }

// ==================== PERSISTANCE ====================
async function loadAll(){
  try{ const raw = await store.get(KEY); if(raw) S = JSON.parse(raw); }catch(e){}
  migrate();
  try{ const rs = await store.get(KEY_SESSION); if(rs) session = JSON.parse(rs); }catch(e){}
  if(session && !me()) session = null;
  render();
}
async function save(){ try{ await store.set(KEY, JSON.stringify(S)); }catch(e){ toast("⚠ Sauvegarde échouée"); } }
async function saveSession(){ if(session) await store.set(KEY_SESSION, JSON.stringify(session)); else await store.del(KEY_SESSION); }

function migrate(){
  if(!S.version || S.version<2){ S.version=2; S.users=S.users||[]; S.logs=S.logs||[]; S.orderSeq=S.orderSeq||1;
    (S.orders||[]).forEach(o=>{ if(!o.num) o.num="CMD-"+String(S.orderSeq++).padStart(4,"0"); if(!o.payments) o.payments=[]; }); }
  if(!S.version || S.version<3){ S.version=3; S.suppliers=S.suppliers||[]; S.purchases=S.purchases||[]; S.poSeq=S.poSeq||1;
    (S.orders||[]).forEach(o=>{ if(o.delivered===undefined) o.delivered=false; if(o.payments) o.payments.forEach(p=>{ if(!p.method) p.method="Espèces"; }); }); }
  if(!S.version || S.version<4){ S.version=4; S.campaigns=S.campaigns||[]; S.employees=S.employees||[];
    (S.clients||[]).forEach(c=>{ if(c.dial===undefined){ let raw=(c.phone||"").trim(), dial="+221", local=raw; const m=raw.match(/^(\+\d{1,4})[\s.-]*(.*)$/); if(m){ dial=m[1].replace(/\s/g,""); local=m[2]; } c.dial=dial; c.local=(local||"").replace(/[^\d]/g,""); c.phone=c.local?(c.dial+" "+c.local):""; } }); }
  if(!S.version || S.version<5){ S.version=5; S.objectives=S.objectives||{}; }
  if(S.orderSeq===undefined) S.orderSeq=(S.orders?.length||0)+1;
  if(S.poSeq===undefined) S.poSeq=(S.purchases?.length||0)+1;
}

// ==================== MÉTIER ====================
function normPhone(dial, local){ return (local||"").replace(/[^\d]/g,""); }
function fullPhone(c){ return c.local ? (c.dial+" "+c.local) : ""; }
function phoneExists(dial, local, exceptId){ const n=normPhone(dial,local); if(!n) return false; return S.clients.some(c=> c.id!==exceptId && c.dial===dial && normPhone(c.dial,c.local)===n); }

const orderTotal = o => o.lines.reduce((a,l)=>a+l.qty*l.price,0);
const orderPaid = o => (o.payments||[]).reduce((a,p)=>a+p.amount,0);
const orderDue = o => Math.max(0, orderTotal(o)-orderPaid(o));
const orderCost = o => o.lines.reduce((a,l)=>{ const p=S.products.find(p=>p.id===l.productId); return a+l.qty*(p?.cost||0); },0);
const clientName = id => S.clients.find(c=>c.id===id)?.name || "—";
const prodName = id => S.products.find(p=>p.id===id)?.name || "—";

function refreshStatus(o){ if(o.status==="cancelled") return; if(!o.delivered) o.status="pending"; else o.status=orderDue(o)<=0?"paid":"delivered"; }
function deliveryLabel(o){ if(o.status==="cancelled") return '<span class="badge off">Annulée</span>'; return o.delivered?'<span class="badge delivered">Livrée</span>':'<span class="badge pending">Non livrée</span>'; }
function payLabel(o){ if(o.status==="cancelled") return "—"; const due=orderDue(o); if(due<=0) return '<span class="badge paid">Payée</span>'; if(orderPaid(o)>0) return '<span class="badge credit">Partiel</span>'; return '<span class="badge pending">Impayée</span>'; }

function kpis(){
  const m=monthKey();
  const live=S.orders.filter(o=>o.status!=="cancelled");
  const delivered=live.filter(o=>o.status!=="pending");
  const caMonth=delivered.filter(o=>monthKey(o.date)===m).reduce((a,o)=>a+orderTotal(o),0);
  const margeMonth=delivered.filter(o=>monthKey(o.date)===m).reduce((a,o)=>a+orderTotal(o)-orderCost(o),0);
  let encMonth=0,cashIn=0;
  live.forEach(o=>(o.payments||[]).forEach(p=>{ cashIn+=p.amount; if(monthKey(p.date)===m) encMonth+=p.amount; }));
  const credit=delivered.reduce((a,o)=>a+orderDue(o),0);
  const alerts=S.products.filter(p=>p.stock<=p.alert);
  const stockValue=S.products.reduce((a,p)=>a+p.stock*p.cost,0);
  const cashOut=S.expenses.reduce((a,e)=>a+e.amount,0);
  return {caMonth,margeMonth,encMonth,credit,alerts,stockValue,solde:cashIn-cashOut};
}

// ==================== VUES ====================
function vSetup(){ return `<div class="login"><div class="wordmark">DISTRIVIA</div><div class="bar"></div><div class="sub">DISTRIBUTION GROUP</div><h2 style="text-align:center;margin-top:16px">Première utilisation</h2><p class="muted" style="text-align:center">Créez le compte administrateur.</p><label>Nom complet</label><input id="su-name" placeholder="Ex. Ablaye Mbow"><label>Identifiant</label><input id="su-login" placeholder="Ex. ablaye"><label>Mot de passe</label><input id="su-pass" type="password"><label>Confirmer</label><input id="su-pass2" type="password"><button class="btn" id="su-go" style="width:100%;margin-top:14px">Créer le compte admin</button></div>`; }
function vLogin(){ return `<div class="login"><div class="wordmark">DISTRIVIA</div><div class="bar"></div><div class="sub">DISTRIBUTION GROUP</div><h2 style="text-align:center;margin-top:16px">Connexion</h2><label>Identifiant</label><input id="lg-login"><label>Mot de passe</label><input id="lg-pass" type="password"><button class="btn" id="lg-go" style="width:100%;margin-top:14px">Se connecter</button></div>`; }

function chrome(content){
  const u=me();
  const tabs=[["dash","📊 Tableau de bord",true],["orders","📦 Commandes",true],["clients","👥 Clients",true],["products","📦 Produits",true],["suppliers","🏭 Fournisseurs",can("suppliers")],["logistics","🚚 Logistique",can("logistics")],["cash","💰 Caisse",can("cash_view")],["accounting","📈 Comptabilité",can("accounting")],["control","📊 Contrôle",can("control")],["marketing","📢 Marketing",can("marketing")],["hr","👔 RH",can("hr")],["monitoring","📉 Monitoring",can("monitoring")],["users","👤 Utilisateurs",isAdmin()],["backup","💾 Sauvegarde",isAdmin()]];
  return `<header><div class="brand"><div class="wordmark">DISTRIVIA</div><div class="bar"></div><div class="sub">DISTRIBUTION GROUP</div></div><div class="hsearch"><input id="globalsearch" placeholder="Rechercher..." value="${esc(searchQ)}"><div class="hsearch-results" id="hsearch-results"></div></div><div class="uzone"><span>👤 <b>${esc(u.name)}</b> ${u.role==="admin"?'<span class="badge admin">Admin</span>':'<span class="badge emp">Employé</span>'}</span><button class="btn sm ghost" id="myprofile">Profil</button><button class="btn sm ghost" id="logout">Déconnexion</button></div></header><nav>${tabs.filter(t=>t[2]).map(t=>`<button data-tab="${t[0]}" class="${tab===t[0]?"active":""}">${t[1]}</button>`).join("")}</nav><main>${content}</main>`;
}

function globalSearchHTML(){
  const q=searchQ.trim().toLowerCase(); if(q.length<2) return "";
  const cs=S.clients.filter(c=>c.name.toLowerCase().includes(q)).slice(0,5);
  const os=S.orders.filter(o=>o.num.toLowerCase().includes(q)).slice(0,5);
  if(!cs.length&&!os.length) return `<div class="hsr-empty">Aucun résultat</div>`;
  let h="";
  if(cs.length) h+=`<div class="hsr-cat">Clients</div>`+cs.map(c=>`<div class="hsr-item" data-goclient="${c.id}"><b>${esc(c.name)}</b> · ${esc(c.phone||"—")}</div>`).join("");
  if(os.length) h+=`<div class="hsr-cat">Commandes</div>`+os.map(o=>`<div class="hsr-item" data-goorder="${o.id}"><b>${esc(o.num)}</b> · ${esc(clientName(o.clientId))}</div>`).join("");
  return h;
}

function orderRow(o){
  const due=orderDue(o);
  let act="";
  if(o.status!=="cancelled"){
    if(!o.delivered&&can("orders_deliver")) act+=`<button class="btn sm b" data-deliver="${o.id}">Livrer</button> `;
    if(due>0&&can("orders_pay")) act+=`<button class="btn sm" data-quickpay="${o.id}">Encaisser</button> `;
    if(can("orders_edit")) act+=`<button class="btn sm ghost" data-oedit="${o.id}">Modifier</button> `;
    act+=`<button class="btn sm ghost" data-oreceipt="${o.id}">Reçu</button> `;
    if(can("orders_cancel")) act+=`<button class="btn sm" style="background:var(--rouge)" data-ocancel="${o.id}">Annuler</button>`;
  } else { act=`<span class="muted">Annulée</span>`; }

// Caisse
function vCash(){
  const payments=[];
  S.orders.forEach(o=>(o.payments||[]).forEach(p=>payments.push({date:p.date,label:`Versement ${o.num} - ${clientName(o.clientId)}`,amount:p.amount,in:true,by:p.by})));
  S.expenses.forEach(e=>payments.push({date:e.date,label:e.label,amount:e.amount,in:false,by:e.by}));
  payments.sort((a,b)=>b.date.localeCompare(a.date));
  const totalIn=payments.filter(p=>p.in).reduce((a,p)=>a+p.amount,0);
  const totalOut=payments.filter(p=>!p.in).reduce((a,p)=>a+p.amount,0);
  return `<h2>Caisse</h2><div class="cards"><div class="card g"><div class="v">${fmt(totalIn)}</div><div class="l">Encaissements</div></div><div class="card r"><div class="v">${fmt(totalOut)}</div><div class="l">Dépenses</div></div><div class="card"><div class="v">${fmt(totalIn-totalOut)}</div><div class="l">Solde</div></div></div>${can("cash_expense")?`<div class="panel"><h3>Nouvelle dépense</h3><div class="grid2"><div><label>Libellé</label><input id="e-label"></div><div><label>Catégorie</label><select id="e-cat"><option>Transport</option><option>Loyer</option><option>Salaires</option><option>Marketing</option><option>Divers</option></select></div><div><label>Montant</label><input id="e-amount" type="number" min="0"></div><div><label>Date</label><input id="e-date" type="date" value="${today()}"></div></div><button class="btn" id="e-add">Enregistrer</button></div>`:""}<div class="panel"><div class="tablewrap"><tr><th>Date</th><th>Libellé</th><th>Par</th><th class="num">Montant</th></tr>${payments.map(p=>`</tr><td class="muted">${p.date}</td><td>${esc(p.label)}</td><td class="muted">${p.by||"—"}</td><td class="num" style="color:${p.in?'var(--vert)':'var(--rouge)'}">${p.in?"+":"-"}${fmt(p.amount)}</td></tr>`).join("")}</div></div>`;
}

// Monitoring
function vMonitoring(){
  const month=monitorPeriod.from||monthKey();
  const obj=S.objectives[month]||{};

  return `<h2>Monitoring</h2><div class="panel"><div class="row"><div><label>Mois</label><input type="month" id="mo-month" value="${month}"></div><button class="btn sm" id="mo-apply">Appliquer</button></div></div><div class="grid2"><div class="panel"><h3>Objectifs pour ${month}</h3><label>CA objectif (F)</label><input id="obj-ca" type="number" value="${obj.ca||""}"><label>Commandes objectif</label><input id="obj-orders" type="number" value="${obj.orders||""}"><label>Encaissement objectif (F)</label><input id="obj-enc" type="number" value="${obj.encaissement||""}"><button class="btn" id="obj-save">Enregistrer</button></div><div class="panel"><h3>Réalisations ${month}</h3><table><tr><th>Indicateur</th><th>Réalisé</th><th>Objectif</th><th>Atteinte</th></tr><tr><td>CA</td><td class="num">${fmt(caReal)}</td><td class="num">${obj.ca?fmt(obj.ca):"—"}</td><td>${obj.ca?Math.round(caReal/obj.ca*100)+"%":"—"}</td></tr><tr><td>Commandes</td><td class="num">${ordersReal}</td><td class="num">${obj.orders||"—"}</td><td>${obj.orders?Math.round(ordersReal/obj.orders*100)+"%":"—"}</td></tr><tr><td>Encaissements</td><td class="num">${fmt(encReal)}</td><td class="num">${obj.encaissement?fmt(obj.encaissement):"—"}</td><td>${obj.encaissement?Math.round(encReal/obj.encaissement*100)+"%":"—"}</td></tr></table></div></div>`;

// ==================== RENDU ====================
function render(){
  const root=el("root");
  if(!root) return;
  if(!S.users.length){ root.innerHTML=vSetup(); bindSetup(); return; }
  if(!session){ root.innerHTML=vLogin(); bindLogin(); return; }
  const views={dash:vDash, orders:vOrders, clients:vClients, products:vProducts, suppliers:vSuppliers, logistics:vLogistics, cash:vCash, accounting:vAccounting, control:vControl, marketing:vMarketing, hr:vHR, monitoring:vMonitoring, users:vUsers, backup:vBackup};
  root.innerHTML=chrome(views[tab]());
  bindApp();
}

// ==================== BINDINGS ====================
function bindSetup(){
  el("su-go").onclick=async()=>{
    const name=el("su-name").value.trim(), login=el("su-login").value.trim().toLowerCase();
    const p1=el("su-pass").value, p2=el("su-pass2").value;
    if(!name||!login) return toast("Nom et identifiant requis");
    if(p1.length<4) return toast("Mot de passe min 4 caractères");
    if(p1!==p2) return toast("Mots de passe différents");
    const salt=Math.random().toString(36).slice(2,10);
    S.users.push({id:nid(), name, login, salt, hash:await sha256(salt+p1), role:"admin", perms:{}, active:true});
    session={userId:S.users[0].id};
    log("Compte admin créé");
    await save(); await saveSession(); render(); toast("Bienvenue "+name);
  };
}

function bindLogin(){
  const go=async()=>{
    const login=el("lg-login").value.trim().toLowerCase(), pass=el("lg-pass").value;
    const u=S.users.find(u=>u.login===login);
    if(!u) return toast("Identifiant inconnu");
    if(u.active===false) return toast("Compte désactivé");
    const h=await sha256(u.salt+pass);
    if(h!==u.hash) return toast("Mot de passe incorrect");
    session={userId:u.id};
    log("Connexion");
    await save(); await saveSession(); tab="dash"; render(); toast("Bonjour "+u.name);
  };
  el("lg-go").onclick=go;
  el("lg-pass").onkeydown=e=>{if(e.key==="Enter") go();};
}

function bindApp(){
  // Navigation
  document.querySelectorAll("nav button").forEach(b=>b.onclick=()=>{ tab=b.dataset.tab; searchQ=""; render(); });
  el("logout").onclick=async()=>{ log("Déconnexion"); await save(); session=null; await saveSession(); render(); };
  el("myprofile").onclick=()=>toast("Fonction profil à venir");
  
  // Recherche
  const gs=el("globalsearch");
  if(gs){
    gs.oninput=()=>{ searchQ=gs.value; const div=el("hsearch-results"); if(searchQ.trim().length>=2){ div.innerHTML=globalSearchHTML(); div.classList.add("show"); bindSearchItems(); }else{ div.classList.remove("show"); } };
    document.addEventListener("click",e=>{ if(!e.target.closest(".hsearch")) el("hsearch-results")?.classList.remove("show"); });
  }
  
  // Produits
  if(el("p-add")) el("p-add").onclick=async()=>{
    const name=el("p-name").value.trim(); if(!name) return toast("Nom requis");
    S.products.push({id:nid(), name, family:el("p-fam").value, cost:+el("p-cost").value||0, price:+el("p-price").value||0, stock:+el("p-stock").value||0, alert:+el("p-alert").value||20});
    log("Produit ajouté: "+name); await save(); render(); toast("Produit ajouté");
  };
  document.querySelectorAll("[data-rcv]").forEach(b=>b.onclick=async()=>{
    const id=+b.dataset.rcv, q=+el("rcv-"+id).value; if(!q) return;
    const p=S.products.find(p=>p.id===id); p.stock+=q; await save(); render(); toast("Stock +"+q);
  });
  document.querySelectorAll("[data-delp]").forEach(b=>b.onclick=async()=>{ if(confirm("Supprimer ?")){ S.products=S.products.filter(p=>p.id!==+b.dataset.delp); await save(); render(); } });
  
  // Clients
  if(el("c-add")) el("c-add").onclick=async()=>{
    const name=el("c-name").value.trim(); if(!name) return toast("Nom requis");
    const dial=el("c-dial").value, local=normPhone(dial, el("c-local").value);
    if(editClientId){
      const c=S.clients.find(c=>c.id===editClientId);
      c.name=name; c.type=el("c-type").value; c.zone=el("c-zone").value; c.dial=dial; c.local=local; c.phone=dial+" "+local;
      editClientId=null;
    }else{
      S.clients.push({id:nid(), name, type:el("c-type").value, zone:el("c-zone").value, dial, local, phone:dial+" "+local, created:today()});
    }
    await save(); render(); toast("Client enregistré");
  };
  if(el("c-cancel")) el("c-cancel").onclick=()=>{ editClientId=null; render(); };
  document.querySelectorAll("[data-cedit]").forEach(b=>b.onclick=()=>{ editClientId=+b.dataset.cedit; render(); });
  document.querySelectorAll("[data-delc]").forEach(b=>b.onclick=async()=>{ if(confirm("Supprimer ?")){ S.clients=S.clients.filter(c=>c.id!==+b.dataset.delc); await save(); render(); } });
  
  // Commandes
  if(el("o-addline")) el("o-addline").onclick=()=>{ const p=S.products[0]; if(p) draft.lines.push({productId:p.id, qty:1, price:p.price}); render(); };
  if(el("o-save")) el("o-save").onclick=async()=>{
    if(!draft.lines.length) return;
    const num="CMD-"+String(S.orderSeq++).padStart(4,"0");
    S.orders.push({id:nid(), num, date:draft.date, clientId:draft.clientId, lines:draft.lines, status:"pending", delivered:false, payments:[], createdBy:me().name});
    log("Commande créée: "+num); draft=null; await save(); render(); toast("Commande créée");
  };
  document.querySelectorAll("[data-deliver]").forEach(b=>b.onclick=async()=>{ const o=S.orders.find(o=>o.id===+b.dataset.deliver); if(o){ o.delivered=true; refreshStatus(o); await save(); render(); toast("Livré"); } });
  document.querySelectorAll("[data-quickpay]").forEach(b=>b.onclick=async()=>{ const o=S.orders.find(o=>o.id===+b.dataset.quickpay); if(o){ const due=orderDue(o); const amount=prompt("Montant à encaisser (max "+fmt(due)+")", due); if(amount){ o.payments.push({id:nid(), date:today(), amount:Math.min(due,+amount), method:"Espèces", by:me().name}); refreshStatus(o); await save(); render(); toast("Encaissement OK"); } } });
  document.querySelectorAll("[data-ocancel]").forEach(b=>b.onclick=async()=>{ const o=S.orders.find(o=>o.id===+b.dataset.ocancel); if(o&&confirm("Annuler ?")){ o.status="cancelled"; await save(); render(); toast("Annulé"); } });
  document.querySelectorAll("[data-odetail]").forEach(b=>b.onclick=()=>{ const o=S.orders.find(o=>o.id===+b.dataset.odetail); toast("Détail commande "+o.num); });
  document.querySelectorAll("[data-cdetail]").forEach(b=>b.onclick=()=>{ const c=S.clients.find(c=>c.id===+b.dataset.cdetail); toast("Fiche client "+c.name); });
  
  // Dépenses
  if(el("e-add")) el("e-add").onclick=async()=>{
    const label=el("e-label").value.trim(), amount=+el("e-amount").value;
    if(!label||!amount) return toast("Libellé et montant requis");
    S.expenses.push({id:nid(), label, category:el("e-cat").value, amount, date:el("e-date").value||today(), by:me().name});
    await save(); render(); toast("Dépense enregistrée");
  };
  
  // Fournisseurs
  if(el("s-add")) el("s-add").onclick=async()=>{
    const name=el("s-name").value.trim(); if(!name) return toast("Nom requis");
    S.suppliers.push({id:nid(), name, zone:el("s-zone").value, contact:el("s-contact").value, cat:el("s-cat").value});
    await save(); render(); toast("Fournisseur ajouté");
  };
  document.querySelectorAll("[data-sedit]").forEach(b=>b.onclick=()=>toast("Édition à venir"));
  document.querySelectorAll("[data-dels]").forEach(b=>b.onclick=async()=>{ if(confirm("Supprimer ?")){ S.suppliers=S.suppliers.filter(s=>s.id!==+b.dataset.dels); await save(); render(); } });
  
  // Monitoring
  if(el("mo-apply")) el("mo-apply").onclick=()=>{ monitorPeriod.from=el("mo-month").value; render(); };
  if(el("obj-save")) el("obj-save").onclick=async()=>{
    const month=monitorPeriod.from||monthKey();
    S.objectives[month]={ca:+el("obj-ca").value||0, orders:+el("obj-orders").value||0, encaissement:+el("obj-enc").value||0};
    await save(); render(); toast("Objectifs enregistrés");
  };
  
  // Utilisateurs
  if(el("u-save")) el("u-save").onclick=async()=>{
    const name=el("u-name").value.trim(), login=el("u-login").value.trim().toLowerCase(), role=el("u-role").value, pass=el("u-pass").value;
    if(!name||!login) return toast("Nom et identifiant requis");
    const perms={}; PERMS.forEach(([k])=>{ perms[k]=el("perm-"+k).checked; });
    if(editUserId){
      const u=S.users.find(u=>u.id===editUserId);
      u.name=name; u.role=role; u.perms=perms;
      if(pass){ if(pass.length<4) return toast("Mot de passe min 4 caractères"); u.salt=Math.random().toString(36).slice(2,10); u.hash=await sha256(u.salt+pass); }
      editUserId=null;
    }else{
      if(pass.length<4) return toast("Mot de passe min 4 caractères");
      const salt=Math.random().toString(36).slice(2,10);
      S.users.push({id:nid(), name, login, salt, hash:await sha256(salt+pass), role, perms, active:true});
    }
    await save(); render(); toast("Utilisateur enregistré");
  };
  if(el("u-cancel")) el("u-cancel").onclick=()=>{ editUserId=null; render(); };
  document.querySelectorAll("[data-uedit]").forEach(b=>b.onclick=()=>{ editUserId=+b.dataset.uedit; render(); });
  document.querySelectorAll("[data-utoggle]").forEach(b=>b.onclick=async()=>{ const u=S.users.find(u=>u.id===+b.dataset.utoggle); if(u){ u.active=!u.active; await save(); render(); } });
  
  // Sauvegarde
  if(el("bk-export")) el("bk-export").onclick=()=>{ const a=document.createElement("a"); a.href=URL.createObjectURL(new Blob([JSON.stringify(S,null,2)],{type:"application/json"})); a.download="distrivia-backup-"+today()+".json"; a.click(); };
  if(el("bk-csv")) el("bk-csv").onclick=()=>{ const rows=[["N°","Date","Client","Total","Payé","Reste"]]; S.orders.forEach(o=>rows.push([o.num,o.date,clientName(o.clientId),orderTotal(o),orderPaid(o),orderDue(o)])); const csv=rows.map(r=>r.map(v=>'"'+v+'"').join(";")).join("\n"); const a=document.createElement("a"); a.href=URL.createObjectURL(new Blob(["\uFEFF"+csv],{type:"text/csv"})); a.download="commandes-"+today()+".csv"; a.click(); };
  if(el("bk-import")) el("bk-import").onclick=()=>el("bk-file").click();
  if(el("bk-file")) el("bk-file").onchange=e=>{ const f=e.target.files[0]; if(f){ const r=new FileReader(); r.onload=async(ev)=>{ try{ const d=JSON.parse(ev.target.result); S=d; migrate(); await save(); render(); toast("Restauration OK"); }catch(e){ toast("Fichier invalide"); } }; r.readAsText(f); } };
  if(el("bk-reset")) el("bk-reset").onclick=async()=>{ if(confirm("Tout effacer ? Irréversible !")){ S={version:5, users:[], products:[], clients:[], orders:[], expenses:[], suppliers:[], purchases:[], campaigns:[], employees:[], objectives:{}, logs:[], seq:1, orderSeq:1, poSeq:1}; session=null; await save(); await saveSession(); render(); } };
}

function bindSearchItems(){
  document.querySelectorAll("[data-goclient]").forEach(it=>it.onclick=()=>{ const id=+it.dataset.goclient; searchQ=""; tab="clients"; render(); });
  document.querySelectorAll("[data-goorder]").forEach(it=>it.onclick=()=>{ const id=+it.dataset.goorder; searchQ=""; tab="orders"; render(); });
}

// ==================== LANCEMENT ====================
loadAll();
</script>
</body>
</html>
