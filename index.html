<style>
  :root{
    --bleu:#0F2A4A; --bleu2:#1B3D63; --terra:#C85E2D; --creme:#F5F1E8;
    --anthra:#1A1A1A; --gris:#888880; --blanc:#FFFFFF; --vert:#2E6B3E; --rouge:#A33B3B;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{font-family:'Segoe UI', system-ui, -apple-system, sans-serif; background:var(--creme); color:var(--anthra); font-size:15px;}
  header{background:var(--bleu); padding:10px 18px; display:flex; align-items:center; gap:14px; flex-wrap:wrap;}
  .brand{display:flex; flex-direction:column; flex-shrink:0;}
  .wordmark{color:#fff; font-weight:800; letter-spacing:6px; font-size:19px;}
  .bar{width:70px; height:3px; background:var(--terra); margin:3px 0;}
  .sub{color:#C9D4E2; font-size:9px; letter-spacing:3px;}
  .hsearch{flex:1 1 240px; position:relative; min-width:180px;}
  .hsearch input{width:100%; padding:9px 14px 9px 34px; font-size:14px; border-radius:20px; border:none; background:#fff; color:var(--anthra);}
  .hsearch::before{content:"🔍"; position:absolute; left:11px; top:50%; transform:translateY(-50%); font-size:13px; opacity:.6;}
  .hsearch-results{position:absolute; top:42px; left:0; right:0; background:#fff; border-radius:10px; box-shadow:0 8px 30px rgba(0,0,0,.25); z-index:50; max-height:420px; overflow:auto; display:none;}
  .hsearch-results.show{display:block;}
  .hsr-cat{font-size:10px; font-weight:700; letter-spacing:1px; text-transform:uppercase; color:var(--terra); padding:8px 12px 4px;}
  .hsr-item{padding:8px 12px; border-bottom:1px solid #F0EBDF; cursor:pointer; font-size:13px; color:var(--anthra);}
  .hsr-item:hover{background:var(--creme);}
  .hsr-item b{color:var(--bleu);}
  .hsr-empty{padding:14px; color:var(--gris); font-style:italic; font-size:13px; text-align:center;}
  .uzone{display:flex; align-items:center; gap:10px; color:#C9D4E2; font-size:13px; flex-shrink:0;}
  .uzone b{color:#fff;}
  nav{display:flex; background:var(--bleu2); overflow-x:auto; -webkit-overflow-scrolling:touch;}
  nav button{flex:0 0 auto; padding:11px 16px; background:none; border:none; color:#C9D4E2; font-weight:600; font-size:13px; cursor:pointer; border-bottom:3px solid transparent; white-space:nowrap;}
  nav button.active{color:#fff; border-bottom-color:var(--terra); background:rgba(255,255,255,.05);}
  main{max-width:1100px; margin:0 auto; padding:16px;}
  h2{color:var(--bleu); font-size:19px; margin:6px 0 12px;}
  h3{color:var(--terra); font-size:13.5px; margin:14px 0 8px; text-transform:uppercase; letter-spacing:1px;}
  .cards{display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:10px; margin-bottom:16px;}
  .card{background:#fff; border-radius:10px; padding:13px; box-shadow:0 1px 4px rgba(15,42,74,.10);}
  .card .v{font-size:20px; font-weight:800; color:var(--bleu);}
  .card .l{font-size:11.5px; color:var(--gris); margin-top:2px;}
  .card.t .v{color:var(--terra);} .card.g .v{color:var(--vert);} .card.r .v{color:var(--rouge);}
  .panel{background:#fff; border-radius:10px; padding:14px; box-shadow:0 1px 4px rgba(15,42,74,.10); margin-bottom:14px;}
  table{width:100%; border-collapse:collapse; font-size:13.5px;}
  th{background:var(--bleu); color:#fff; text-align:left; padding:8px; font-size:11px; letter-spacing:.5px; text-transform:uppercase;}
  td{padding:8px; border-bottom:1px solid #EDE7DA; vertical-align:middle;}
  tr:nth-child(even) td{background:#FAF7F0;}
  .num{text-align:right; font-variant-numeric:tabular-nums;}
  .btn{background:var(--terra); color:#fff; border:none; border-radius:7px; padding:9px 14px; font-weight:700; cursor:pointer; font-size:13.5px;}
  .btn.b{background:var(--bleu);} .btn.ghost{background:#EDE7DA; color:var(--bleu);}
  .btn.sm{padding:5px 9px; font-size:12px;}
  .btn:disabled{opacity:.45; cursor:not-allowed;}
  .row{display:flex; gap:8px; flex-wrap:wrap; align-items:center;}
  .grid2{display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:10px;}
  label{display:block; font-size:11.5px; font-weight:700; color:var(--bleu); margin:8px 0 3px; text-transform:uppercase; letter-spacing:.5px;}
  input,select,textarea{width:100%; padding:9px; border:1.5px solid #D8D2C4; border-radius:7px; font-size:14px; background:#fff;}
  input:focus,select:focus{outline:none; border-color:var(--terra);}
  .badge{display:inline-block; padding:3px 9px; border-radius:20px; font-size:11px; font-weight:700; color:#fff; white-space:nowrap;}
  .badge.pending{background:var(--gris);} .badge.delivered{background:var(--bleu);} .badge.paid{background:var(--vert);}
  .badge.alert{background:var(--rouge);} .badge.ok{background:var(--vert);} .badge.credit{background:var(--terra);}
  .badge.admin{background:var(--bleu);} .badge.emp{background:var(--gris);} .badge.off{background:var(--rouge);}
  .alertbox{background:#FCEFE7; border-left:4px solid var(--terra); padding:10px 12px; border-radius:6px; margin-bottom:10px; font-size:13.5px;}
  .infobox{background:#EDF2F8; border-left:4px solid var(--bleu); padding:10px 12px; border-radius:6px; margin-bottom:10px; font-size:13px;}
  .empty{color:var(--gris); font-style:italic; padding:14px; text-align:center;}
  .lines .ln{display:grid; grid-template-columns:1fr 84px 110px 34px; gap:6px; margin-bottom:6px; align-items:center;}
  .del{background:none; border:none; color:var(--rouge); font-size:17px; cursor:pointer;}
  .total{font-size:17px; font-weight:800; color:var(--bleu); text-align:right; margin-top:8px;}
  .muted{color:var(--gris); font-size:12px;}
  .tablewrap{overflow-x:auto;}
  .searchwrap{position:relative; margin-bottom:14px;}
  .searchwrap input{padding:12px 14px; font-size:15px; border-radius:9px; border:2px solid #D8D2C4;}
  .perms{display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:4px 14px; margin-top:6px;}
  .perms label{display:flex; align-items:center; gap:7px; text-transform:none; font-size:13px; font-weight:500; color:var(--anthra); margin:3px 0;}
  .perms input{width:auto;}
  .login{max-width:400px; margin:7vh auto; background:#fff; border-radius:12px; padding:26px; box-shadow:0 4px 18px rgba(15,42,74,.15);}
  .login .wordmark{color:var(--bleu); text-align:center; letter-spacing:7px; font-size:24px;}
  .login .bar{margin:6px auto;} .login .sub{color:var(--gris); text-align:center; letter-spacing:3px;}
  #toast{position:fixed; bottom:18px; left:50%; transform:translateX(-50%); background:var(--bleu); color:#fff; padding:11px 18px; border-radius:8px; font-weight:600; display:none; z-index:50; box-shadow:0 4px 14px rgba(0,0,0,.25); max-width:90vw; text-align:center;}
  .modalbg{position:fixed; inset:0; background:rgba(15,42,74,.55); display:flex; align-items:center; justify-content:center; padding:14px; z-index:60;}
  .modal{background:#fff; border-radius:12px; padding:20px; width:100%; max-width:480px; max-height:92vh; overflow:auto; box-shadow:0 10px 40px rgba(0,0,0,.3);}
  .modal h3{margin-top:0;}
  .x{background:none; border:none; font-size:22px; color:var(--gris); cursor:pointer; line-height:1;}
  @media(max-width:560px){ .lines .ln{grid-template-columns:1fr 64px 88px 30px;} main{padding:10px;} }
  @media print{ body *{visibility:hidden;} #printarea, #printarea *{visibility:visible;} #printarea{position:absolute; left:0; top:0; width:100%; padding:10px;} }
  .sync-badge{position:fixed; bottom:10px; right:10px; background:var(--vert); color:#fff; padding:4px 10px; border-radius:20px; font-size:10px; font-weight:bold; z-index:100; opacity:0.8; pointer-events:none;}
  .sync-badge.offline{background:var(--gris);}
</style>

<body>
<div id="root"></div>
<div id="modal"></div>
<div id="printarea" style="display:none"></div>
<div id="toast"></div>
<div id="sync-badge" class="sync-badge">☁️ Synced</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
  import { 
    getFirestore, 
    doc, 
    getDoc, 
    setDoc, 
    deleteDoc, 
    onSnapshot,
    serverTimestamp 
  } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

  // Configuration Firebase
  const firebaseConfig = {
    apiKey: "AIzaSyCcl7rBRT1jiDwVR30_1dUND9HCKkq8sgg",
    authDomain: "distrivia-group.firebaseapp.com",
    projectId: "distrivia-group",
    storageBucket: "distrivia-group.firebasestorage.app",
    messagingSenderId: "379306867104",
    appId: "1:379306867104:web:08d849ee32095d67a88cc5",
    measurementId: "G-0EB884J2JS"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const syncBadge = document.getElementById("sync-badge");

  function updateSyncBadge(status) {
    if (syncBadge) {
      if (status === "syncing") {
        syncBadge.textContent = "🔄 Syncing...";
        syncBadge.style.background = "#C85E2D";
      } else if (status === "offline") {
        syncBadge.textContent = "⚠️ Offline";
        syncBadge.classList.add("offline");
      } else {
        syncBadge.textContent = "☁️ Synced";
        syncBadge.classList.remove("offline");
        syncBadge.style.background = "var(--vert)";
      }
    }
  }

  // Stockage Firestore avec fallback localStorage
  window.store = {
    mode: "firestore",
    async get(k) {
      try {
        const docRef = doc(db, "distrivia_data", k);
        const docSnap = await getDoc(docRef);
        if (docSnap.exists()) {
          return JSON.stringify(docSnap.data().payload);
        }
        const local = window.localStorage.getItem(k);
        if (local) return local;
        return null;
      } catch (e) {
        console.warn("Firestore read error, fallback to localStorage:", e);
        updateSyncBadge("offline");
        return window.localStorage.getItem(k);
      }
    },
    async set(k, v) {
      try {
        window.localStorage.setItem(k, v);
        const docRef = doc(db, "distrivia_data", k);
        await setDoc(docRef, {
          payload: JSON.parse(v),
          updatedAt: serverTimestamp()
        });
        updateSyncBadge("synced");
      } catch (e) {
        console.error("Firestore write error:", e);
        updateSyncBadge("offline");
        toast("⚠️ Connexion Cloud perdue - données sauvegardées localement");
        throw e;
      }
    },
    async del(k) {
      window.localStorage.removeItem(k);
      try {
        const docRef = doc(db, "distrivia_data", k);
        await deleteDoc(docRef);
      } catch (e) {
        console.warn("Firestore delete error:", e);
      }
    }
  };

  // Variables globales
  let S = { version:5, users:[], products:[], clients:[], orders:[], expenses:[], suppliers:[], purchases:[], campaigns:[], employees:[], objectives:{}, logs:[], seq:1, orderSeq:1, poSeq:1 };
  let session = null;
  let tab = "dash";
  let draft = null;
  let editUserId = null;
  let editOrder = null;
  let editClientId = null;
  let editSupplierId = null;
  let editCampaignId = null;
  let editEmployeeId = null;
  let modalContent = null;
  let searchQ = "";
  let acctPeriod = { from:"", to:"" };
  let ctrlPeriod = { from:"", to:"" };
  let cashPeriod = { from:"", to:"" };
  let monitorPeriod = { from:"", to:"" };
  let unsubscribeSnapshot = null;

  const KEY = "distrivia-erp-v1";
  const KEY_SESSION = "distrivia-session";

  // Helper functions
  const fmt = n => (Math.round(n)||0).toLocaleString("fr-FR") + " F";
  const today = () => new Date().toISOString().slice(0,10);
  const now = () => new Date().toISOString().slice(0,16).replace("T"," ");
  const monthKey = d => (d||today()).slice(0,7);
  const el = id => document.getElementById(id);
  const esc = s => String(s??"").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
  
  function toast(msg){ 
    const t = el("toast"); 
    t.textContent = msg; 
    t.style.display = "block"; 
    setTimeout(()=>t.style.display="none", 2400); 
  }
  
  function nid(){ return S.seq++; }

  async function sha256(txt){
    if (window.crypto && crypto.subtle) {
      const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(txt));
      return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,"0")).join("");
    }
    let h = 0; for (let i=0;i<txt.length;i++){ h = (h*31 + txt.charCodeAt(i))|0; } 
    return "x"+(h>>>0).toString(16);
  }
  
  const me = () => S.users.find(u=>u.id===session?.userId) || null;
  const isAdmin = () => me()?.role === "admin";
  const can = p => isAdmin() || !!me()?.perms?.[p];
  
  function log(action){
    S.logs.unshift({ d: now(), u: me()?.name || "—", a: action });
    if (S.logs.length > 300) S.logs.length = 300;
  }

  async function save(){
    try{ 
      await window.store.set(KEY, JSON.stringify(S)); 
    } catch(e){ 
      toast("⚠️ Échec de la sauvegarde Cloud"); 
    }
  }
  
  async function saveSession(){
    if (session) await window.store.set(KEY_SESSION, JSON.stringify(session));
    else await window.store.del(KEY_SESSION);
  }

  // Migration des données
  function migrate(){
    if (!S.version || S.version < 2) {
      S.version = 2; S.users = S.users||[]; S.logs = S.logs||[]; S.orderSeq = S.orderSeq||1;
      (S.orders||[]).forEach(o=>{
        if(!o.num) o.num = "CMD-" + String(S.orderSeq++).padStart(4,"0");
        if(!o.payments){
          const tot = o.lines.reduce((a,l)=>a+l.qty*l.price,0);
          o.payments = (o.status==="paid") ? [{id:nid(), date:o.paidDate||o.date, amount:tot, by:"—"}] : [];
        }
      });
    }
    if (!S.version || S.version < 3) {
      S.version = 3; S.suppliers = S.suppliers||[]; S.purchases = S.purchases||[]; S.poSeq = S.poSeq||1;
      (S.orders||[]).forEach(o=>{
        if(o.delivered===undefined) o.delivered = (o.status==="delivered"||o.status==="paid");
        if(o.payments) o.payments.forEach(p=>{ if(!p.method) p.method="Espèces"; });
        if(o.dueDate===undefined) o.dueDate = null;
      });
    }
    if (!S.version || S.version < 4) {
      S.version = 4; S.campaigns = S.campaigns||[]; S.employees = S.employees||[];
      (S.clients||[]).forEach(c=>{
        if(c.dial===undefined){
          let raw = (c.phone||"").trim();
          let dial="+221", local=raw;
          const m = raw.match(/^(\+\d{1,4})[\s.-]*(.*)$/);
          if(m){ dial=m[1].replace(/\s/g,""); local=m[2]; }
          c.dial = dial; c.local = (local||"").replace(/[^\d]/g,"");
          c.phone = c.local ? (c.dial+" "+c.local) : "";
        }
      });
    }
    if (!S.version || S.version < 5) {
      S.version = 5; S.objectives = S.objectives || {}; S.campaigns = S.campaigns || []; S.employees = S.employees || [];
    }
    if (S.orderSeq === undefined) S.orderSeq = (S.orders?.length||0)+1;
    if (S.poSeq === undefined) S.poSeq = (S.purchases?.length||0)+1;
  }

  // Constantes métier
  const FAMILIES = ["Restauration & take-away","Hygiène & entretien","Médical","Événementiel","Écologique","Consommables informatiques","Matériel de bureau","Mobilier de bureau"];
  const CLIENT_TYPES = ["Dibiterie / gargote","Restaurant / fast-food","Traiteur / événementiel","Boulangerie","Boutique revendeuse","Clinique / pharmacie","Hôtel","Entreprise / école","Autre"];
  const PERMS = [
    ["orders_create","Créer des commandes"],["orders_edit","Modifier les commandes"],["orders_cancel","Annuler les commandes"],
    ["orders_deliver","Livrer les commandes"],["orders_pay","Encaisser les paiements"],["clients_manage","Ajouter / modifier les clients"],
    ["clients_edit","Modifier les clients existants"],["products_manage","Gérer les produits et prix"],["stock_receive","Réceptionner du stock"],
    ["cash_view","Voir la caisse et les soldes"],["cash_expense","Enregistrer des dépenses"],["suppliers","Gérer les fournisseurs et achats"],
    ["accounting","Voir la comptabilité (SYSCOHADA)"],["control","Voir le contrôle de gestion"],["logistics","Gérer la logistique et les livraisons"],
    ["marketing","Voir et gérer le marketing"],["hr","Voir et gérer les ressources humaines"],["monitoring","Voir le monitoring et les objectifs"],
  ];
  const COUNTRY_CODES = [
    ["+221","🇸🇳 Sénégal"],["+223","🇲🇱 Mali"],["+225","🇨🇮 Côte d'Ivoire"],["+222","🇲🇷 Mauritanie"],
    ["+224","🇬🇳 Guinée"],["+226","🇧🇫 Burkina"],["+227","🇳🇪 Niger"],["+228","🇹🇬 Togo"],["+229","🇧🇯 Bénin"],
    ["+233","🇬🇭 Ghana"],["+234","🇳🇬 Nigéria"],["+212","🇲🇦 Maroc"],["+216","🇹🇳 Tunisie"],["+33","🇫🇷 France"],
    ["+86","🇨🇳 Chine"],["+90","🇹🇷 Turquie"],["+1","🇺🇸 USA/Canada"],["+44","🇬🇧 UK"],["+971","🇦🇪 Émirats"],
  ];
  const CHANNELS = ["WhatsApp","SMS","Facebook","Instagram","Terrain / visite","Affichage","Radio","Bouche à oreille","Autre"];
  const HR_CONTRACTS = ["CDI","CDD","Stage","Prestation","Journalier"];
  const HR_DEPARTMENTS = ["Direction","Commercial","Logistique / entrepôt","Administratif / finance","Marketing","Livraison"];
  const PAY_METHODS = ["Espèces","Wave","Orange Money","Virement bancaire","Chèque"];
  const SUPPLIER_ZONES = ["Chine","Turquie","Maroc","Local Sénégal","Autre"];
  const COA = [
    ["411","Clients","actif"],["401","Fournisseurs","passif"],["521","Banque","actif"],["571","Caisse","actif"],
    ["311","Stocks de marchandises","actif"],["701","Ventes de marchandises","produit"],["601","Achats de marchandises","charge"],
    ["6031","Variation de stocks","charge"],["612","Transport","charge"],["622","Locations (loyer)","charge"],
    ["627","Services bancaires","charge"],["641","Impôts et taxes","charge"],["661","Charges de personnel","charge"],
    ["627p","Publicité / marketing","charge"],["646","Charges diverses","charge"],["443","TVA facturée","passif"],
  ];

  // Calculs métier
  const orderTotal = o => o.lines.reduce((a,l)=>a+l.qty*l.price,0);
  const orderPaid = o => (o.payments||[]).reduce((a,p)=>a+p.amount,0);
  const orderDue = o => Math.max(0, orderTotal(o) - orderPaid(o));
  const orderCost = o => o.lines.reduce((a,l)=>{ const p=S.products.find(p=>p.id===l.productId); return a+l.qty*(p?p.cost:0); },0);
  const clientName = id => S.clients.find(c=>c.id===id)?.name || "—";
  const prodName = id => S.products.find(p=>p.id===id)?.name || "—";
  const normPhone = (dial, local) => (local||"").replace(/[^\d]/g,"");
  const fullPhone = c => c.local ? (c.dial+" "+c.local) : "";
  
  function phoneExists(dial, local, exceptId){
    const n = normPhone(dial, local); if(!n) return false;
    return S.clients.some(c=> c.id!==exceptId && c.dial===dial && normPhone(c.dial,c.local)===n);
  }

  function refreshStatus(o){
    if (o.status==="cancelled") return;
    if (!o.delivered) o.status = "pending";
    else o.status = orderDue(o) <= 0 ? "paid" : "delivered";
  }

  function deliveryLabel(o){
    if(o.status==="cancelled") return '<span class="badge off">Annulée</span>';
    return o.delivered ? '<span class="badge delivered">Livrée</span>' : '<span class="badge pending">Non livrée</span>';
  }
  
  function payLabel(o){
    if(o.status==="cancelled") return "—";
    const due=orderDue(o);
    if(due<=0) return '<span class="badge paid">Payée</span>';
    if(orderPaid(o)>0) return '<span class="badge credit">Partiel</span>';
    return '<span class="badge pending">Impayée</span>';
  }

  function kpis(){
    const m = monthKey();
    const live = S.orders.filter(o=>o.status!=="cancelled");
    const delivered = live.filter(o=>o.status!=="pending");
    const caMonth = delivered.filter(o=>monthKey(o.date)===m).reduce((a,o)=>a+orderTotal(o),0);
    const margeMonth = delivered.filter(o=>monthKey(o.date)===m).reduce((a,o)=>a+orderTotal(o)-orderCost(o),0);
    let encMonth=0, cashIn=0;
    live.forEach(o=>(o.payments||[]).forEach(p=>{ cashIn+=p.amount; if(monthKey(p.date)===m) encMonth+=p.amount; }));
    const credit = delivered.reduce((a,o)=>a+orderDue(o),0);
    const activeClients = new Set(live.filter(o=>monthKey(o.date)===m).map(o=>o.clientId)).size;
    const alerts = S.products.filter(p=>p.stock<=p.alert);
    const stockValue = S.products.reduce((a,p)=>a+p.stock*p.cost,0);
    const cashOut = S.expenses.reduce((a,e)=>a+e.amount,0);
    return {caMonth, margeMonth, encMonth, credit, activeClients, alerts, stockValue, solde:cashIn-cashOut};
  }

  // Chargement principal avec écoute Firestore
  window.loadAll = async function() {
    try {
      const raw = await window.store.get(KEY);
      if(raw) S = JSON.parse(raw);
    } catch(e) {}
    migrate();
    try {
      const rs = await window.store.get(KEY_SESSION);
      if(rs) session = JSON.parse(rs);
    } catch(e) {}
    if (session && !me()) session = null;
    render();

    if (unsubscribeSnapshot) unsubscribeSnapshot();
    const docRef = doc(db, "distrivia_data", KEY);
    unsubscribeSnapshot = onSnapshot(docRef, (docSnap) => {
      if (docSnap.exists()) {
        const cloudData = docSnap.data().payload;
        if (JSON.stringify(cloudData) !== JSON.stringify(S)) {
          S = cloudData;
          migrate();
          render();
          updateSyncBadge("synced");
          toast("📡 Données synchronisées en temps réel");
        }
      }
    }, (error) => {
      console.error("Firestore snapshot error:", error);
      updateSyncBadge("offline");
    });
  };

  function drawCharts(){
    if(typeof Chart==="undefined") return;
    const months = (()=>{ const arr=[]; const d=new Date(); for(let i=5;i>=0;i--){ const x=new Date(d.getFullYear(),d.getMonth()-i,1); arr.push(x.toISOString().slice(0,7)); } return arr; })();
    const lbl=months.map(m=>{const [y,mo]=m.split("-");return ["jan","fév","mar","avr","mai","jun","jul","aoû","sep","oct","nov","déc"][+mo-1]+" "+y.slice(2);});
    const live=S.orders.filter(o=>o.status!=="cancelled");
    const caM=months.map(m=>live.filter(o=>o.delivered&&monthKey(o.date)===m).reduce((a,o)=>a+orderTotal(o),0));
    const ctx1=el("ch-ca"); if(ctx1) new Chart(ctx1,{type:"bar",data:{labels:lbl,datasets:[{label:"CA",data:caM,backgroundColor:"#0F2A4A"}]},options:{responsive:true,maintainAspectRatio:true}});
  }

  // Bindings simplifiés
  function bindSetup(){
    el("su-go").onclick = async ()=>{
      const name = el("su-name").value.trim(), login = el("su-login").value.trim().toLowerCase();
      const p1 = el("su-pass").value, p2 = el("su-pass2").value;
      if(!name||!login) return toast("Nom et identifiant requis");
      if(p1.length<4) return toast("Mot de passe : 4 caractères minimum");
      if(p1!==p2) return toast("Les mots de passe ne correspondent pas");
      const salt = Math.random().toString(36).slice(2,10);
      S.users.push({ id:nid(), name, login, salt, hash:await sha256(salt+p1), role:"admin", perms:{}, active:true });
      session = { userId:S.users[0].id };
      log("Compte administrateur créé");
      await save(); await saveSession(); render(); toast("Bienvenue, "+name+" ✓");
    };
  }

  function bindLogin(){
    const go = async ()=>{
      const login = el("lg-login").value.trim().toLowerCase(), pass = el("lg-pass").value;
      const u = S.users.find(u=>u.login===login);
      if(!u) return toast("Identifiant inconnu");
      if(u.active===false) return toast("Compte désactivé — voir l'administrateur");
      const h = await sha256(u.salt+pass);
      if(h!==u.hash) return toast("Mot de passe incorrect");
      session = { userId:u.id };
      log("Connexion");
      await save(); await saveSession(); tab="dash"; render(); toast("Bonjour "+u.name+" 👋");
    };
    el("lg-go").onclick = go;
    el("lg-pass").onkeydown = e=>{ if(e.key==="Enter") go(); };
  }

  function bindApp(){
    document.querySelectorAll("nav button").forEach(b=> b.onclick = ()=>{ tab=b.dataset.tab; searchQ=""; render(); });

    const gs = el("globalsearch"); const gsr = el("hsearch-results");
    if(gs && gsr){
      const renderDrop = ()=>{
        searchQ = gs.value;
        if(searchQ.trim().length>=2){ gsr.innerHTML = globalSearchHTML(); gsr.classList.add("show"); bindSearchItems(); }
        else { gsr.innerHTML = ""; gsr.classList.remove("show"); }
      };
      gs.oninput = renderDrop;
      gs.onfocus = ()=>{ if(searchQ.trim().length>=2) gsr.classList.add("show"); };
      document.addEventListener("click", e=>{ if(!e.target.closest(".hsearch")) gsr.classList.remove("show"); });
      if(searchQ.trim().length>=2) bindSearchItems();
    }

    const pAdd = el("p-add");
    if(pAdd) pAdd.onclick = async ()=>{
      const name = el("p-name").value.trim(); if(!name) return toast("Nom du produit requis");
      S.products.push({ id:nid(), name, family:el("p-fam").value, cost:+el("p-cost").value||0, price:+el("p-price").value||0, stock:+el("p-stock").value||0, alert:+el("p-alert").value||0 });
      log("Produit créé : "+name);
      await save(); render(); toast("Produit ajouté ✓");
    };
    
    document.querySelectorAll("[data-rcv]").forEach(b=> b.onclick = async ()=>{
      const id=+b.dataset.rcv, q=+el("rcv-"+id).value;
      if(!q||q<1) return toast("Indiquez la quantité reçue");
      const p=S.products.find(p=>p.id===id); p.stock+=q;
      log("Réception stock : +"+q+" "+p.name);
      await save(); render(); toast("+"+q+" en stock ✓");
    });
    
    document.querySelectorAll("[data-delp]").forEach(b=> b.onclick = async ()=>{
      const id=+b.dataset.delp;
      if(S.orders.some(o=>o.lines.some(l=>l.productId===id))) return toast("Produit utilisé dans des commandes — suppression bloquée");
      if(!confirm("Supprimer ce produit ?")) return;
      const p=S.products.find(p=>p.id===id);
      S.products = S.products.filter(p=>p.id!==id);
      log("Produit supprimé : "+(p?p.name:id));
      await save(); render();
    });
    
    const cAdd = el("c-add");
    if(cAdd) cAdd.onclick = async ()=>{
      const name = el("c-name").value.trim(); if(!name) return toast("Nom du client requis");
      const dial = el("c-dial").value;
      const local = normPhone(dial, el("c-local").value);
      if(!local) return toast("Le numéro de téléphone est obligatoire");
      if(phoneExists(dial, local, editClientId)) return toast("⚠ Ce numéro existe déjà");
      if(editClientId){
        const c = S.clients.find(c=>c.id===editClientId);
        c.name=name; c.type=el("c-type").value; c.zone=el("c-zone").value.trim(); c.dial=dial; c.local=local; c.phone=dial+" "+local;
        log("Client modifié : "+name); editClientId=null;
      } else {
        S.clients.push({ id:nid(), name, type:el("c-type").value, zone:el("c-zone").value.trim(), dial, local, phone:dial+" "+local, created:today() });
        log("Client créé : "+name);
      }
      await save(); render(); toast("Client enregistré ✓");
    };
    
    const cCancel = el("c-cancel"); if(cCancel) cCancel.onclick = ()=>{ editClientId=null; render(); };
    document.querySelectorAll("[data-cedit]").forEach(b=> b.onclick = ()=>{ editClientId=+b.dataset.cedit; tab="clients"; render(); });
    document.querySelectorAll("[data-delc]").forEach(b=> b.onclick = async ()=>{
      const id=+b.dataset.delc;
      if(S.orders.some(o=>o.clientId===id)) return toast("Client avec commandes — suppression bloquée");
      if(!confirm("Supprimer ce client ?")) return;
      S.clients = S.clients.filter(c=>c.id!==id);
      log("Client supprimé"); await save(); render();
    });
    
    const oNew = el("o-new");
    if(oNew) oNew.onclick = ()=>{ toast("Création de commande à implémenter"); };
    
    document.querySelectorAll("[data-deliver]").forEach(b=> b.onclick = async ()=>{
      const id=+b.dataset.deliver; const o=S.orders.find(o=>o.id===id);
      if(!o) return; o.delivered=true; o.deliveredDate=today(); o.deliveredBy=me().name;
      refreshStatus(o); log("Commande livrée : "+o.num);
      await save(); render(); toast("Livrée ✓");
    });
    
    document.querySelectorAll("[data-quickpay]").forEach(b=> b.onclick = async ()=>{
      const id=+b.dataset.quickpay; const o=S.orders.find(o=>o.id===id);
      if(!o) return; const due=orderDue(o);
      const v=prompt("Montant à encaisser pour "+o.num+" (reste "+fmt(due)+") :", due);
      if(!v) return; const amount=Math.min(due, Math.max(0,+String(v).replace(/[^\d]/g,"")||0));
      if(!amount) return;
      o.payments.push({id:nid(), date:today(), amount, method:"Espèces", by:me().name});
      refreshStatus(o); log("Versement encaissé : "+o.num); await save(); render(); toast("Encaissement ✓");
    });
    
    document.querySelectorAll("[data-oedit]").forEach(b=> b.onclick = ()=>{ toast("Édition de commande à implémenter"); });
    document.querySelectorAll("[data-ocancel]").forEach(b=> b.onclick = async ()=>{
      const o=S.orders.find(o=>o.id===+b.dataset.ocancel);
      const reason=prompt("Motif d'annulation de "+o.num+" :"); if(!reason) return;
      o.status="cancelled"; o.cancelReason=reason;
      if(o.delivered){ o.lines.forEach(l=>{ const p=S.products.find(p=>p.id===l.productId); if(p) p.stock+=l.qty; }); }
      log("Commande annulée : "+o.num); await save(); render(); toast("Commande annulée");
    });
    
    document.querySelectorAll("[data-oreceipt]").forEach(b=> b.onclick = ()=>{
      const o=S.orders.find(o=>o.id===+b.dataset.oreceipt);
      toast("Reçu: "+o.num);
    });
    
    document.querySelectorAll("[data-odetail]").forEach(b=> b.onclick = ()=>{ toast("Détail commande"); });
    document.querySelectorAll("[data-cdetail]").forEach(b=> b.onclick = ()=>{ toast("Détail client"); });
    
    // Exports
    const bkExport = el("bk-export");
    if(bkExport) bkExport.onclick = ()=>{
      const blob = new Blob([JSON.stringify(S,null,2)],{type:"application/json"});
      const a=document.createElement("a"); a.href=URL.createObjectURL(blob); a.download="distrivia-backup-"+today()+".json"; a.click();
    };
    
    [["orders","xlsx"],["orders","csv"],["orders","pdf"],["clients","xlsx"],["clients","csv"]].forEach(([k,f])=>{
      const btn = el("exp-"+k+"-"+f); if(btn) btn.onclick = ()=>{ toast("Export "+f.toUpperCase()+" "+k); };
    });
  }
  
  function bindSearchItems(){
    document.querySelectorAll("[data-goclient]").forEach(it=> it.onclick = ()=>{ const id=+it.dataset.goclient; searchQ=""; tab="clients"; render(); setTimeout(()=>{ highlightClient(id); }, 60); });
    document.querySelectorAll("[data-goorder]").forEach(it=> it.onclick = ()=>{ const id=+it.dataset.goorder; searchQ=""; tab="orders"; render(); });
    document.querySelectorAll("[data-goproduct]").forEach(it=> it.onclick = ()=>{ searchQ=""; tab="products"; render(); });
  }
  
  function highlightClient(id){ const c=S.clients.find(c=>c.id===id); if(!c) return; }
  
  function vUsers(){
    return `<h2>Utilisateurs</h2><div class="panel"><div class="tablewrap"></td>
      <tr><th>Nom</th><th>Identifiant</th><th>Rôle</th><th>Statut</th><th></th></tr>
      ${S.users.map(u=>`<tr><td><b>${esc(u.name)}</b></td><td>${esc(u.login)}</td><td>${u.role==="admin"?'<span class="badge admin">Admin</span>':'<span class="badge emp">Employé</span>'}</td>
      <td>${u.active!==false?'<span class="badge ok">Actif</span>':'<span class="badge off">Désactivé</span>'}</td>
      <td><button class="btn sm ghost" data-uedit="${u.id}">Modifier</button> ${u.id!==me()?.id?`<button class="btn sm" style="background:var(--rouge)" data-utoggle="${u.id}">${u.active!==false?"Désactiver":"Activer"}</button>`:""}</td></tr>`).join("")}
    </table></div></div>`;
  }

  // Lancement
  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", window.loadAll);
  } else {
    window.loadAll();
  }
</script>
</body>
</html>
