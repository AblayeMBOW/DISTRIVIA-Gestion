/* ================== BINDINGS ================== */
function bindSetup(){
  el("su-go").onclick = async ()=>{
    const name = el("su-name").value.trim(), login = el("su-login").value.trim().toLowerCase();
    const p1 = el("su-pass").value, p2 = el("su-pass2").value;
    if(!name||!login) return toast("Nom et identifiant requis");
    if(p1.length<4) return toast("Mot de passe : 4 caractères minimum");
    if(p1!==p2) return toast("Les mots de passe ne correspondent pas");
    const salt = Math.random().toString(36).slice(2,10);
    S.users.push({ id:nid(), name, login, salt, hash:await sha256(salt+p1), role:"admin", perms:{}, active:true });
    session = { userId:S.users[0].id };
    log("Compte administrateur créé");
    await save(); await saveSession(); render(); toast("Bienvenue, "+name+" ✓");
  };
}
function bindLogin(){
  const go = async ()=>{
    const login = el("lg-login").value.trim().toLowerCase(), pass = el("lg-pass").value;
    const u = S.users.find(u=>u.login===login);
    if(!u) return toast("Identifiant inconnu");
    if(u.active===false) return toast("Compte désactivé — voir l'administrateur");
    const h = await sha256(u.salt+pass);
    if(h!==u.hash) return toast("Mot de passe incorrect");
    session = { userId:u.id };
    log("Connexion");
    await save(); await saveSession(); tab="dash"; render(); toast("Bonjour "+u.name+" 👋");
  };
  el("lg-go").onclick = go;
  el("lg-pass").onkeydown = e=>{ if(e.key==="Enter") go(); };
}

function bindApp(){
  document.querySelectorAll("nav button").forEach(b=> b.onclick = ()=>{ exitRecord(); tab=b.dataset.tab; searchQ=""; render(); });
  el("logout").onclick = async ()=>{ log("Déconnexion"); await save(); session=null; await saveSession(); render(); };
  const mp = el("myprofile"); if(mp) mp.onclick = openProfile;
  // Cartes KPI cliquables → navigation directe
  document.querySelectorAll("[data-gotab]").forEach(c=> c.onclick = ()=>{ const t=c.dataset.gotab; if(can(t)||["dash","orders","clients","products"].includes(t)){ tab=t; searchQ=""; render(); } });

  // ===== Commandes web (portail) =====
  document.querySelectorAll("[data-webaccept]").forEach(b=> b.onclick = async ()=>{
    const wo = webOrders.find(o=>o._id===b.dataset.webaccept); if(!wo) return;
    if(!confirm("Accepter la commande "+wo.ref+" de "+(wo.client_name||"")+" ?\n\nUn client et une commande seront créés dans DISTRIVIA Gestion.")) return;
    // 1) trouver ou créer le client (par email ou nom)
    let cli = S.clients.find(c=> (wo.client_email && c.email && c.email.toLowerCase()===String(wo.client_email).toLowerCase()) || c.name===wo.client_name );
    const woPhoneLocal = (wo.client_phone||"").replace(/^\+?221/,"").replace(/[^\d]/g,"");
    if(!cli){
      cli = { id:nid(), matricule:nextMatricule(), name:wo.client_name||"Client web", type:"Boutique / revendeur", zone:wo.zone||"", dial:"+221", local:woPhoneLocal, phone:(wo.client_phone||""), email:(wo.client_email||""), points:0, created:today(), source:"portail" };
      S.clients.push(cli);
    } else {
      // compléter le téléphone si absent
      if(!cli.local && woPhoneLocal){ cli.local=woPhoneLocal; cli.phone=wo.client_phone||cli.phone; }
      if(cli.prospect){ cli.prospect=false; } // devient client actif
    }
    // 2) créer la commande (prix repris du catalogue produits si trouvé, sinon 0 à compléter)
    const lines = (wo.items||[]).map(it=>{
      const prod = S.products.find(p=>p.name===it.name);
      return { name:it.name, qty:it.qty||1, price: prod?prod.price:0, productId: prod?prod.id:null };
    });
    const num = "CMD-" + String(S.orderSeq++).padStart(4,"0");
    S.orders.push({ id:nid(), num, date:today(), clientId:cli.id, payMode:"comptant", dueDate:null,
      lines, status:"pending", delivered:false, payments:[], createdBy:(me().name+" (web)"),
      webRef:wo.ref, note:wo.note||"", deliveryMode:(wo.delivery||"delivery"), deliveryAddr:(wo.zone||""), deliveryPhone:(wo.client_phone||cli.phone||"") });
    log("Commande web acceptée : "+wo.ref+" → "+num);
    await save();
    // 3) marquer la commande web comme confirmée
    if(FB.updateDoc) await FB.updateDoc("portal_orders", wo._id, { status:"confirmed", localNum:num });
    toast("Commande "+num+" créée ✓ — complétez les prix si besoin");
    tab="orders"; render();
  });
  document.querySelectorAll("[data-webreject]").forEach(b=> b.onclick = async ()=>{
    const wo = webOrders.find(o=>o._id===b.dataset.webreject); if(!wo) return;
    if(!confirm("Refuser la commande "+wo.ref+" ?")) return;
    if(FB.updateDoc) await FB.updateDoc("portal_orders", wo._id, { status:"cancelled" });
    toast("Commande web refusée");
  });
  document.querySelectorAll("[data-webappt]").forEach(b=> b.onclick = async ()=>{
    if(FB.updateDoc) await FB.updateDoc("portal_appointments", b.dataset.webappt, { status:"confirmed" });
    toast("Rendez-vous confirmé ✓");
  });
  document.querySelectorAll("[data-webquote]").forEach(b=> b.onclick = async ()=>{
    if(FB.updateDoc) await FB.updateDoc("portal_quotes", b.dataset.webquote, { status:"resolved" });
    toast("Cotation marquée vue ✓");
  });

  // Recherche globale (en-tête, style NetSuite)
  const gs = el("globalsearch");
  const gsr = el("hsearch-results");
  if(gs && gsr){
    const renderDrop = ()=>{
      searchQ = gs.value;
      if(searchQ.trim().length>=2){ gsr.innerHTML = globalSearchHTML(); gsr.classList.add("show"); bindSearchItems(); }
      else { gsr.innerHTML = ""; gsr.classList.remove("show"); }
    };
    gs.oninput = renderDrop;
    gs.onfocus = ()=>{ if(searchQ.trim().length>=2){ gsr.classList.add("show"); } };
    // fermer en cliquant ailleurs
    document.addEventListener("click", e=>{
      if(!e.target.closest(".hsearch")){ gsr.classList.remove("show"); }
    });
    if(searchQ.trim().length>=2) bindSearchItems();
  }

  // Produits
  // aperçu de la photo au moment de l'ajout
  let pendingImg = null;
  const pImg = el("p-img");
  if(pImg) pImg.onchange = async (e)=>{
    const f=e.target.files[0]; if(!f) return;
    try{ pendingImg = await compressImage(f, 500, .72);
      el("p-img-preview").innerHTML = `<img src="${pendingImg}" style="width:90px;height:90px;object-fit:cover;border-radius:10px;border:1px solid #eee">`;
    }catch(err){ toast("Image trop lourde ou invalide"); pendingImg=null; }
  };
  const pAdd = el("p-add");
  if(pAdd) pAdd.onclick = async ()=>{
    const name = el("p-name").value.trim(); if(!name) return toast("Nom du produit requis");
    const imgUrl = (el("p-imgurl")&&el("p-imgurl").value.trim())||"";
    S.products.push({ id:nid(), name, family:el("p-fam").value, cost:+el("p-cost").value||0, price:+el("p-price").value||0, stock:+el("p-stock").value||0, alert:+el("p-alert").value||0, img: pendingImg || imgUrl || null });
    log("Produit créé : "+name);
    await save(); render(); toast("Produit ajouté ✓");
  };
  const pImport = el("p-import");
  if(pImport) pImport.onclick = ()=> openImportProducts();
  // changer/ajouter une photo sur un produit existant
  document.querySelectorAll("[data-pimg]").forEach(b=> b.onclick = ()=>{
    const id=+b.dataset.pimg;
    const inp=document.createElement("input"); inp.type="file"; inp.accept="image/*";
    inp.onchange=async (e)=>{ const f=e.target.files[0]; if(!f) return;
      try{ const img=await compressImage(f,500,.72); const p=S.products.find(p=>p.id===id); p.img=img; log("Photo mise à jour : "+p.name); await save(); render(); toast("Photo enregistrée ✓"); }
      catch(err){ toast("Image invalide"); } };
    inp.click();
  });
  // définir/coller un LIEN image (URL) sur un produit existant
  document.querySelectorAll("[data-pimgurl]").forEach(b=> b.onclick = ()=>{
    const id=+b.dataset.pimgurl; const p=S.products.find(p=>p.id===id);
    const cur = (p.img && /^https?:/i.test(p.img)) ? p.img : "";
    openModal(`<h3>Lien image — ${esc(p.name)}</h3>
      <label>Adresse de l'image (URL)</label>
      <input id="pu-url" value="${esc(cur)}" placeholder="https://…">
      <div id="pu-prev" style="margin-top:10px">${p.img?`<img src="${esc(p.img)}" style="max-height:120px;border-radius:8px">`:""}</div>
      <span class="muted" style="font-size:12px">Colle l'adresse d'une image en ligne (clic droit sur une image → « Copier l'adresse de l'image »). Laisse vide pour retirer.</span>
      <div class="row" style="margin-top:12px;justify-content:flex-end"><button class="btn ghost" onclick="closeModal()">Annuler</button><button class="btn" id="pu-save">Enregistrer</button></div>`);
    const prev=el("pu-prev"), url=el("pu-url");
    url.oninput=()=>{ const v=url.value.trim(); prev.innerHTML = v?`<img src="${esc(v)}" style="max-height:120px;border-radius:8px" onerror="this.style.display='none'">`:""; };
    el("pu-save").onclick=async ()=>{ const v=url.value.trim(); p.img = v||null; log("Lien image : "+p.name); await save(); closeModal(); render(); toast(v?"Image liée ✓":"Image retirée"); };
  });
  document.querySelectorAll("[data-rcv]").forEach(b=> b.onclick = async ()=>{
    const id=+b.dataset.rcv, q=+el("rcv-"+id).value;
    if(!q||q<1) return toast("Indiquez la quantité reçue");
    const p=S.products.find(p=>p.id===id); p.stock+=q;
    log("Réception stock : +"+q+" "+p.name);
    await save(); render(); toast("+"+q+" en stock ✓");
  });
  document.querySelectorAll("[data-delp]").forEach(b=> b.onclick = async ()=>{
    const id=+b.dataset.delp;
    if(S.orders.some(o=>o.lines.some(l=>l.productId===id))) return toast("Produit utilisé dans des commandes — suppression bloquée");
    if(!confirm("Supprimer ce produit ?")) return;
    const p=S.products.find(p=>p.id===id);
    S.products = S.products.filter(p=>p.id!==id);
    log("Produit supprimé : "+(p?p.name:id));
    await save(); render();
  });

  // Clients
  const cAdd = el("c-add");
  if(cAdd) cAdd.onclick = async ()=>{
    const name = el("c-name").value.trim(); if(!name) return toast("Nom du client requis");
    const dial = el("c-dial").value;
    const local = normPhone(dial, el("c-local").value);
    if(!local) return toast("Le numéro de téléphone est obligatoire");
    if(phoneExists(dial, local, editClientId)) return toast("⚠ Ce numéro de téléphone existe déjà pour un autre client");
    if(editClientId){
      const c = S.clients.find(c=>c.id===editClientId);
      c.name=name; c.type=el("c-type").value; c.zone=el("c-zone").value.trim(); c.dial=dial; c.local=local; c.phone=dial+" "+local;
      c.tier=(el("c-tier")?el("c-tier").value:c.tier)||"detail"; c.remise=el("c-remise")?Math.max(0,Math.min(100,+el("c-remise").value||0)):(+c.remise||0);
      log("Client modifié : "+name); editClientId=null;
      await save(); render(); toast("Client mis à jour ✓");
    } else {
      S.clients.push({ id:nid(), matricule:nextMatricule(), name, type:el("c-type").value, zone:el("c-zone").value.trim(), dial, local, phone:dial+" "+local, points:0, created:today(), tier:(el("c-tier")?el("c-tier").value:"detail")||"detail", remise:el("c-remise")?Math.max(0,Math.min(100,+el("c-remise").value||0)):0, customPrices:{} });
      log("Client créé : "+name);
      await save(); render(); toast("Client ajouté ✓");
    }
  };
  const cCancel = el("c-cancel"); if(cCancel) cCancel.onclick = ()=>{ editClientId=null; render(); };
  document.querySelectorAll("[data-prospect]").forEach(b=> b.onclick = async ()=>{
    let p; try{ p=JSON.parse(b.dataset.prospect); }catch(e){ return; }
    const local = (p.phone||"").replace(/^\+?221/,"").replace(/[^\d]/g,"");
    if(local && phoneExists("+221", local, null)) return toast("⚠ Ce téléphone existe déjà dans la base");
    S.clients.push({ id:nid(), matricule:nextMatricule(), name:p.name||"Client", type:p.type||"Boutique / revendeur", zone:p.zone||"", dial:"+221", local, phone:p.phone||"", email:p.email||"", points:0, created:today(), source:"portail" });
    log("Prospect ajouté à la base : "+(p.name||""));
    await save(); render(); toast("Client ajouté à la base ✓");
  });
  document.querySelectorAll("[data-cedit]").forEach(b=> b.onclick = ()=>{ editClientId=+b.dataset.cedit; tab="clients"; render(); });
  document.querySelectorAll("[data-delc]").forEach(b=> b.onclick = async ()=>{
    const id=+b.dataset.delc;
    if(S.orders.some(o=>o.clientId===id)) return toast("Client avec commandes — suppression bloquée");
    const c=S.clients.find(c=>c.id===id);
    confirmAction({title:"Supprimer le client", message:`Supprimer définitivement <b>${esc(c?c.name:"")}</b> ? Cette action est irréversible.`, okLabel:"Supprimer", danger:true}, async ()=>{
      S.clients = S.clients.filter(c=>c.id!==id);
      log("Client supprimé : "+(c?c.name:id));
      await save(); render(); toast("Client supprimé");
    });
  });

  // Commande — brouillon
  if(el("o-client")){
    el("o-client").onchange = e=>{ draft.clientId=+e.target.value; repriceDraftLines(draft); render(); const cl=clientById(draft.clientId); if(cl&&draft.lines.length) toast("Prix recalculés — "+clientTariffLabel(cl)); };
    el("o-date").onchange = e=>{ draft.date=e.target.value; };
    el("o-pay").onchange = e=>{ draft.payMode=e.target.value; const w=el("o-due-wrap"); if(w) w.style.display = e.target.value==="credit"?"":"none"; };
    const oDue = el("o-due"); if(oDue) oDue.onchange = e=>{ draft.dueDate=e.target.value; };
    const oTva = el("o-tva"); if(oTva) oTva.onchange = e=>{ draft.tvaApplicable = e.target.value==="1"; };
    el("o-addline").onclick = ()=>{ const p=S.products[0]; draft.lines.push({productId:p.id, qty:1, price:clientPrice(p, clientById(draft.clientId))}); render(); };
    document.querySelectorAll("[data-lprod]").forEach(s=> s.onchange = e=>{
      const i=+s.dataset.lprod, pid=+e.target.value, p=S.products.find(p=>p.id===pid);
      draft.lines[i].productId=pid; draft.lines[i].price=clientPrice(p, clientById(draft.clientId)); render();
    });
    document.querySelectorAll("[data-lqty]").forEach(inp=> inp.onchange = ()=>{ draft.lines[+inp.dataset.lqty].qty=Math.max(1,+inp.value||1); render(); });
    document.querySelectorAll("[data-lprice]").forEach(inp=> inp.onchange = ()=>{ draft.lines[+inp.dataset.lprice].price=Math.max(0,+inp.value||0); render(); });
    document.querySelectorAll("[data-lrm]").forEach(b=> b.onclick = ()=>{ draft.lines.splice(+b.dataset.lrm,1); render(); });
    el("o-save").onclick = async ()=>{
      if(!draft.lines.length) return;
      // Point 6 : empêcher de commander plus que le stock (sauf édition d'une commande déjà livrée)
      const editingDelivered = editOrder && editOrder.delivered;
      if(!editingDelivered){
        for(const l of draft.lines){ const p=S.products.find(p=>p.id===l.productId);
          if(p && l.qty>p.stock){ return toast("⛔ "+p.name+" : seulement "+p.stock+" en stock. Réduisez la quantité ou réapprovisionnez."); } }
      }
      // Validation échéance crédit (max 3 mois)
      let dueDate = null;
      if(draft.payMode==="credit"){
        dueDate = draft.dueDate || "";
        const max = new Date(); max.setMonth(max.getMonth()+3); const maxStr = max.toISOString().slice(0,10);
        if(!dueDate) return toast("Indiquez l'échéance de paiement (max 3 mois)");
        if(dueDate > maxStr) return toast("L'échéance ne peut pas dépasser 3 mois");
      }
      if(editOrder){
        const o = S.orders.find(o=>o.id===editOrder.id);
        // Si déjà livrée : réajuster le stock (remettre l'ancien, retirer le nouveau)
        if(o.delivered){
          o.lines.forEach(l=>{ const p=S.products.find(p=>p.id===l.productId); if(p) p.stock+=l.qty; });
          draft.lines.forEach(l=>{ const p=S.products.find(p=>p.id===l.productId); if(p) p.stock=Math.max(0,p.stock-l.qty); });
        }
        o.clientId=draft.clientId; o.date=draft.date; o.payMode=draft.payMode; o.lines=draft.lines; o.dueDate=dueDate;
        o.tvaApplicable = draft.tvaApplicable!==false;
        refreshStatus(o);
        log("Commande modifiée : "+o.num);
        editOrder=null; draft=null; await save(); render(); toast("Commande "+o.num+" modifiée ✓");
      } else {
        const num = "CMD-" + String(S.orderSeq++).padStart(4,"0");
        S.orders.push({ id:nid(), num, date:draft.date, clientId:draft.clientId, payMode:draft.payMode, dueDate, lines:draft.lines, status:"pending", delivered:false, payments:[], createdBy:me().name, tvaApplicable: draft.tvaApplicable!==false });
        log("Commande créée : "+num+" — "+clientName(draft.clientId)+" ("+fmt(draft.lines.reduce((a,l)=>a+l.qty*l.price,0))+")");
        draft=null; await save(); render(); toast("Commande "+num+" enregistrée ✓");
      }
    };
  }
  const oCancelEdit = el("o-canceledit"); if(oCancelEdit) oCancelEdit.onclick = ()=>{ editOrder=null; draft=null; render(); };

  /* ===== Devis ===== */
  if(el("q-save") || el("q-addline")){
    const qc=el("q-client"); if(qc) qc.onchange=e=>{ quoteDraft.clientId=+e.target.value; repriceDraftLines(quoteDraft); render(); const cl=clientById(quoteDraft.clientId); if(cl&&quoteDraft.lines.length) toast("Prix recalculés — "+clientTariffLabel(cl)); };
    const qd=el("q-date"); if(qd) qd.onchange=e=>{ quoteDraft.date=e.target.value; };
    const qv=el("q-valid"); if(qv) qv.onchange=e=>{ quoteDraft.validity=e.target.value; };
    const qt=el("q-tva"); if(qt) qt.onchange=e=>{ quoteDraft.tvaApplicable = e.target.value==="1"; };
    const qa=el("q-addline"); if(qa) qa.onclick=()=>{ const p=S.products[0]; quoteDraft.lines.push({productId:p.id, qty:1, price:clientPrice(p, clientById(quoteDraft.clientId))}); render(); };
    document.querySelectorAll("[data-qlprod]").forEach(s=> s.onchange=e=>{ const i=+s.dataset.qlprod, p=S.products.find(p=>p.id===+e.target.value); quoteDraft.lines[i].productId=p.id; quoteDraft.lines[i].price=clientPrice(p, clientById(quoteDraft.clientId)); render(); });
    document.querySelectorAll("[data-qlqty]").forEach(inp=> inp.onchange=()=>{ quoteDraft.lines[+inp.dataset.qlqty].qty=Math.max(1,+inp.value||1); render(); });
    document.querySelectorAll("[data-qlprice]").forEach(inp=> inp.onchange=()=>{ quoteDraft.lines[+inp.dataset.qlprice].price=Math.max(0,+inp.value||0); render(); });
    document.querySelectorAll("[data-qlrm]").forEach(b=> b.onclick=()=>{ quoteDraft.lines.splice(+b.dataset.qlrm,1); render(); });
    const qs=el("q-save"); if(qs) qs.onclick=async ()=>{
      if(!quoteDraft.lines.length) return;
      const num="DEV-"+String(S.quoteSeq++).padStart(4,"0");
      S.quotes.push({ id:nid(), num, date:quoteDraft.date, validity:quoteDraft.validity, clientId:quoteDraft.clientId, lines:quoteDraft.lines.map(l=>({...l})), tvaApplicable:quoteDraft.tvaApplicable!==false, status:"en attente", createdBy:me().name });
      log("Devis créé : "+num+" — "+clientName(quoteDraft.clientId)+" ("+fmt(quoteTotal(quoteDraft))+")");
      quoteDraft=null; await save(); render(); toast("Devis "+num+" enregistré ✓");
    };
  }
  document.querySelectorAll("[data-qpdf]").forEach(b=> b.onclick=()=>{ const q=S.quotes.find(x=>x.id===+b.dataset.qpdf); if(q) downloadQuotePDF(q); });
  document.querySelectorAll("[data-qconv]").forEach(b=> b.onclick=()=> convertQuoteToOrder(+b.dataset.qconv));
  document.querySelectorAll("[data-qaccept]").forEach(b=> b.onclick=async ()=>{ const q=S.quotes.find(x=>x.id===+b.dataset.qaccept); if(q){ q.status="accepté"; await save(); render(); toast("Devis marqué accepté ✓"); } });
  document.querySelectorAll("[data-qdel]").forEach(b=> b.onclick=()=>{ const id=+b.dataset.qdel; const q=S.quotes.find(x=>x.id===id); confirmAction({title:"Supprimer le devis", message:`Supprimer le devis <b>${esc(q.num)}</b> ?`, okLabel:"Supprimer", danger:true}, async ()=>{ S.quotes=S.quotes.filter(x=>x.id!==id); await save(); render(); toast("Devis supprimé"); }); });

  // Modifier une commande

  document.querySelectorAll("[data-hrtoggle]").forEach(b=> b.onclick = async ()=>{
    const e=S.employees.find(e=>e.id===+b.dataset.hrtoggle); e.active = e.active===false ? true : false;
    log((e.active?"Réactivation":"Désactivation")+" employé : "+e.name); await save(); render();
  });
  document.querySelectorAll("[data-hrdel]").forEach(b=> b.onclick = async ()=>{
    if(!confirm("Supprimer cet employé ?")) return;
    S.employees=S.employees.filter(e=>e.id!==+b.dataset.hrdel); log("Employé supprimé"); await save(); render();
  });
  [["hr","xlsx"],["hr","csv"],["hr","pdf"]].forEach(([k,f])=>{ const b=el("exp-"+k+"-"+f); if(b) b.onclick=()=>exportData("hr",f); });

  // Sauvegarde
  const setSave = el("set-save");
  if(setSave) setSave.onclick = async ()=>{
    S.settings = S.settings || {};
    S.settings.tvaEnabled = el("set-tvaen").value==="1";
    S.settings.tvaRate = +el("set-tvarate").value||0;
    S.settings.ninea = el("set-ninea").value.trim();
    S.settings.rccm = el("set-rccm").value.trim();
    if(S.settings.company){ S.settings.company.ninea=S.settings.ninea; S.settings.company.rccm=S.settings.rccm; }
    log("Paramètres TVA mis à jour");
    await save(); render(); toast("Paramètres TVA enregistrés ✓");
  };
  // ===== Catégories tarifaires (Vague 3) =====
  const tierAdd = el("tier-add");
  if(tierAdd) tierAdd.onclick = async ()=>{ const t=captureTierInputs(); t.push({ id:"tier_"+Date.now().toString(36), name:"Nouvelle catégorie", discount:0 }); S.settings.priceTiers=t; await save(); render(); };
  const tierSave = el("tier-save");
  if(tierSave) tierSave.onclick = async ()=>{ S.settings.priceTiers=captureTierInputs(); log("Catégories tarifaires mises à jour"); await save(); render(); toast("Catégories tarifaires enregistrées ✓"); };
  document.querySelectorAll("[data-tier-rm]").forEach(b=> b.onclick = ()=>{
    const i=+b.dataset.tierRm; const t=captureTierInputs(); const removed=t[i]; if(!removed) return;
    if(t.length<=1) return toast("Gardez au moins une catégorie");
    confirmAction({title:"Supprimer la catégorie", message:`Supprimer la catégorie <b>${esc(removed.name)}</b> ? Les clients concernés repasseront au tarif catalogue (Détail).`, okLabel:"Supprimer", danger:true}, async ()=>{
      t.splice(i,1); S.settings.priceTiers=t;
      const fb=(t.find(x=>(+x.discount||0)===0)||t[0]).id;
      (S.clients||[]).forEach(c=>{ if(c.tier===removed.id) c.tier=fb; });
      log("Catégorie tarifaire supprimée : "+removed.name);
      await save(); render(); toast("Catégorie supprimée");
    });
  });
  const setLoy = el("set-loysave");
  if(setLoy) setLoy.onclick = async ()=>{
    S.settings = S.settings || {};
    S.settings.loyaltyEnabled = el("set-loyen").value==="1";
    S.settings.loyaltyRate = Math.max(1, +el("set-loyrate").value||1);
    S.settings.loyaltyPer = Math.max(100, +el("set-loyper").value||1000);
    log("Paramètres fidélité mis à jour");
    await save(); render(); toast("Programme de fidélité enregistré ✓");
  };
  // ===== Coordonnées entreprise (onglet Paramètres) =====
  let pendingLogo = (S.settings.company && S.settings.company.logo) || "";
  const coLogo = el("co-logo");
  if(coLogo) coLogo.onchange = async (e)=>{
    const f=e.target.files[0]; if(!f) return;
    try{ pendingLogo = await compressImage(f, 256, .85);
      const prev=el("co-logo-preview"); if(prev) prev.innerHTML=`<img src="${pendingLogo}" style="width:100%;height:100%;object-fit:contain">`;
      toast("Logo prêt — cliquez sur Enregistrer");
    }catch(err){ toast("Image invalide"); }
  };
  const coLogoRm = el("co-logo-remove");
  if(coLogoRm) coLogoRm.onclick = ()=>{ pendingLogo=""; const prev=el("co-logo-preview"); if(prev) prev.innerHTML='<span style="color:#bbb;font-size:22px">D</span>'; toast("Logo retiré — cliquez sur Enregistrer"); };
  const coSave = el("co-save");
  if(coSave) coSave.onclick = async ()=>{
    S.settings = S.settings || {}; S.settings.company = S.settings.company || {};
    const c = S.settings.company;
    c.name = el("co-name").value.trim() || "DISTRIVIA";
    c.tagline = el("co-tagline").value.trim();
    c.slogan = el("co-slogan").value.trim();
    c.phone1 = el("co-phone1").value.trim();
    c.phone2 = el("co-phone2").value.trim();
    c.whatsapp = el("co-whatsapp").value.replace(/[^\d]/g,"");
    c.email = el("co-email").value.trim();
    c.address = el("co-address").value.trim();
    c.website = el("co-website").value.trim();
    c.hours = el("co-hours").value.trim();
    c.hours2 = el("co-hours2").value.trim();
    c.hours3 = el("co-hours3").value.trim();
    c.logo = pendingLogo;
    // garde NINEA/RCCM en phase pour le portail
    c.ninea = S.settings.ninea||""; c.rccm = S.settings.rccm||"";
    log("Coordonnées entreprise mises à jour");
    await save(); render(); toast("Coordonnées enregistrées ✓ — appliquées à Gestion et au portail");
  };
  const bkE = el("bk-export");
  if(bkE){
    bkE.onclick = ()=>{
      const blob = new Blob([JSON.stringify(S,null,2)],{type:"application/json"});
      const a = document.createElement("a"); a.href=URL.createObjectURL(blob);
      a.download = "distrivia-sauvegarde-"+today()+".json"; a.click();
      log("Export de sauvegarde JSON");
      save();
    };
    el("bk-csv").onclick = ()=>{
      const rows = [["N° commande","Date","Client","Produit","Qté","Prix unitaire","Total ligne","Paiement","Statut","Payé","Reste dû"]];
      S.orders.forEach(o=> o.lines.forEach((l,i)=> rows.push([o.num, o.date, clientName(o.clientId), prodName(l.productId), l.qty, l.price, l.qty*l.price, o.payMode, o.status, i===0?orderPaid(o):"", i===0?orderDue(o):""])));
      const csv = rows.map(r=>r.map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(";")).join("\n");
      const a = document.createElement("a"); a.href=URL.createObjectURL(new Blob(["\uFEFF"+csv],{type:"text/csv"}));
      a.download = "distrivia-commandes-"+today()+".csv"; a.click();
    };
    el("bk-import").onclick = ()=> el("bk-file").click();
    el("bk-file").onchange = e=>{
      const f=e.target.files[0]; if(!f) return;
      const r=new FileReader();
      r.onload = async ()=>{ try{ const d=JSON.parse(r.result);
        if(!d.products||!d.clients||!d.orders) throw 0;
        S=d; migrate(); log("Restauration depuis un fichier");
        await save(); render(); toast("Données restaurées ✓");
      }catch(_){ toast("Fichier invalide"); } };
      r.readAsText(f);
    };
    el("bk-reset").onclick = async ()=>{
      if(!confirm("Effacer TOUTES les données (y compris les comptes) ? Irréversible."))return;
      if(!confirm("Vraiment sûr ? Exportez d'abord une sauvegarde."))return;
      S={version:9, users:[], products:[], clients:[], orders:[], expenses:[], suppliers:[], purchases:[], campaigns:[], employees:[], announcements:[], promos:[], objectives:{}, settings:{tvaRate:18,tvaEnabled:true,pricesTTC:true,ninea:"",rccm:"",loyaltyEnabled:true,loyaltyRate:1,loyaltyPer:1000}, logs:[], seq:1, orderSeq:1, poSeq:1, invoiceSeq:1, clientSeq:1};
      session=null; await save(); await saveSession(); render();
    };
    const bkArch=el("bk-archive"); if(bkArch) bkArch.onclick=()=> archiveOrders(el("bk-arch-date").value);
    const bkArchs=el("bk-archives"); if(bkArchs) bkArchs.onclick=()=> openArchives();
  }
}

loadAll();
if("serviceWorker" in navigator){ navigator.serviceWorker.register("sw.js").catch(()=>{}); }
</script>
</body>
</html>
