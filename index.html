<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
  import { 
    getFirestore, 
    doc, 
    getDoc, 
    setDoc, 
    deleteDoc, 
    onSnapshot,
    serverTimestamp 
  } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

  // Votre configuration Firebase officielle
  const firebaseConfig = {
    apiKey: "AIzaSyCcl7rBRT1jiDwVR30_1dUND9HCKkq8sgg",
    authDomain: "distrivia-group.firebaseapp.com",
    projectId: "distrivia-group",
    storageBucket: "distrivia-group.firebasestorage.app",
    messagingSenderId: "379306867104",
    appId: "1:379306867104:web:08d849ee32095d67a88cc5",
    measurementId: "G-0EB884J2JS"
  };

  // Initialisation de l'application Firebase
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  // Redéfinition globale de l'objet de stockage 'store' lié à Firestore
  window.store = {
    mode: "firestore",
    async get(k) {
      try {
        const docRef = doc(db, "distrivia_data", k);
        const docSnap = await getDoc(docRef);
        if (docSnap.exists()) {
          return JSON.stringify(docSnap.data().payload);
        }
        return window.localStorage.getItem(k);
      } catch (e) {
        console.error("Erreur de lecture Firestore:", e);
        return window.localStorage.getItem(k);
      }
    },
    async set(k, v) {
      try {
        window.localStorage.setItem(k, v); // Sécurité locale rémanente
        const docRef = doc(db, "distrivia_data", k);
        await setDoc(docRef, {
          payload: JSON.parse(v),
          updatedAt: serverTimestamp()
        });
      } catch (e) {
        console.error("Erreur d'écriture Firestore:", e);
        throw e;
      }
    },
    async del(k) {
      window.localStorage.removeItem(k);
      try {
        const docRef = doc(db, "distrivia_data", k);
        await deleteDoc(docRef);
      } catch (e) {}
    }
  };

  // Redéfinition et rattachement global de la fonction de synchronisation native
  window.loadAll = async function() {
    try {
      const raw = await window.store.get(KEY);
      if(raw) S = JSON.parse(raw);
    } catch(e) {}
    migrate();
    try {
      const rs = await window.store.get(KEY_SESSION);
      if(rs) session = JSON.parse(rs);
    } catch(e) {}
    if (session && !me()) session = null;
    render();

    // Configuration de l'écoute en temps réel multi-appareils
    const docRef = doc(db, "distrivia_data", KEY);
    onSnapshot(docRef, (docSnap) => {
      if (docSnap.exists()) {
        const cloudData = docSnap.data().payload;
        if (JSON.stringify(cloudData) !== JSON.stringify(S)) {
          S = cloudData;
          migrate();
          render();
          if (typeof toast === "function") {
            toast("Données synchronisées en temps réel ☁️");
          }
        }
      }
    }, (error) => {
      console.error("Erreur d'écoute Cloud Firestore : ", error);
    });
  };

  // Déclenchement automatique au chargement structurel de la page
  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", window.loadAll);
  } else {
    window.loadAll();
  }
</script>

<script>

const COUNTRY_CODES = [

  ["+224","🇬🇳 Guinée"],["+226","🇧🇫 Burkina"],["+227","🇳ECE Niger"],["+228","🇹🇬 Togo"],["+229","🇧🇯 Bénin"],

  ["+86","🇨🇳 Chine"],["+90","🇹🇷 Turquie"],["+1","🇺🇸 USA/Canada"],["+44","🇬🇧 UK"],["+971","🇦🇪 Émirats"],

const CHANNELS = ["WhatsApp","SMS","Facebook","Instagram","Terrain / visite","Affichage","Radio","Bouche à oreille","Autre"];
const HR_CONTRACTS = ["CDI","CDD","Stage","Prestation","Journalier"];
const HR_DEPARTMENTS = ["Direction","Commercial","Logistique / entrepôt","Administratif / finance","Marketing","Livraison"];
const PAY_METHODS = ["Espèces","Wave","Orange Money","Virement bancaire","Chèque"];
const SUPPLIER_ZONES = ["Chine","Turquie","Maroc","Local Sénégal","Autre"];

const COA = [
  ["411","Clients","actif"], ["401","Fournisseurs","passif"], ["521","Banque","actif"],
  ["571","Caisse","actif"], ["311","Stocks de marchandises","actif"], ["701","Ventes de marchandises","produit"],
  ["601","Achats de marchandises","charge"], ["6031","Variation de stocks","charge"], ["612","Transport","charge"],
  ["622","Locations (loyer)","charge"], ["627","Services bancaires","charge"], ["641","Impôts et taxes","charge"],
  ["661","Charges de personnel","charge"], ["627p","Publicité / marketing","charge"], ["646","Charges diverses","charge"],
  ["443","TVA facturée","passif"],
];
const JOURNALS = { VE:"Ventes", AC:"Achats", BQ:"Banque", CA:"Caisse", OD:"Opérations diverses" };
const KEY = "distrivia-erp-v1";
const KEY_SESSION = "distrivia-session";

/* ================== ÉTAT INITIAL ================== */
let S = { version:5, users:[], products:[], clients:[], orders:[], expenses:[], suppliers:[], purchases:[], campaigns:[], employees:[], objectives:{}, logs:[], seq:1, orderSeq:1, poSeq:1 };
let session = null;
let tab = "dash";
let draft = null;
let editUserId = null;
let editOrder = null;
let editClientId = null;
let editSupplierId = null;
let editCampaignId = null;
let editEmployeeId = null;
let modalContent = null;
let searchQ = "";

let acctPeriod = { from:"", to:"" };
let ctrlPeriod = { from:"", to:"" };
let cashPeriod = { from:"", to:"" };
let monitorPeriod = { from:"", to:"" };

const acctFrom = () => acctPeriod.from; const acctTo = () => acctPeriod.to;
const ctrlFrom = () => ctrlPeriod.from; const ctrlTo = () => ctrlPeriod.to;

const fmt = n => (Math.round(n)||0).toLocaleString("fr-FR") + " F";
const today = () => new Date().toISOString().slice(0,10);
const now = () => new Date().toISOString().slice(0,16).replace("T"," ");
const monthKey = d => (d||today()).slice(0,7);
const el = id => document.getElementById(id);
const esc = s => String(s??"").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
function toast(msg){ const t = el("toast"); t.textContent = msg; t.style.display = "block"; setTimeout(()=>t.style.display="none", 2400); }
function nid(){ return S.seq++; }

/* ================== CONFIGURATION DU COMPTE APPLICATIF ================== */
async function sha256(txt){
  if (window.crypto && crypto.subtle) {
    const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(txt));
    return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,"0")).join("");
  }
  let h = 0; for (let i=0;i<txt.length;i++){ h = (h*31 + txt.charCodeAt(i))|0; } return "x"+(h>>>0).toString(16);
}
const me = () => S.users.find(u=>u.id===session?.userId) || null;
const isAdmin = () => me()?.role === "admin";
const can = p => isAdmin() || !!me()?.perms?.[p];
function log(action){
  S.logs.unshift({ d: now(), u: me()?.name || "—", a: action });
  if (S.logs.length > 300) S.logs.length = 300;
}

/* ================== ENREGISTREMENTS VERS FIRESTORE VIA STORE ================== */
async function save(){
  try{ await window.store.set(KEY, JSON.stringify(S)); }
  catch(e){ toast("⚠ Échec de la sauvegarde Cloud"); }
}
async function saveSession(){
  if (session) await window.store.set(KEY_SESSION, JSON.stringify(session));
  else await window.store.del(KEY_SESSION);
}

function migrate(){
  if (!S.version || S.version < 2) {
    S.version = 2; S.users = S.users||[]; S.logs = S.logs||[]; S.orderSeq = S.orderSeq||1;
    (S.orders||[]).forEach(o=>{
      if(!o.num) o.num = "CMD-" + String(S.orderSeq++).padStart(4,"0");
      if(!o.payments){
        const tot = o.lines.reduce((a,l)=>a+l.qty*l.price,0);
        o.payments = (o.status==="paid") ? [{id:nid(), date:o.paidDate||o.date, amount:tot, by:"—"}] : [];
      }
    });
  }
  if (!S.version || S.version < 3) {
    S.version = 3; S.suppliers = S.suppliers||[]; S.purchases = S.purchases||[]; S.poSeq = S.poSeq||1;
    (S.orders||[]).forEach(o=>{
      if(o.delivered===undefined) o.delivered = (o.status==="delivered"||o.status==="paid");
      if(o.payments) o.payments.forEach(p=>{ if(!p.method) p.method="Espèces"; });
      if(o.dueDate===undefined) o.dueDate = null;
    });
  }
  if (!S.version || S.version < 4) {
    S.version = 4; S.campaigns = S.campaigns||[]; S.employees = S.employees||[];
    (S.clients||[]).forEach(c=>{
      if(c.dial===undefined){
        let raw = (c.phone||"").trim();
        let dial="+221", local=raw;
        const m = raw.match(/^(\+\d{1,4})[\s.-]*(.*)$/);
        if(m){ dial=m[1].replace(/\s/g,""); local=m[2]; }
        c.dial = dial; c.local = (local||"").replace(/[^\d]/g,"");
        c.phone = c.local ? (c.dial+" "+c.local) : "";
      }
    });
  }
  if (!S.version || S.version < 5) {
    S.version = 5; S.objectives = S.objectives || {}; S.campaigns = S.campaigns || []; S.employees = S.employees || [];
  }
  if (S.orderSeq === undefined) S.orderSeq = (S.orders?.length||0)+1;
  if (S.poSeq === undefined) S.poSeq = (S.purchases?.length||0)+1;
}

/* Téléphone : helpers */
function normPhone(dial, local){ return (local||"").replace(/[^\d]/g,""); }
function fullPhone(c){ return c.local ? (c.dial+" "+c.local) : ""; }
function phoneExists(dial, local, exceptId){
  const n = normPhone(dial, local); if(!n) return false;
  return S.clients.some(c=> c.id!==exceptId && c.dial===dial && normPhone(c.dial,c.local)===n);
}

/* ================== CALCULS METIER ================== */
const orderTotal = o => o.lines.reduce((a,l)=>a+l.qty*l.price,0);
const orderPaid  = o => (o.payments||[]).reduce((a,p)=>a+p.amount,0);
const orderDue   = o => Math.max(0, orderTotal(o) - orderPaid(o));
const orderCost  = o => o.lines.reduce((a,l)=>{ const p=S.products.find(p=>p.id===l.productId); return a+l.qty*(p?p.cost:0); },0);
const clientName = id => S.clients.find(c=>c.id===id)?.name || "—";
const prodName   = id => S.products.find(p=>p.id===id)?.name || "—";

function refreshStatus(o){
  if (o.status==="cancelled") return;
  if (!o.delivered) o.status = "pending";
  else o.status = orderDue(o) <= 0 ? "paid" : "delivered";
}
function deliveryLabel(o){
  if(o.status==="cancelled") return '<span class="badge off">Annulée</span>';
  return o.delivered ? '<span class="badge delivered">Livrée</span>' : '<span class="badge pending">Non livrée</span>';
}
function payLabel(o){
  if(o.status==="cancelled") return "—";
  const due=orderDue(o);
  if(due<=0) return '<span class="badge paid">Payée</span>';
  if(orderPaid(o)>0) return '<span class="badge credit">Partiel</span>';
  return '<span class="badge pending">Impayée</span>';
}
function kpis(){
  const m = monthKey();
  const live = S.orders.filter(o=>o.status!=="cancelled");
  const delivered = live.filter(o=>o.status!=="pending");
  const caMonth = delivered.filter(o=>monthKey(o.date)===m).reduce((a,o)=>a+orderTotal(o),0);
  const margeMonth = delivered.filter(o=>monthKey(o.date)===m).reduce((a,o)=>a+orderTotal(o)-orderCost(o),0);
  let encMonth=0, cashIn=0;
  live.forEach(o=>(o.payments||[]).forEach(p=>{ cashIn+=p.amount; if(monthKey(p.date)===m) encMonth+=p.amount; }));
  const credit = delivered.reduce((a,o)=>a+orderDue(o),0);
  const activeClients = new Set(live.filter(o=>monthKey(o.date)===m).map(o=>o.clientId)).size;
  const alerts = S.products.filter(p=>p.stock<=p.alert);
  const stockValue = S.products.reduce((a,p)=>a+p.stock*p.cost,0);
  const cashOut = S.expenses.reduce((a,e)=>a+e.amount,0);
  return {caMonth, margeMonth, encMonth, credit, activeClients, alerts, stockValue, solde:cashIn-cashOut};
}

function globalSearchHTML(){
  const q = searchQ.trim().toLowerCase(); if (q.length < 2) return "";
  const qd = q.replace(/\s/g,"");
  const cs = S.clients.filter(c => c.name.toLowerCase().includes(q) || (c.phone||"").replace(/\s/g,"").includes(qd)).slice(0,6);
  const os = S.orders.filter(o => o.num.toLowerCase().includes(q) || clientName(o.clientId).toLowerCase().includes(q)).slice(0,6);
  const ps = S.products.filter(p => p.name.toLowerCase().includes(q)).slice(0,5);
  if (!cs.length && !os.length && !ps.length) return `<div class="hsr-empty">Aucun résultat pour « ${esc(searchQ)} »</div>`;

  if(cs.length){ h += `<div class="hsr-cat">Clients</div>` + cs.map(c=>{

  }).join(""); }

    return `<div class="hsr-item" data-goorder="${o.id}"><b>${esc(o.num)}</b> · ${esc(clientName(o.clientId))} · ${fmt(orderTotal(o))}${due?` <span style="color:var(--terra)">— reste ${fmt(due)}</span>`:` <span style="color:var(--vert)">— soldée</span>`}</div>`;

function orderRow(o){
  const due = orderDue(o); let act = "";
  if (o.status!=="cancelled") {
    if (!o.delivered && can("orders_deliver")) act += `<button class="btn sm b" data-deliver="${o.id}">Livrer</button> `;
    if (due>0 && can("orders_pay")) act += `<button class="btn sm" data-quickpay="${o.id}">Encaisser</button> `;
    if (can("orders_edit")) act += `<button class="btn sm ghost" data-oedit="${o.id}">Modifier</button> `;
    act += `<button class="btn sm ghost" data-oreceipt="${o.id}">Reçu</button> `;
    if (can("orders_cancel")) act += `<button class="btn sm" style="background:var(--rouge)" data-ocancel="${o.id}">Annuler</button>`;
  } else { act = `<span class="muted">${esc(o.cancelReason||"annulée")}</span>`; }
  const overdue = o.payMode==="credit" && o.dueDate && due>0 && o.dueDate < today();
  const dueCell = due&&o.status!=="cancelled" ? '<b style="color:var(--terra)">'+fmt(due)+'</b>'+(overdue?' <span class="badge alert">échue</span>':o.dueDate?' <span class="muted">éch. '+o.dueDate+'</span>':'') : "—";
  return `<tr${o.__hl?' style="background:#FFF7E6"':''}><td><b><a href="#" data-odetail="${o.id}" style="color:var(--bleu);text-decoration:underline;cursor:pointer">${esc(o.num)}</a></b></td><td>${o.date}</td><td><a href="#" data-cdetail="${o.clientId}" style="color:var(--anthra);cursor:pointer">${esc(clientName(o.clientId))}</a></td>
    <td class="num">${fmt(orderTotal(o))}</td><td class="num">${dueCell}</td><td>${deliveryLabel(o)}</td><td>${payLabel(o)}</td><td>${act}</td></tr>`;
}

function vControl(){
  const cf=ctrlFrom(), ct=ctrlTo();
  const deliv = S.orders.filter(o=>o.status!=="cancelled" && o.delivered && (!cf||o.date>=cf) && (!ct||o.date<=ct));
  const exp = S.expenses.filter(e=>(!cf||e.date>=cf) && (!ct||e.date<=ct));
  const totalCA = deliv.reduce((a,o)=>a+orderTotal(o),0);
  const totalCost = deliv.reduce((a,o)=>a+orderCost(o),0);
  const brute = totalCA - totalCost;
  const charges = exp.reduce((a,e)=>a+e.amount,0);
  const net = brute - charges;
  return `<h2>Contrôle de Gestion & Performance</h2>
  <div class="panel"><div class="row" style="align-items:flex-end">
    <div><label style="margin:0">Du</label><input type="date" id="ct-from" value="${cf}"></div>
    <div><label style="margin:0">Au</label><input type="date" id="ct-to" value="${ct}"></div>
    <button class="btn sm" id="ct-apply">Calculer la période</button>
  </div></div>
  <div class="grid2">
    <div class="panel" style="border-top:4px solid var(--bleu)"><h3>Compte de Résultat de la Période</h3>
      <table style="margin-top:10px">
        <tr><td><b>Chiffre d'Affaires Net (Marchandises livrées)</b></td><td class="num" style="font-weight:700">${fmt(totalCA)}</td></tr>
        <tr><td>(-) Coût d'achat de la marchandise vendue</td><td class="num r" style="color:var(--rouge)">-${fmt(totalCost)}</td></tr>
        <tr style="background:#EDF2F8"><td style="color:var(--vert);font-weight:700"><b>MARGE BRUTE GLOBALE</b></td><td class="num g" style="color:var(--vert);font-weight:700">${fmt(brute)} (${totalCA?Math.round(brute/totalCA*100):0}%)</td></tr>
        <tr><td>(-) Charges d'exploitation & Dépenses décaissées</td><td class="num r" style="color:var(--rouge)">-${fmt(charges)}</td></tr>
        <tr style="background:var(--bleu);color:#fff"><td><b>RÉSULTAT NET AVANT IMPÔT (EBIT)</b></td><td class="num" style="font-weight:700;font-size:15px">${fmt(net)}</td></tr>
      </table>
    </div>
    <div class="panel"><h3>Structure des coûts d'exploitation</h3><div style="max-width:320px;margin:10px auto"><canvas id="ctrlChart"></canvas></div></div>
  </div>`;
}

function initCtrlChart(){
  const ctx = el("ctrlChart"); if(!ctx) return;
  const cf=ctrlFrom(), ct=ctrlTo();
  const exp = S.expenses.filter(e=>(!cf||e.date>=cf) && (!ct||e.date<=ct));
  const cats = {}; exp.forEach(e=>cats[e.category]=(cats[e.category]||0)+e.amount);
  const labels=Object.keys(cats), data=Object.values(cats);
  if(!labels.length){ ctx.parentElement.innerHTML="<p class='empty'>Aucune dépense sur cette période.</p>"; return; }

}

/* ================== MODALE ET STRUCTURAL RENDERING ================== */
function openModal(html){
  modalContent = html;
  el("modal").innerHTML = `<div class="modalbg" id="modalbg"><div class="modal">${html}</div></div>`;
  el("modalbg").onclick = e=>{ if(e.target.id==="modalbg") closeModal(); };
  bindModalEvents();
}
function closeModal(){ modalContent=null; el("modal").innerHTML=""; }

function buildEntries(from, to){
  const E = []; const inRange = d => (!from || d>=from) && (!to || d<=to);
  S.orders.filter(o=>o.status!=="cancelled" && o.delivered && inRange(o.date)).forEach(o=>{
    const tot = orderTotal(o);
    E.push({ date:o.date, journal:"VE", num:o.num, label:`Vente ${o.num} ${clientName(o.clientId)}`, account:"411", debit:tot, credit:0 });
    E.push({ date:o.date, journal:"VE", num:o.num, label:`Vente ${o.num} ${clientName(o.clientId)}`, account:"701", debit:0, credit:tot });
    const cost = orderCost(o);
    if(cost>0){
      E.push({ date:o.date, journal:"OD", num:o.num, label:`Sortie stock ${o.num}`, account:"6031", debit:cost, credit:0 });
      E.push({ date:o.date, journal:"OD", num:o.num, label:`Sortie stock ${o.num}`, account:"311", debit:0, credit:cost });
    }
  });
  S.orders.filter(o=>o.status!=="cancelled").forEach(o=>{
    (o.payments||[]).forEach(p=>{
      if(inRange(p.date)){
        const acc = p.method==="Banque"||p.method==="Chèque"?"521":"571";
        E.push({ date:p.date, journal:"BQ", num:o.num, label:`Règlement ${o.num} par ${p.method}`, account:acc, debit:p.amount, credit:0 });
        E.push({ date:p.date, journal:"BQ", num:o.num, label:`Règlement ${o.num} par ${p.method}`, account:"411", debit:0, credit:p.amount });
      }
    });
  });
  S.expenses.filter(e=>inRange(e.date)).forEach(e=>{
    const dacc = e.category.startsWith("Carburant")?"612":e.category.startsWith("Loyer")?"622":e.category.startsWith("Salaires")?"661":e.category.startsWith("Marketing")?"627p":"646";
    const cracc = e.method==="Banque"?"521":"571";
    E.push({ date:e.date, journal:"CA", num:`DEP-${e.id}`, label:`Dépense: ${e.label}`, account:dacc, debit:e.amount, credit:0 });
    E.push({ date:e.date, journal:"CA", num:`DEP-${e.id}`, label:`Dépense: ${e.label}`, account:cracc, debit:0, credit:e.amount });
  });
  return E.sort((a,b)=>a.date.localeCompare(b.date));
}

/* ================== RENDU PRINCIPAL AUTOMATISÉ ================== */
function render(){
  const r = el("root"); if(!r) return;
  if (!S.users.length) { r.innerHTML = vSetup(); bindSetup(); return; }
  if (!session) { r.innerHTML = vLogin(); bindLogin(); return; }
  let html = "";
  switch(tab){
    case "dash": html = vDash(); break; case "orders": html = vOrders(); break;
    case "clients": html = vClients(); break; case "products": html = vProducts(); break;
    case "suppliers": html = vSuppliers(); break; case "logistics": html = vLogistics(); break;
    case "cash": html = vCash(); break; case "accounting": html = vAccounting(); break;
    case "control": html = vControl(); break; case "marketing": html = vMarketing(); break;
    case "hr": html = vHr(); break; case "monitoring": html = vMonitoring(); break;
    case "users": html = vUsers(); break; case "backup": html = vBackup(); break;
  }
  r.innerHTML = chrome(html);
  bindApp();
  if (tab==="control") initCtrlChart();
}

/* ================== BINDINGS LOGIQUES & ACTIONS (VENDEURS ET ADMINS) ================== */
function bindSetup(){
  el("su-go").onclick = async ()=>{
    const name=el("su-name").value.trim(), login=el("su-login").value.trim().toLowerCase();
    const p1=el("su-pass").value, p2=el("su-pass2").value;
    if(!name||!login||!p1) return toast("Tous les champs sont requis");
    if(p1!==p2) return toast("Les mots de passe diffèrent");
    if(p1.length<4) return toast("Le mot de passe doit faire 4 caractères minimum");
    const salt = Math.random().toString(36).slice(2,10);
    const hash = await sha256(salt+p1);
    S.users.push({ id:nid(), name, login, salt, hash, role:"admin", perms:{} });
    log("Compte administrateur fondateur créé");
    await save(); render();
  };
}

function bindLogin(){
  const go = async ()=>{
    const login=el("lg-login").value.trim().toLowerCase(), pass=el("lg-pass").value;
    const u = S.users.find(x=>x.login===login);
    if(!u) return toast("Identifiant inconnu");
    if(u.active===false) return toast("Compte désactivé — voir l'administrateur");
    const h = await sha256(u.salt+pass);
    if(h!==u.hash) return toast("Mot de passe incorrect");
    session = { userId:u.id }; log("Connexion");
    await save(); await saveSession(); tab="dash"; render();
    toast("Bonjour "+u.name+" 👋");
  };
  el("lg-go").onclick = go;
  el("lg-pass").onkeydown = e=>{ if(e.key==="Enter") go(); };
}
