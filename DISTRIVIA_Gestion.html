<script>
/* >>> 1. COLLEZ VOTRE firebaseConfig ENTRE LES ACCOLADES <<< */
const firebaseConfig = {

  projectId: "distrivia-group",

  appId: "1:379306867104:web:08d849ee32095d67a88cc5"
};
/* >>> 2. Ne touchez a rien d'autre. <<< */

const FB_OK = !!(firebaseConfig.apiKey && firebaseConfig.projectId);
let fbDoc = null;
let fbUnsub = null;
const FB_DOCID = "etat";

if (FB_OK) {
  try {
    firebase.initializeApp(firebaseConfig);
    fbDoc = firebase.firestore().collection("distrivia").doc(FB_DOCID);
    // Connexion anonyme : laissez-passer Firebase (compatible avec la règle "request.auth != null").
    // Les vrais comptes (admin/employés) restent gérés par l'application.
    if (firebase.auth) {
      firebase.auth().signInAnonymously().catch(e=>console.warn("Auth anonyme:", e && e.code));
    }
  } catch(e){ console.error("Firebase init:", e); }
}
window.DISTRIVIA_FB = {
  ok: FB_OK,
  async ready(){
    if(!FB_OK || !firebase.auth) return;
    if(firebase.auth().currentUser) return;
    await new Promise(res=>{
      const to=setTimeout(res, 4000);
      const unsub=firebase.auth().onAuthStateChanged(u=>{ if(u){ clearTimeout(to); unsub(); res(); } });
    });
  },
  async get(){
    if(!fbDoc) return null;
    const snap = await fbDoc.get();
    return snap.exists ? (snap.data().blob || null) : null;
  },
  async set(blob){
    if(!fbDoc) return;
    await fbDoc.set({ blob, updated: Date.now() });
  },
  listen(cb){
    if(!fbDoc) return;
    if(fbUnsub) fbUnsub();
    fbUnsub = fbDoc.onSnapshot(snap=>{
      if(!snap.exists) return;
      const d = snap.data();
      if(d && d.blob){ cb(d.blob, snap.metadata.hasPendingWrites); }
    }, err=>console.warn("Firestore listen:", err));
  },
  /* ---- Accès aux collections du PORTAIL clients/fournisseurs ---- */
  async listCollection(name){
    if(!FB_OK) return [];
    try{
      const fs = firebase.firestore();
      const snap = await fs.collection(name).get();
      return snap.docs.map(d=>({ _id:d.id, ...d.data() }));
    }catch(e){ console.warn("listCollection "+name+":", e); return []; }
  },
  listenCollection(name, cb){
    if(!FB_OK) return;
    try{
      const fs = firebase.firestore();
      return fs.collection(name).onSnapshot(snap=>{
        cb(snap.docs.map(d=>({ _id:d.id, ...d.data() })));
      }, err=>console.warn("listen "+name+":", err));
    }catch(e){ console.warn(e); }
  },
  async updateDoc(name, id, patch){
    if(!FB_OK) return;
    try{ await firebase.firestore().collection(name).doc(id).update(patch); }
    catch(e){ console.warn("updateDoc:", e); }
  },
  async setDoc(name, id, data){
    if(!FB_OK) return;
    try{ await firebase.firestore().collection(name).doc(id).set(data); }
    catch(e){ console.warn("setDoc:", e); }
  },
  async deleteDoc(name, id){
    if(!FB_OK) return;
    try{ await firebase.firestore().collection(name).doc(id).delete(); }
    catch(e){ console.warn("deleteDoc:", e); }
  }
};
</script>

/* ================== STOCKAGE ADAPTATIF ==================
   1) Firebase Firestore (base partagée entre tous les appareils)  ← prioritaire
   2) window.storage (application dans Claude)
   3) localStorage (site publié sans Firebase)
   4) mémoire seule (dernier recours)
   La SESSION (qui est connecté) reste toujours locale à l'appareil. */
const localStore = (() => {
  if (typeof window !== "undefined" && window.storage && window.storage.get) {
    return {
      mode: "claude",
      async get(k){ try{ const r = await window.storage.get(k); return r ? r.value : null; }catch(e){ return null; } },
      async set(k,v){ await window.storage.set(k, v); },
      async del(k){ try{ await window.storage.delete(k); }catch(e){} },
    };
  }
  try {
    const t = "__t" + Date.now();
    window.localStorage.setItem(t, "1"); window.localStorage.removeItem(t);
    return {
      mode: "local",
      async get(k){ return window.localStorage.getItem(k); },
      async set(k,v){ window.localStorage.setItem(k, v); },
      async del(k){ window.localStorage.removeItem(k); },
    };
  } catch(e) {
    const mem = {};
    return {
      mode: "memory",
      async get(k){ return mem[k] ?? null; },
      async set(k,v){ mem[k] = v; },
      async del(k){ delete mem[k]; },
    };
  }
})();

const FB = window.DISTRIVIA_FB || { ok:false };
const store = {
  // mode affiché : firebase si configuré, sinon le stockage local détecté
  mode: FB.ok ? "firebase" : localStore.mode,
  async get(k){
    // Les données métier passent par Firebase ; la session reste locale.
    if (FB.ok && k === KEY){
      try{ const blob = await FB.get(); return blob; }catch(e){ console.warn("FB get:", e); return await localStore.get(k); }
    }
    return await localStore.get(k);
  },
  async set(k,v){
    if (FB.ok && k === KEY){
      try{ await FB.set(v); return; }catch(e){ console.warn("FB set:", e); }

};

// Compresse/redimensionne une image en data-URL JPEG (pour le stockage léger)
function compressImage(file, maxSize, quality){
  return new Promise((resolve, reject)=>{
    if(!file || !file.type.startsWith("image/")) return reject("non image");
    const reader = new FileReader();
    reader.onload = e=>{
      const img = new Image();
      img.onload = ()=>{
        let {width:w, height:h} = img;
        const m = maxSize||500;
        if(w>h){ if(w>m){ h=Math.round(h*m/w); w=m; } }
        else { if(h>m){ w=Math.round(w*m/h); h=m; } }
        const cv=document.createElement("canvas"); cv.width=w; cv.height=h;
        const ctx=cv.getContext("2d"); ctx.fillStyle="#fff"; ctx.fillRect(0,0,w,h); ctx.drawImage(img,0,0,w,h);
        try{ resolve(cv.toDataURL("image/jpeg", quality||.72)); }catch(err){ reject(err); }
      };
      img.onerror=reject; img.src=e.target.result;
    };
    reader.onerror=reject; reader.readAsDataURL(file);
  });
}

async function sha256(txt){
  if (window.crypto && crypto.subtle) {
    const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(txt));
    return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,"0")).join("");
  }
  let h = 0; for (let i=0;i<txt.length;i++){ h = (h*31 + txt.charCodeAt(i))|0; } return "x"+(h>>>0).toString(16);
}

let fbSyncing = false;   // true pendant qu'on applique une mise à jour distante
async function loadAll(){
  if (FB.ok && FB.ready){ try{ await FB.ready(); }catch(e){} }
  try{ const raw = await store.get(KEY); if(raw) S = JSON.parse(raw); }catch(e){}
  migrate();
  // Si Firebase est vide (toute première utilisation), on y écrit l'état initial
  if (FB.ok){
    try{ const exists = await FB.get(); if(!exists) await save(); }catch(e){}
  }
  try{ const rs = await store.get(KEY_SESSION); if(rs) session = JSON.parse(rs); }catch(e){}
  if (session && !me()) session = null;
  render();
  // QR agent : ?fac=FAC-XXXX → ouvre directement la facture une fois connecté
  try{
    const facParam = new URLSearchParams(location.search).get("fac");
    if(facParam && me()){
      const o = S.orders.find(x=> x.invoiceNum===facParam || x.num===facParam);
      if(o){ tab="invoices"; render(); setTimeout(()=>openOrderDetail(o.id), 150); }
      else { setTimeout(()=>toast("Facture "+facParam+" introuvable"), 400); }
      // nettoie l'URL pour éviter de rouvrir au refresh
      try{ history.replaceState(null,"",location.pathname); }catch(e){}
    }
  }catch(e){}
  // Écoute temps réel : tout changement venu d'un autre appareil rafraîchit l'écran
  if (FB.ok){
    FB.listen((blob, localWrite)=>{
      if (localWrite) return; // c'est notre propre écriture, on ignore
      try{
        const incoming = JSON.parse(blob);
        // on ne touche pas si on est en train d'éditer un formulaire sensible
        S = incoming; migrate();
        if (session && !me()) session = null;
        fbSyncing = true; render(); fbSyncing = false;
      }catch(e){ console.warn("sync:", e); }
    });
    // Écoute des données du portail clients/fournisseurs
    if (FB.listenCollection){
      FB.listenCollection("portal_orders", rows=>{ webOrders=rows; webLoaded=true; if(tab==="weborders"&&me()) render(); refreshWebBadge(); });
      FB.listenCollection("portal_appointments", rows=>{ webAppointments=rows; if(tab==="weborders"&&me()) render(); refreshWebBadge(); });
      FB.listenCollection("portal_threads", rows=>{ webThreads=rows; if((tab==="weborders"||tab==="messages")&&me()) render(); refreshWebBadge(); });
      FB.listenCollection("portal_quotes", rows=>{ webQuotes=rows; if(tab==="weborders"&&me()) render(); refreshWebBadge(); });
    }
  }
}

function migrate(){
  if (!S.version || S.version < 2) {
    S.version = 2; S.users = S.users||[]; S.logs = S.logs||[]; S.orderSeq = S.orderSeq||1;
    (S.orders||[]).forEach(o=>{
      if(!o.num) o.num = "CMD-" + String(S.orderSeq++).padStart(4,"0");
      if(!o.payments){
        const tot = o.lines.reduce((a,l)=>a+l.qty*l.price,0);
        o.payments = (o.status==="paid") ? [{id:nid(), date:o.paidDate||o.date, amount:tot, by:"—"}] : [];
      }
    });
  }
  if (!S.version || S.version < 3) {
    S.version = 3;
    S.suppliers = S.suppliers||[]; S.purchases = S.purchases||[]; S.poSeq = S.poSeq||1;
    (S.orders||[]).forEach(o=>{
      // dissociation livraison / paiement : champ delivered explicite
      if(o.delivered===undefined) o.delivered = (o.status==="delivered"||o.status==="paid");
      if(o.payments) o.payments.forEach(p=>{ if(!p.method) p.method="Espèces"; });
      if(o.dueDate===undefined) o.dueDate = o.payMode==="credit" ? null : null;
    });
  }
  if (!S.version || S.version < 4) {
    S.version = 4;
    S.campaigns = S.campaigns||[]; S.employees = S.employees||[];
    // Téléphone : séparer code pays et numéro local à partir du champ phone existant
    (S.clients||[]).forEach(c=>{
      if(c.dial===undefined){
        let raw = (c.phone||"").trim();
        let dial="+221", local=raw;
        const m = raw.match(/^(\+\d{1,4})[\s.-]*(.*)$/);
        if(m){ dial=m[1].replace(/\s/g,""); local=m[2]; }
        c.dial = dial;
        c.local = (local||"").replace(/[^\d]/g,"");
        c.phone = c.local ? (c.dial+" "+c.local) : "";
      }
    });
  }
  if (!S.version || S.version < 5) {
    S.version = 5;
    S.objectives = S.objectives || {};   // { "YYYY-MM": {ca, orders, encaissement, newClients} }
    S.campaigns = S.campaigns || [];
    S.employees = S.employees || [];
  }
  if (!S.version || S.version < 6) {
    S.version = 6;
    // Paramètres TVA (Sénégal : 18 %). Prix saisis = TTC par défaut.
    S.settings = S.settings || {};
    if(S.settings.tvaRate === undefined) S.settings.tvaRate = 18;
    if(S.settings.tvaEnabled === undefined) S.settings.tvaEnabled = true;
    if(S.settings.pricesTTC === undefined) S.settings.pricesTTC = true; // les prix produits incluent la TVA
    if(S.settings.ninea === undefined) S.settings.ninea = "";
    if(S.settings.rccm === undefined) S.settings.rccm = "";
    // Commandes : assujetties à la TVA par défaut
    (S.orders||[]).forEach(o=>{ if(o.tvaApplicable===undefined) o.tvaApplicable = true; });
    // Achats : TVA déductible saisissable (par défaut le montant est TTC, TVA récupérable)
    (S.purchases||[]).forEach(p=>{ if(p.tvaDeductible===undefined) p.tvaDeductible = true; });
  }
  if (!S.version || S.version < 7) {
    S.version = 7;
    S.announcements = S.announcements || []; // notes/promos publiées vers le portail
  }
  if (!S.version || S.version < 8) {
    S.version = 8;
    // Facturation
    if(S.invoiceSeq === undefined) S.invoiceSeq = 1;
    // Programme de fidélité
    S.settings = S.settings || {};
    if(S.settings.loyaltyEnabled === undefined) S.settings.loyaltyEnabled = true;
    if(S.settings.loyaltyRate === undefined) S.settings.loyaltyRate = 1; // 1 point par tranche de loyaltyPer FCFA
    if(S.settings.loyaltyPer === undefined) S.settings.loyaltyPer = 1000; // 1 point / 1000 F livrés
    (S.clients||[]).forEach(c=>{ if(c.points===undefined) c.points = 0; });
    // Messagerie (réclamations enrichies en conversation) : champ replies[]
  }
  if (!S.version || S.version < 9) {
    S.version = 9;
    // Matricule client unique (CLI-XXXX)
    if(S.clientSeq === undefined) S.clientSeq = 1;
    (S.clients||[]).slice().sort((a,b)=>a.id-b.id).forEach(c=>{
      if(!c.matricule){ c.matricule = "CLI-"+String(S.clientSeq++).padStart(4,"0"); }
    });
  }
  if (S.orderSeq === undefined) S.orderSeq = (S.orders?.length||0)+1;
  if (S.poSeq === undefined) S.poSeq = (S.purchases?.length||0)+1;
  if (S.invoiceSeq === undefined) S.invoiceSeq = 1;
  if (S.clientSeq === undefined) S.clientSeq = (S.clients?.length||0)+1;
  if (!S.settings) S.settings = { tvaRate:18, tvaEnabled:true, pricesTTC:true, ninea:"", rccm:"" };
  if (S.settings.loyaltyEnabled === undefined){ S.settings.loyaltyEnabled=true; S.settings.loyaltyRate=1; S.settings.loyaltyPer=1000; }
  if (!S.announcements) S.announcements = [];
  if (!S.promos) S.promos = [];
  (S.clients||[]).forEach(c=>{ if(c.points===undefined) c.points=0; if(!c.matricule){ c.matricule="CLI-"+String(S.clientSeq++).padStart(4,"0"); } });
}

/* Téléphone : helpers */
function normPhone(dial, local){ return (local||"").replace(/[^\d]/g,""); }
function fullPhone(c){ return c.local ? (c.dial+" "+c.local) : ""; }
function phoneExists(dial, local, exceptId){
  const n = normPhone(dial, local);
  if(!n) return false;
  return S.clients.some(c=> c.id!==exceptId && c.dial===dial && normPhone(c.dial,c.local)===n);
}

/* ================== CALCULS ================== */
const orderTotal = o => o.lines.reduce((a,l)=>a+l.qty*l.price,0);
const orderPaid  = o => (o.payments||[]).reduce((a,p)=>a+p.amount,0);
const orderDue   = o => Math.max(0, orderTotal(o) - orderPaid(o));
const orderCost  = o => o.lines.reduce((a,l)=>{ const p=S.products.find(p=>p.id===l.productId); return a+l.qty*(p?p.cost:0); },0);

/* ===== TVA (Sénégal 18 % par défaut) — prix saisis = TTC ===== */
function tvaRate(){ return (S.settings && S.settings.tvaEnabled) ? (S.settings.tvaRate||0) : 0; }
// Pour une commande : décompose le TTC en HT + TVA (si la commande est assujettie)
function orderTVA(o){
  if(!o.tvaApplicable || !tvaRate()) return 0;
  const ttc = orderTotal(o);
  const ht = ttc / (1 + tvaRate()/100);
  return ttc - ht;
}
function orderHT(o){
  const ttc = orderTotal(o);
  return (o.tvaApplicable && tvaRate()) ? ttc/(1+tvaRate()/100) : ttc;
}
// Pour un achat : TVA déductible incluse dans le montant (TTC)
function purchaseTVA(p){
  if(!p.tvaDeductible || !tvaRate()) return 0;
  const ht = p.amount/(1+tvaRate()/100);
  return p.amount - ht;
}
const clientName = id => S.clients.find(c=>c.id===id)?.name || "—";
const prodName   = id => S.products.find(p=>p.id===id)?.name || "—";
function refreshStatus(o){
  if (o.status==="cancelled") return;
  // statut = combinaison livraison + paiement, désormais indépendants
  if (!o.delivered) o.status = "pending";
  else o.status = orderDue(o) <= 0 ? "paid" : "delivered";
}
function deliveryLabel(o){
  if(o.status==="cancelled") return '<span class="badge off">Annulée</span>';
  return o.delivered ? '<span class="badge delivered">Livrée</span>' : '<span class="badge pending">Non livrée</span>';
}
function payLabel(o){
  if(o.status==="cancelled") return "—";
  const due=orderDue(o);
  if(due<=0) return '<span class="badge paid">Payée</span>';
  if(orderPaid(o)>0) return '<span class="badge credit">Partiel</span>';
  return '<span class="badge pending">Impayée</span>';
}
function kpis(){
  const m = monthKey();
  const live = S.orders.filter(o=>o.status!=="cancelled");
  const delivered = live.filter(o=>o.status!=="pending");
  const caMonth = delivered.filter(o=>monthKey(o.date)===m).reduce((a,o)=>a+orderTotal(o),0);
  const margeMonth = delivered.filter(o=>monthKey(o.date)===m).reduce((a,o)=>a+orderTotal(o)-orderCost(o),0);
  let encMonth=0, cashIn=0;
  live.forEach(o=>(o.payments||[]).forEach(p=>{ cashIn+=p.amount; if(monthKey(p.date)===m) encMonth+=p.amount; }));
  const credit = delivered.reduce((a,o)=>a+orderDue(o),0);
  const activeClients = new Set(live.filter(o=>monthKey(o.date)===m).map(o=>o.clientId)).size;
  const alerts = S.products.filter(p=>p.stock<=p.alert);
  const stockValue = S.products.reduce((a,p)=>a+p.stock*p.cost,0);
  const cashOut = S.expenses.reduce((a,e)=>a+e.amount,0);
  return {caMonth, margeMonth, encMonth, credit, activeClients, alerts, stockValue, solde:cashIn-cashOut};
}

function globalSearchHTML(){
  const q = searchQ.trim().toLowerCase();
  if (q.length < 2) return "";
  const qd = q.replace(/\s/g,"");
  const cs = S.clients.filter(c => c.name.toLowerCase().includes(q) || (c.phone||"").replace(/\s/g,"").includes(qd)).slice(0,6);
  const os = S.orders.filter(o => o.num.toLowerCase().includes(q) || clientName(o.clientId).toLowerCase().includes(q)).slice(0,6);
  const ps = S.products.filter(p => p.name.toLowerCase().includes(q)).slice(0,5);
  if (!cs.length && !os.length && !ps.length) return `<div class="hsr-empty">Aucun résultat pour « ${esc(searchQ)} »</div>`;
  let h = "";
  if(cs.length){ h += `<div class="hsr-cat">Clients</div>` + cs.map(c=>{
    const cr = S.orders.filter(o=>o.clientId===c.id && o.status==="delivered").reduce((a,o)=>a+orderDue(o),0);
    return `<div class="hsr-item" data-goclient="${c.id}"><b>${esc(c.name)}</b> · ${esc(fullPhone(c)||"—")} · ${esc(c.zone||"")}${cr?` <span style="color:var(--terra)">— doit ${fmt(cr)}</span>`:""}</div>`;
  }).join(""); }
  if(os.length){ h += `<div class="hsr-cat">Commandes</div>` + os.map(o=>{
    const due=orderDue(o);
    return `<div class="hsr-item" data-goorder="${o.id}"><b>${esc(o.num)}</b> · ${esc(clientName(o.clientId))} · ${fmt(orderTotal(o))}${due?` <span style="color:var(--terra)">— reste ${fmt(due)}</span>`:` <span style="color:var(--vert)">— soldée</span>`}</div>`;
  }).join(""); }
  if(ps.length){ h += `<div class="hsr-cat">Produits</div>` + ps.map(p=>
    `<div class="hsr-item" data-goproduct="${p.id}"><b>${esc(p.name)}</b> · ${esc(p.family)} · stock ${p.stock} · ${fmt(p.price)}</div>`
  ).join(""); }
  return h;
}

    <div class="tablewrap"><table><tr><th>Commande</th><th>Client</th><th>Date</th><th class="num">Montant</th><th></th></tr>

        <td><b style="color:var(--bleu)">${esc(x.o.invoiceNum)}</b></td>
        <td>${esc(x.o.num)}</td>

function exportInvoicesCSV(){
  const rows=[["N° Facture","Commande","Client","Date","Total TTC","Payé","Reste","Statut"]];
  S.orders.filter(o=>o.invoiceNum && o.status!=="cancelled").forEach(o=>{
    const due=orderDue(o), paid=orderPaid(o);
    rows.push([o.invoiceNum,o.num,clientName(o.clientId),o.date,orderTotal(o),paid,due, due<=0?"Payée":(paid>0?"Partielle":"Impayée")]);
  });
  const csv=rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(";")).join("\n");
  const blob=new Blob(["\ufeff"+csv],{type:"text/csv;charset=utf-8"}); const a=document.createElement("a");
  a.href=URL.createObjectURL(blob); a.download="distrivia-factures-"+today()+".csv"; a.click();
}

    }).join("") : `<div style="text-align:center;color:#888;padding:30px">Pas encore de message.</div>`;
    chatHTML = `
      <div style="background:var(--bleu);color:#fff;padding:12px 16px;display:flex;align-items:center;gap:10px;border-radius:8px 8px 0 0">
        <div style="width:36px;height:36px;border-radius:50%;background:var(--terra);display:flex;align-items:center;justify-content:center;font-weight:800">${esc((active.party_name||"?").charAt(0).toUpperCase())}</div>
        <div><div style="font-weight:700">${esc(active.party_name||"Client")}</div><div style="font-size:11px;opacity:.8">${esc(active.party_email||"")} ${active.kind==="supplier"?"· Fournisseur":"· Client"}</div></div>
      </div>
      <div id="adm-chat-scroll" style="background:var(--creme);padding:14px;flex:1;overflow-y:auto">${bubbles}</div>
      <div style="display:flex;gap:8px;padding:10px;border-top:1px solid #eee;background:#fff;border-radius:0 0 8px 8px">
        <textarea id="adm-chat-input" rows="1" placeholder="Votre réponse…" style="flex:1;resize:none;border:1px solid #ddd;border-radius:20px;padding:10px 16px;font-family:inherit;font-size:14px"></textarea>
        <button class="btn b" id="adm-chat-send" style="border-radius:20px">Envoyer</button>
      </div>`;
  }
  return `<h2>Messages <span class="muted" style="font-size:14px">— discussions clients & fournisseurs</span></h2>
  <div class="chat-layout">
    <div class="chat-list">${listHTML}</div>

function chatTime(iso){ if(!iso) return ""; const d=new Date(iso); if(isNaN(d)) return (iso||"").slice(0,16).replace("T"," ");
  const t=new Date(); const sd=d.toDateString()===t.toDateString();
  const hh=String(d.getHours()).padStart(2,"0"), mm=String(d.getMinutes()).padStart(2,"0");
  return sd?`${hh}:${mm}`:`${String(d.getDate()).padStart(2,"0")}/${String(d.getMonth()+1).padStart(2,"0")} ${hh}:${mm}`; }
async function bindMessages(){
  // thread actuellement affiché (depuis l'attribut data-active si pas de sélection explicite)
  const mainEl = document.querySelector(".chat-main");
  const shownId = (mainEl && mainEl.dataset.active) ? mainEl.dataset.active : activeThreadId;
  if(!activeThreadId && shownId) activeThreadId = shownId;
  document.querySelectorAll("[data-thread]").forEach(it=> it.onclick = async ()=>{
    activeThreadId = it.dataset.thread;
    const t = webThreads.find(x=>x._id===activeThreadId);
    if(t && t.unreadForAdmin){ t.unreadForAdmin=false; if(FB.updateDoc) await FB.updateDoc("portal_threads", t._id, {unreadForAdmin:false}); }
    render();
  });
  const sc=el("adm-chat-scroll"); if(sc) sc.scrollTop=sc.scrollHeight;
  const send=el("adm-chat-send"), input=el("adm-chat-input");
  const doSend = async ()=>{
    const tid = activeThreadId || shownId;
    const t = webThreads.find(x=>x._id===tid); if(!t){ toast("Sélectionnez une conversation"); return; }
    const txt=(input.value||"").trim(); if(!txt) return; input.value="";
    const msg={ from:"DISTRIVIA", text:txt, date:new Date().toISOString(), by:me().name };
    t.messages=[...(t.messages||[]), msg]; t.lastFrom="DISTRIVIA"; t.lastText=txt; t.updated=new Date().toISOString(); t.unreadForAdmin=false;
    const s=el("adm-chat-scroll"); if(s){ s.innerHTML += `<div style="display:flex;justify-content:flex-end;margin:6px 0"><div style="max-width:72%;background:var(--bleu);color:#fff;padding:9px 13px;border-radius:14px;border-bottom-right-radius:4px"><div style="font-size:14px;white-space:pre-wrap">${esc(txt)}</div><div style="font-size:10px;opacity:.6;text-align:right;margin-top:3px">${chatTime(msg.date)}</div></div></div>`; s.scrollTop=s.scrollHeight; }
    log("Message envoyé à "+(t.party_name||"client"));
    const {_id, ...clean} = t;
    if(FB.setDoc) await FB.setDoc("portal_threads", t._id, clean);
    else if(FB.updateDoc) await FB.updateDoc("portal_threads", t._id, { messages:t.messages, lastFrom:"DISTRIVIA", lastText:txt, updated:t.updated, unreadForAdmin:false });
  };
  if(send) send.onclick = doSend;
  if(input) input.onkeydown = e=>{ if(e.key==="Enter" && !e.shiftKey){ e.preventDefault(); doSend(); } };
}

// Données pour graphiques
function last6Months(){
  const arr=[]; const d=new Date();
  for(let i=5;i>=0;i--){ const x=new Date(d.getFullYear(),d.getMonth()-i,1); arr.push(x.toISOString().slice(0,7)); }
  return arr;
}
function drawCharts(){
  if(typeof Chart==="undefined") return;
  const months=last6Months();
  const lbl=months.map(m=>{const [y,mo]=m.split("-");return ["jan","fév","mar","avr","mai","jun","jul","aoû","sep","oct","nov","déc"][+mo-1]+" "+y.slice(2);});
  const live=S.orders.filter(o=>o.status!=="cancelled");
  // CA par mois (livré)
  const caM=months.map(m=>live.filter(o=>o.delivered&&monthKey(o.date)===m).reduce((a,o)=>a+orderTotal(o),0));
  const ctx1=el("ch-ca"); if(ctx1) new Chart(ctx1,{type:"bar",data:{labels:lbl,datasets:[{label:"CA",data:caM,backgroundColor:"#0F2A4A"}]},options:chartOpts()});
  // CA par famille
  const fam={}; live.filter(o=>o.delivered).forEach(o=>o.lines.forEach(l=>{const p=S.products.find(p=>p.id===l.productId); const f=p?p.family:"Autre"; fam[f]=(fam[f]||0)+l.qty*l.price;}));
  const ctx2=el("ch-fam"); if(ctx2) new Chart(ctx2,{type:"doughnut",data:{labels:Object.keys(fam),datasets:[{data:Object.values(fam),backgroundColor:["#0F2A4A","#C85E2D","#2E6B3E","#888880","#1B3D63","#D89B6C","#5A8C6A","#A33B3B"]}]},options:{plugins:{legend:{position:"right",labels:{font:{size:10}}}}}});
  // Top clients
  const cli={}; live.filter(o=>o.delivered).forEach(o=>{cli[o.clientId]=(cli[o.clientId]||0)+orderTotal(o);});
  const top=Object.entries(cli).sort((a,b)=>b[1]-a[1]).slice(0,5);
  const ctx3=el("ch-cli"); if(ctx3) new Chart(ctx3,{type:"bar",data:{labels:top.map(t=>clientName(+t[0])),datasets:[{label:"CA",data:top.map(t=>t[1]),backgroundColor:"#C85E2D"}]},options:{indexAxis:"y",...chartOpts()}});
  // Encaissé vs dépensé
  const enc=months.map(m=>{let s=0; live.forEach(o=>(o.payments||[]).forEach(p=>{if(monthKey(p.date)===m)s+=p.amount;})); return s;});
  const dep=months.map(m=>S.expenses.filter(e=>monthKey(e.date)===m).reduce((a,e)=>a+e.amount,0));
  const ctx4=el("ch-cash"); if(ctx4) new Chart(ctx4,{type:"line",data:{labels:lbl,datasets:[{label:"Encaissé",data:enc,borderColor:"#2E6B3E",backgroundColor:"rgba(46,107,62,.1)",fill:true,tension:.3},{label:"Dépensé",data:dep,borderColor:"#A33B3B",backgroundColor:"rgba(163,59,59,.1)",fill:true,tension:.3}]},options:chartOpts(true)});
}
function chartOpts(legend){ return {responsive:true,maintainAspectRatio:true,plugins:{legend:{display:!!legend}},scales:{y:{ticks:{font:{size:9},callback:v=>v>=1000000?(v/1000000)+"M":v>=1000?(v/1000)+"k":v}},x:{ticks:{font:{size:9}}}}}; }

function vCash(){
  const payable = S.orders.filter(o=>o.status!=="cancelled" && orderDue(o)>0).sort((a,b)=>b.id-a.id);
  const cf = cashPeriod.from, ct = cashPeriod.to;
  const inR = d => (!cf || d>=cf) && (!ct || d<=ct);
  const moves = [];
  S.orders.forEach(o=>(o.payments||[]).forEach(p=>{ if(inR(p.date)) moves.push({date:p.date, label:"Versement "+o.num+" — "+clientName(o.clientId)+(p.method?" ["+p.method+"]":"")+(orderDue(o)>0?" (reste "+fmt(orderDue(o))+")":""), amount:p.amount, in:true, by:p.by, oid:o.id, pid:p.id}); }));
  S.expenses.forEach(e=>{ if(inR(e.date)) moves.push({date:e.date, label:e.label+" ("+e.category+")"+(e.method?" ["+e.method+"]":""), amount:e.amount, in:false, id:e.id, by:e.by}); });
  moves.sort((a,b)=> a.date<b.date?1:-1);
  const tin = moves.filter(m=>m.in).reduce((a,m)=>a+m.amount,0);
  const tout = moves.filter(m=>!m.in).reduce((a,m)=>a+m.amount,0);
  const byMethod = {};
  moves.filter(m=>m.in).forEach(m=>{ const meth=(m.label.match(/\[([^\]]+)\]/)||[])[1]||"Espèces"; byMethod[meth]=(byMethod[meth]||0)+m.amount; });
  const periodActive = cf||ct;
  return `
  <h2>Caisse</h2>
  <div class="cards">
    <div class="card g"><div class="v">${fmt(tin)}</div><div class="l">Encaissé${periodActive?" (période)":""}</div></div>
    <div class="card r"><div class="v">${fmt(tout)}</div><div class="l">Dépensé${periodActive?" (période)":""}</div></div>
    <div class="card ${tin-tout<0?'r':''}"><div class="v">${fmt(tin-tout)}</div><div class="l">Solde${periodActive?" (période)":""}</div></div>
    ${Object.entries(byMethod).map(([m,v])=>`<div class="card"><div class="v" style="font-size:16px">${fmt(v)}</div><div class="l">${esc(m)}</div></div>`).join("")}
  </div>
  ${can("orders_pay")?`<div class="panel"><h3>Encaisser un versement</h3>
    ${payable.length?`<div class="grid2">
      <div><label>Commande concernée</label><select id="v-order">${payable.map(o=>`<option value="${o.id}">${esc(o.num)} — ${esc(clientName(o.clientId))} (reste ${fmt(orderDue(o))})</option>`).join("")}</select></div>
      <div><label>Montant du versement (FCFA)</label><input id="v-amount" type="number" min="1" value="${orderDue(payable[0])}"></div>
      <div><label>Moyen de paiement</label><select id="v-method">${PAY_METHODS.map(m=>`<option>${m}</option>`).join("")}</select></div>
      <div><label>Date</label><input id="v-date" type="date" value="${today()}"></div>
    </div>
    <div class="row" style="margin-top:10px"><button class="btn" id="v-add">Enregistrer le versement</button>
    <span class="muted">Versement partiel accepté (acompte) — le reste dû se met à jour.</span></div>`
    :`<p class="empty">Aucune commande avec un reste à payer.</p>`}
  </div>`:""}
  ${can("cash_expense")?`<div class="panel"><h3>Enregistrer une dépense</h3>
    <div class="grid2">
      <div><label>Libellé</label><input id="e-label" placeholder="Ex. Loyer entrepôt juin"></div>
      <div><label>Catégorie</label><select id="e-cat"><option>Loyer</option><option>Salaires</option><option>Transport / carburant</option><option>Achat marchandise</option><option>Douane / transit</option><option>Marketing</option><option>Administratif</option><option>Autre</option></select></div>
      <div><label>Moyen de paiement</label><select id="e-method">${PAY_METHODS.map(m=>`<option>${m}</option>`).join("")}</select></div>
      <div><label>Montant (FCFA)</label><input id="e-amount" type="number" min="0"></div>
      <div><label>Date</label><input id="e-date" type="date" value="${today()}"></div>
    </div>
    <div class="row" style="margin-top:10px"><button class="btn" id="e-add">Enregistrer la dépense</button></div>
  </div>`:""}
  <div class="panel">
    <div class="row" style="justify-content:space-between;margin-bottom:8px;flex-wrap:wrap;align-items:flex-end">
      <h3 style="margin:0">Brouillard de caisse ${periodActive?`<span class="muted" style="font-size:12px">— du ${cf||"…"} au ${ct||"…"} (${moves.length} mvt)</span>`:`<span class="muted" style="font-size:12px">(${moves.length} mvt)</span>`}</h3>

      </div>
    </div>
  <div class="tablewrap"><table>
    <tr><th>Date</th><th>Libellé</th><th>Par</th><th class="num">Montant</th><th></th></tr>
    ${moves.length? moves.map(x=>`<tr><td>${x.date}</td><td>${esc(x.label)}</td><td class="muted">${esc(x.by||"—")}</td>

  </table></div></div>`;
}

function openModal(html){ modalContent = html; el("modal").innerHTML = `<div class="modalbg" id="modalbg"><div class="modal">${html}</div></div>`;
  el("modalbg").onclick = e=>{ if(e.target.id==="modalbg") closeModal(); }; }
function closeModal(){ modalContent=null; el("modal").innerHTML=""; }

/* ===== Confirmation réutilisable (2e couche au-dessus des modales) ===== */
let _confirmCb = null;
function confirmAction(opts, cb){
  // opts: {title, message, okLabel, danger}
  _confirmCb = cb;
  const o = typeof opts==="string" ? {message:opts} : opts;
  const danger = o.danger;
  el("confirm").innerHTML = `<div class="modalbg" id="confirmbg" style="z-index:120"><div class="modal" style="max-width:400px">
    <h3 style="color:${danger?'var(--rouge)':'var(--bleu)'};margin-bottom:8px">${esc(o.title||"Confirmer l'action")}</h3>
    <p style="color:var(--anthra);line-height:1.5;margin-bottom:18px">${o.message||"Voulez-vous continuer ?"}</p>
    <div class="row" style="justify-content:flex-end;gap:8px">
      <button class="btn ghost" id="cf-no">Annuler</button>
      <button class="btn ${danger?'':'b'}" id="cf-yes" ${danger?'style="background:var(--rouge)"':''}>${esc(o.okLabel||"Confirmer")}</button>
    </div></div></div>`;
  el("cf-no").onclick = ()=>{ el("confirm").innerHTML=""; _confirmCb=null; };
  el("cf-yes").onclick = ()=>{ el("confirm").innerHTML=""; const cb=_confirmCb; _confirmCb=null; if(cb) cb(); };
  el("confirmbg").onclick = e=>{ if(e.target.id==="confirmbg"){ el("confirm").innerHTML=""; _confirmCb=null; } };
}

/* ===== Dialogue d'encaissement (paiement partiel + moyen) ===== */
function payOrderDialog(id){
  if(!can("orders_pay")) return toast("Droit insuffisant");
  const o=S.orders.find(o=>o.id===id); if(!o) return;
  const due = orderDue(o);
  if(due<=0) return toast("Cette commande est déjà soldée");
  el("confirm").innerHTML = `<div class="modalbg" id="paybg" style="z-index:120"><div class="modal" style="max-width:420px">
    <h3 style="color:var(--bleu);margin-bottom:4px">Encaisser un paiement</h3>
    <p class="muted" style="margin-bottom:14px">${esc(o.num)} · ${esc(clientName(o.clientId))} · reste dû <b style="color:var(--terra)">${fmt(due)}</b></p>
    <label>Montant encaissé</label>
    <input id="pay-amt" type="number" min="1" max="${due}" value="${due}" style="width:100%">
    <div class="row" style="gap:6px;margin:8px 0">
      <button class="btn sm ghost" id="pay-full">Solde total (${fmt(due)})</button>
      <button class="btn sm ghost" id="pay-half">Moitié</button>
    </div>
    <label>Moyen de paiement</label>
    <select id="pay-method" style="width:100%">${PAY_METHODS.map(m=>`<option>${m}</option>`).join("")}</select>
    <div class="row" style="justify-content:flex-end;gap:8px;margin-top:18px">
      <button class="btn ghost" id="pay-cancel">Annuler</button>
      <button class="btn b" id="pay-ok">Valider l'encaissement</button>
    </div></div></div>`;
  const close=()=>{ el("confirm").innerHTML=""; };
  el("pay-cancel").onclick=close;
  el("paybg").onclick=e=>{ if(e.target.id==="paybg") close(); };
  el("pay-full").onclick=()=>{ el("pay-amt").value=due; };
  el("pay-half").onclick=()=>{ el("pay-amt").value=Math.round(due/2); };
  el("pay-ok").onclick=async ()=>{
    let amount = Math.min(due, Math.max(0, Math.round(+el("pay-amt").value||0)));
    if(!amount) return toast("Montant invalide");
    const method = el("pay-method").value;
    o.payments.push({id:nid(), date:today(), amount, method, by:me().name});
    refreshStatus(o);
    log("Versement encaissé : "+o.num+" — "+fmt(amount)+" ("+method+")"+(orderDue(o)>0?" — reste "+fmt(orderDue(o)):" — soldée"));
    close(); await save(); render(); toast("Versement de "+fmt(amount)+" enregistré ✓");
  };
}
window.payOrderDialog = payOrderDialog;

/* ================== ACTIONS COMMANDES (réutilisables) ================== */
async function deliverOrder(id){
  if(!can("orders_deliver")) return toast("Droit insuffisant");
  const o=S.orders.find(o=>o.id===id); if(!o) return;
  for(const l of o.lines){ const p=S.products.find(p=>p.id===l.productId);
    if(p && p.stock<l.qty && !confirm("Stock insuffisant sur "+p.name+" ("+p.stock+" dispo, "+l.qty+" demandés). Livrer quand même ?")) return; }
  o.lines.forEach(l=>{ const p=S.products.find(p=>p.id===l.productId); if(p) p.stock=Math.max(0,p.stock-l.qty); });
  o.delivered=true; o.deliveredDate=today(); o.deliveredBy=me().name;
  refreshStatus(o);
  log("Commande livrée : "+o.num);
  // Programme de fidélité : créditer les points au client
  if(S.settings && S.settings.loyaltyEnabled && !o.pointsAwarded){
    const per = S.settings.loyaltyPer||1000, rate = S.settings.loyaltyRate||1;
    const pts = Math.floor(orderTotal(o)/per)*rate;
    if(pts>0){ const c=S.clients.find(c=>c.id===o.clientId); if(c){ c.points=(c.points||0)+pts; o.pointsAwarded=pts; log("Fidélité : +"+pts+" pts à "+c.name); } }
  }
  if(o.payMode==="comptant" && can("orders_pay")){
    o.payments.push({id:nid(), date:today(), amount:orderDue(o), method:"Espèces", by:me().name});
    log("Versement encaissé : "+o.num+" (comptant, soldée)");
    refreshStatus(o); toast("Livrée et encaissée ✓");
  } else { toast("Livrée — en attente d'encaissement"); }
  await save(); render();
}
async function quickPay(id){
  if(!can("orders_pay")) return toast("Droit insuffisant");
  const o=S.orders.find(o=>o.id===id); if(!o) return;
  const due = orderDue(o);
  const v = prompt("Montant du versement pour "+o.num+" (reste dû "+fmt(due)+") :", due);
  if(v===null) return;
  const amount = Math.min(due, Math.max(0, +String(v).replace(/[^\d]/g,"")||0));
  if(!amount) return toast("Montant invalide");
  let method = prompt("Moyen de paiement ? ("+PAY_METHODS.join(", ")+")", "Espèces") || "Espèces";
  if(!PAY_METHODS.includes(method)) method = "Espèces";
  o.payments.push({id:nid(), date:today(), amount, method, by:me().name});
  refreshStatus(o);
  log("Versement encaissé : "+o.num+" — "+fmt(amount)+(orderDue(o)>0?" (reste "+fmt(orderDue(o))+")":" (soldée)"));
  await save(); render(); toast("Versement enregistré ✓");
}

    <p class="muted" style="margin-bottom:10px">Date ${o.date} · ${o.payMode==="credit"?"Crédit"+(o.dueDate?" éch. "+o.dueDate:""):"Comptant"} · Livraison : ${o.delivered?("livrée"+(o.deliveredDate?" le "+o.deliveredDate:"")+(o.deliveredBy?" par "+esc(o.deliveredBy):"")):"non livrée"} ${o.status==="cancelled"?'· <span style="color:var(--rouge)">ANNULÉE'+(o.cancelReason?" ("+esc(o.cancelReason)+")":"")+'</span>':""} ${overdue?'· <span style="color:var(--rouge)">⏰ échue</span>':""}</p>

function openProductDetail(id){
  const p = S.products.find(p=>p.id===id); if(!p) return;
  // ventes de ce produit (commandes livrées non annulées)
  const live = S.orders.filter(o=>o.status!=="cancelled" && o.delivered);
  let qtyVendue=0, caGen=0, margeGen=0;
  const recent=[];
  S.orders.filter(o=>o.status!=="cancelled").sort((a,b)=>b.id-a.id).forEach(o=>{
    const l=o.lines.find(l=>l.productId===id);
    if(l){ if(o.delivered){ qtyVendue+=l.qty; caGen+=l.qty*l.price; margeGen+=l.qty*(l.price-(p.cost||0)); }
      if(recent.length<8) recent.push({o,l}); }

  const marge = p.price-(p.cost||0);
  const margePct = p.price? Math.round(marge/p.price*100):0;
  const stockLow = p.stock<=(p.alert||0);
  const rows = recent.length? recent.map(({o,l})=>`<tr style="cursor:pointer" data-md-order="${o.id}"><td><b>${esc(o.num)}</b></td><td>${o.date}</td><td>${esc(clientName(o.clientId))}</td><td class="num">${l.qty}</td><td class="num">${fmt(l.qty*l.price)}</td></tr>`).join("") : `<tr><td colspan="5" class="empty">Aucune vente.</td></tr>`;

      <div class="card"><div class="v" style="font-size:16px">${fmt(p.price)}</div><div class="l">Prix de vente</div></div>
      <div class="card"><div class="v" style="font-size:16px">${fmt(p.cost||0)}</div><div class="l">Coût d'achat</div></div>
      <div class="card g"><div class="v" style="font-size:16px">${margePct}%</div><div class="l">Marge unitaire</div></div>
    </div>
    <div class="cards" style="margin-bottom:6px">
      <div class="card"><div class="v" style="font-size:16px">${qtyVendue}</div><div class="l">Quantité vendue</div></div>
      <div class="card"><div class="v" style="font-size:16px">${fmt(caGen)}</div><div class="l">CA généré</div></div>
      <div class="card g"><div class="v" style="font-size:16px">${fmt(margeGen)}</div><div class="l">Marge générée</div></div>
      <div class="card"><div class="v" style="font-size:16px">${fmt(p.stock*(p.cost||0))}</div><div class="l">Valeur du stock</div></div>
    </div>
    ${stockLow?`<div class="alertbox">⚠ Stock bas (seuil d'alerte : ${p.alert||0}). Pensez à réapprovisionner.</div>`:""}
    <h4 style="margin:8px 0 4px;color:var(--bleu)">Ventes récentes</h4>
    <div class="tablewrap"><table><tr><th>N°</th><th>Date</th><th>Client</th><th class="num">Qté</th><th class="num">Montant</th></tr>${rows}</table></div>

/* ================== MESSAGERIE (réclamations → conversation) ================== */
function openClaimThread(id){
  const c = webClaims.find(x=>x._id===id); if(!c) return;
  const replies = c.replies||[];
  const thread = `
    <div style="background:#F5F1E8;border-radius:8px;padding:10px;margin:4px 0">
      <div style="font-size:11px;color:#888">${esc(c.author_name||"Client")} · ${(c.created||"").slice(0,16).replace("T"," ")}</div>
      <div style="margin-top:3px">${esc(c.message||"")}</div>
    </div>
    ${replies.map(r=>`<div style="background:${r.from==="DISTRIVIA"?"#0F2A4A":"#F5F1E8"};color:${r.from==="DISTRIVIA"?"#fff":"#1A1A1A"};border-radius:8px;padding:10px;margin:4px 0;${r.from==="DISTRIVIA"?"margin-left:30px":"margin-right:30px"}">
      <div style="font-size:11px;opacity:.8">${esc(r.from)} · ${(r.date||"").slice(0,16).replace("T"," ")}</div>
      <div style="margin-top:3px">${esc(r.text)}</div></div>`).join("")}`;
  openModal(`<div class="row" style="justify-content:space-between"><h3>💬 ${esc(c.author_name||"Client")}</h3><button class="x" onclick="closeModal()">×</button></div>
    <p class="muted">${esc(c.type||"Message")}${c.ref?" · réf. "+esc(c.ref):""} · <span class="badge ${c.status==="resolved"?"paid":"pending"}">${c.status==="resolved"?"Traitée":"Ouverte"}</span></p>
    <div style="max-height:40vh;overflow:auto;margin:10px 0">${thread}</div>
    <label>Votre réponse</label><textarea id="cl-reply" rows="3" placeholder="Écrivez votre réponse au client..."></textarea>
    <div class="row" style="margin-top:10px">
      <button class="btn b" id="cl-send">Envoyer la réponse</button>
      <button class="btn ghost" id="cl-resolve">${c.status==="resolved"?"Rouvrir":"Marquer traitée"}</button>
      <button class="btn ghost" onclick="closeModal()">Fermer</button>
    </div>`);
  const send = el("modal").querySelector("#cl-send");
  if(send) send.onclick = async ()=>{
    const txt = el("cl-reply").value.trim(); if(!txt) return toast("Écrivez une réponse");
    const newReplies = [...(c.replies||[]), { from:"DISTRIVIA", text:txt, date:now(), by:me().name }];
    if(FB.updateDoc) await FB.updateDoc("portal_claims", c._id, { replies:newReplies, status:"answered" });
    c.replies = newReplies; c.status="answered";
    log("Réponse envoyée à "+(c.author_name||"client"));
    toast("Réponse envoyée ✓"); openClaimThread(id);
  };
  const resolve = el("modal").querySelector("#cl-resolve");
  if(resolve) resolve.onclick = async ()=>{
    const ns = c.status==="resolved" ? "pending" : "resolved";
    if(FB.updateDoc) await FB.updateDoc("portal_claims", c._id, { status:ns });
    c.status=ns; toast(ns==="resolved"?"Marquée traitée ✓":"Rouverte"); openClaimThread(id);
  };
}


/* ================== MON PROFIL (changer mot de passe) ================== */
function openProfile(){
  const u = me();
  openModal(`<div class="row" style="justify-content:space-between"><h3>Mon profil — ${esc(u.name)}</h3><button class="x" onclick="closeModal()">×</button></div>
    <p class="muted">Identifiant : <b>${esc(u.login)}</b> · Rôle : ${u.role==="admin"?"Administrateur":"Employé"}</p>
    <label>Mot de passe actuel</label><input id="pf-old" type="password" autocomplete="current-password">
    <label>Nouveau mot de passe</label><input id="pf-new" type="password" autocomplete="new-password">
    <label>Confirmer le nouveau mot de passe</label><input id="pf-new2" type="password" autocomplete="new-password">
    <div class="row" style="margin-top:14px"><button class="btn" id="pf-save">Changer mon mot de passe</button><button class="btn ghost" onclick="closeModal()">Fermer</button></div>`);
  el("pf-save").onclick = async ()=>{
    const old=el("pf-old").value, n1=el("pf-new").value, n2=el("pf-new2").value;
    const h = await sha256(u.salt+old);
    if(h!==u.hash) return toast("Mot de passe actuel incorrect");
    if(n1.length<4) return toast("Nouveau mot de passe : 4 caractères minimum");
    if(n1!==n2) return toast("Les mots de passe ne correspondent pas");
    u.salt = Math.random().toString(36).slice(2,10); u.hash = await sha256(u.salt+n1);
    log("Mot de passe changé (profil)");
    await save(); closeModal(); toast("Mot de passe mis à jour ✓");
  };
}

// Génère un QR code (image data-URL) à partir d'un texte. Vide si la lib n'est pas chargée.
function qrDataURL(text, cell){
  try{
    if(typeof qrcode==="undefined") return "";
    const qr = qrcode(0, "M"); qr.addData(text); qr.make();
    return qr.createDataURL(cell||4, 8);
  }catch(e){ console.warn("QR:", e); return ""; }
}

function frDate(d){ if(!d) return ""; const [y,m,j]=d.split("-"); return j+"/"+m+"/"+y; }
function moisAnnee(d){ if(!d) return ""; const mois=["janvier","février","mars","avril","mai","juin","juillet","août","septembre","octobre","novembre","décembre"]; const [y,m]=d.split("-"); return mois[(+m)-1]+" "+y; }

function dl(filename, blob){ const a=document.createElement("a"); a.href=URL.createObjectURL(blob); a.download=filename; a.click(); }
function toCSV(rows){ return "\uFEFF"+rows.map(r=>r.map(v=>'"'+String(v??"").replace(/"/g,'""')+'"').join(";")).join("\n"); }
function exportData(kind, format, from, to){
  let rows, name;
  const inRange = d => (!from || d>=from) && (!to || d<=to);
  const periodLabel = (from||to) ? (" ("+(from||"…")+" → "+(to||"…")+")") : "";
  if(kind==="orders"){
    rows = [["N°","Date","Client","Téléphone","Produit","Qté","P.U.","Total ligne","Paiement","Échéance","Livrée","Statut","Payé (cmd)","Reste dû (cmd)"]];
    S.orders.filter(o=>inRange(o.date)).forEach(o=>{ const c=S.clients.find(c=>c.id===o.clientId)||{};
      o.lines.forEach((l,i)=> rows.push([o.num,o.date,clientName(o.clientId),c.phone||"",prodName(l.productId),l.qty,l.price,l.qty*l.price,o.payMode,o.dueDate||"",o.delivered?"Oui":"Non",o.status,i===0?orderPaid(o):"",i===0?orderDue(o):""])); });
    name="distrivia-commandes-"+today();
  } else if(kind==="clients"){
    rows = [["Nom","Type","Zone","Téléphone","CA total","Crédit en cours","Nb commandes"]];
    S.clients.forEach(c=>{ const co=S.orders.filter(o=>o.clientId===c.id&&o.status!=="cancelled");
      const ca=co.filter(o=>o.delivered).reduce((a,o)=>a+orderTotal(o),0);
      const cr=co.filter(o=>o.delivered).reduce((a,o)=>a+orderDue(o),0);
      rows.push([c.name,c.type,c.zone,c.phone,ca,cr,co.length]); });
    name="distrivia-clients-"+today();
  } else if(kind==="suppliers"){
    rows = [["Fournisseur","Pays","Contact","Téléphone","Total achats","Nb achats"]];
    S.suppliers.forEach(s=>{ const pu=S.purchases.filter(p=>p.supplierId===s.id);
      rows.push([s.name,s.country||"",s.contact||"",s.phone||"",pu.reduce((a,p)=>a+p.amount,0),pu.length]); });
    name="distrivia-fournisseurs-"+today();
  } else if(kind==="accounting"){
    const E = buildEntries(from,to);
    rows = [["Date","Journal","Pièce","Compte","Intitulé","Libellé","Débit","Crédit"]];
    E.forEach(e=>e.lines.forEach(l=> rows.push([e.date,e.journal,e.num,l.account,accName(l.account),l.label,l.debit||"",l.credit||""])));
    name="distrivia-comptabilite-"+today();
  } else if(kind==="marketing"){
    rows = [["Campagne","Canal","Cible","Début","Fin","Budget","Touchés","Conversions","Taux %","Statut","Note"]];
    S.campaigns.forEach(c=> rows.push([c.name,c.channel,c.target||"",c.start||"",c.end||"",c.budget||0,c.reached||0,c.conversions||0,(c.reached?Math.round((c.conversions||0)/c.reached*100):0),c.status,c.note||""]));
    name="distrivia-marketing-"+today();
  } else if(kind==="hr"){
    rows = [["Nom","Poste","Département","Contrat","Téléphone","Salaire","Congés (j)","Embauche","État"]];
    S.employees.forEach(e=> rows.push([e.name,e.role,e.dept,e.contract,(e.local?e.dial+" "+e.local:""),e.salary||0,e.leave||0,e.hire||"",e.active!==false?"Actif":"Inactif"]));
    name="distrivia-rh-"+today();
  } else { // cash
    rows = [["Date","Type","Libellé","Moyen","Par","Entrée","Sortie"]];
    const moves=[];
    S.orders.forEach(o=>(o.payments||[]).forEach(p=>{ if(inRange(p.date)) moves.push({date:p.date,label:"Versement "+o.num+" — "+clientName(o.clientId),method:p.method||"",by:p.by,in:p.amount,out:0}); }));
    S.expenses.forEach(e=>{ if(inRange(e.date)) moves.push({date:e.date,label:e.label+" ("+e.category+")",method:e.method||"",by:e.by,in:0,out:e.amount}); });
    moves.sort((a,b)=> a.date<b.date?-1:1);
    moves.forEach(m=>rows.push([m.date, m.in?"Encaissement":"Dépense", m.label, m.method, m.by||"", m.in||"", m.out||""]));
    name="distrivia-caisse-"+today();
  }
  const titles = {orders:"Export des commandes",clients:"Base clientèle",suppliers:"Fournisseurs & achats",accounting:"Comptabilité SYSCOHADA",marketing:"Campagnes marketing",hr:"Ressources humaines",cash:"Brouillard de caisse"};
  if(format==="csv"){ dl(name+".csv", new Blob([toCSV(rows)],{type:"text/csv"})); log("Export CSV : "+kind); }
  else if(format==="xlsx"){
    const ws = XLSX.utils.aoa_to_sheet(rows); const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, kind.slice(0,28)); XLSX.writeFile(wb, name+".xlsx"); log("Export Excel : "+kind);
  } else { // pdf
    const { jsPDF } = window.jspdf; const doc = new jsPDF({orientation:"landscape", unit:"mm", format:"a4"});
    doc.setFillColor(15,42,74); doc.rect(0,0,297,16,"F");
    doc.setTextColor(255); doc.setFont("helvetica","bold"); doc.setFontSize(13); doc.text("DISTRIVIA", 12, 11);
    doc.setFontSize(9); doc.setTextColor(200,210,225); doc.text(titles[kind]+periodLabel+" · édité le "+today(), 60, 11);
    let y=24; const head=rows[0]; const body=rows.slice(1);
    const colW = 273/head.length;
    doc.setFontSize(7); doc.setTextColor(255); doc.setFillColor(15,42,74);
    doc.rect(12,y-5,273,6,"F"); head.forEach((h,i)=>doc.text(String(h).slice(0,16), 13+i*colW, y-1));
    doc.setTextColor(30); y+=2;
    body.forEach((r,ri)=>{ if(y>195){ doc.addPage(); y=20; } if(ri%2){ doc.setFillColor(245,241,232); doc.rect(12,y-4,273,5.5,"F"); }
      r.forEach((v,i)=>{ let s=String(v??""); if(!isNaN(v)&&v!==""&&i>=5) s=Number(v).toLocaleString("fr-FR"); doc.text(s.slice(0,22), 13+i*colW, y); }); y+=5.5; });
    doc.save(name+".pdf"); log("Export PDF : "+kind);
  }
  toast("Export "+format.toUpperCase()+" généré ✓");
}

// Génère les écritures à partir des opérations (ventes, encaissements, achats, dépenses)
function buildEntries(from, to){
  const E = []; // {date, journal, num, label, lines:[{account, label, debit, credit}]}
  const inRange = d => (!from || d>=from) && (!to || d<=to);
  // Ventes (à la livraison) : 411 Clients D (TTC) / 701 Ventes C (HT) / 443 TVA facturée C
  S.orders.filter(o=>o.status!=="cancelled" && o.delivered).forEach(o=>{
    if(inRange(o.date)){
      const ttc=orderTotal(o); const tva=orderTVA(o); const ht=ttc-tva;
      const lines=[{account:"411",label:"Client "+clientName(o.clientId),debit:ttc,credit:0},
                   {account:"701",label:"Ventes marchandises",debit:0,credit:ht}];
      if(tva>0) lines.push({account:"443",label:"TVA facturée",debit:0,credit:tva});
      E.push({date:o.date, journal:"VE", num:o.num, label:"Vente "+clientName(o.clientId), lines});
    }
    // Encaissements : 521/571 D / 411 C
    (o.payments||[]).forEach(p=>{ if(inRange(p.date)){
      const acc = (p.method==="Espèces")?"571":"521";
      E.push({date:p.date, journal:acc==="571"?"CA":"BQ", num:o.num+"/P"+p.id, label:"Encaissement "+clientName(o.clientId)+" ("+(p.method||"")+")",
        lines:[{account:acc,label:p.method||"Règlement",debit:p.amount,credit:0},{account:"411",label:"Client "+clientName(o.clientId),debit:0,credit:p.amount}]});
    }});
  });
  // Achats : 601 Achats D (HT) / 445 TVA déductible D / 401 Fournisseurs C (TTC)
  S.purchases.forEach(p=>{ if(inRange(p.date)){ const s=S.suppliers.find(x=>x.id===p.supplierId);
    const tva=purchaseTVA(p); const ht=p.amount-tva;
    const lines=[{account:"601",label:"Achats marchandises",debit:ht,credit:0}];
    if(tva>0) lines.push({account:"445",label:"TVA déductible",debit:tva,credit:0});
    lines.push({account:"401",label:"Fournisseur "+(s?s.name:""),debit:0,credit:p.amount});
    E.push({date:p.date, journal:"AC", num:p.num, label:"Achat "+(s?s.name:""), lines});
  }});
  // Dépenses : 6xx D / 571 Caisse C
  const catAcc = {"Loyer":"622","Salaires":"661","Transport / carburant":"612","Achat marchandise":"601","Douane / transit":"641","Marketing":"627p","Administratif":"646","Autre":"646"};
  S.expenses.forEach(e=>{ if(inRange(e.date)){
    E.push({date:e.date, journal:"CA", num:"DEP"+e.id, label:e.label,
      lines:[{account:catAcc[e.category]||"646",label:e.label,debit:e.amount,credit:0},{account:"571",label:"Caisse",debit:0,credit:e.amount}]});
  }});
  E.sort((a,b)=> a.date<b.date?-1:1);
  return E;
}
function accName(code){ const a=COA.find(c=>c[0]===code); return a?a[1]:code; }

/* ===== Déclaration TVA ===== */
function computeTVA(from, to){
  const inRange = d => (!from || d>=from) && (!to || d<=to);
  let baseHT=0, collectee=0, ventesExo=0, deductible=0, achatsHT=0;
  S.orders.filter(o=>o.status!=="cancelled" && o.delivered && inRange(o.date)).forEach(o=>{
    const tva=orderTVA(o); const ht=orderTotal(o)-tva;
    if(tva>0){ baseHT+=ht; collectee+=tva; } else { ventesExo+=orderTotal(o); }
  });
  S.purchases.filter(p=>inRange(p.date)).forEach(p=>{
    const tva=purchaseTVA(p); deductible+=tva; achatsHT+=p.amount-tva;
  });
  const aPayer = collectee - deductible;
  return { baseHT, collectee, ventesExo, deductible, achatsHT, aPayer };
}

      ${d.ventesExo?`<tr><td>Ventes exonérées / non assujetties</td><td class="num">${fmt(d.ventesExo)}</td><td class="num">—</td></tr>`:""}
      <tr><td>Achats &amp; charges (TVA déductible)</td><td class="num">${fmt(d.achatsHT)}</td><td class="num">${fmt(d.deductible)}</td></tr>

  </div>`;
}

// Agrège les réalisations d'un mois donné ("YYYY-MM")
function monthActuals(mk){
  const inM = d => monthKey(d)===mk;
  const live = S.orders.filter(o=>o.status!=="cancelled" && o.delivered && inM(o.date));
  const ca = live.reduce((a,o)=>a+orderTotal(o),0);
  const marge = live.reduce((a,o)=>a+orderTotal(o)-orderCost(o),0);
  const orders = live.length;
  let encaissement = 0; S.orders.forEach(o=>(o.payments||[]).forEach(p=>{ if(inM(p.date)) encaissement+=p.amount; }));
  const newClients = S.clients.filter(c=>c.created && inM(c.created)).length;
  return { ca, marge, orders, encaissement, newClients };
}
// Liste des mois couverts par la période (ou les 6 derniers si non bornée)
function periodMonths(f, t){
  const months = [];
  let start, end;
  if(f && t){ start = f.slice(0,7); end = t.slice(0,7); }
  else {
    const now = new Date(); end = now.toISOString().slice(0,7);
    const d6 = new Date(now.getFullYear(), now.getMonth()-5, 1); start = d6.toISOString().slice(0,7);
  }
  let [y,m] = start.split("-").map(Number);
  const [ey,em] = end.split("-").map(Number);
  let guard=0;
  while((y<ey || (y===ey && m<=em)) && guard++<60){ months.push(y+"-"+String(m).padStart(2,"0")); m++; if(m>12){m=1;y++;} }
  return months;
}
function varCell(actual, target){
  if(!target) return `<td class="num">${fmt(actual)}</td><td class="num muted">—</td><td class="num muted">—</td>`;
  const gap = actual-target; const pct = Math.round(actual/target*100);
  const col = pct>=100?"var(--vert)":pct>=80?"var(--terra)":"var(--rouge)";
  return `<td class="num">${fmt(actual)}</td><td class="num" style="color:${col}">${gap>=0?"+":""}${fmt(gap)}</td><td class="num"><b style="color:${col}">${pct} %</b></td>`;
}

/* ================== MONITORING — PERFORMANCE ÉQUIPE ================== */
// Calcule les performances par utilisateur (acteur) sur une période
function monitorStats(f, t){
  const inR = d => (!f||d>=f) && (!t||(d||"").slice(0,10)<=t);
  const stats = {}; // name -> {created, createdAmount, delivered, deliveredAmount, collected, ordersPaid}
  const ensure = n => stats[n] = stats[n] || {created:0, createdAmount:0, delivered:0, deliveredAmount:0, collected:0};
  S.orders.forEach(o=>{
    if(o.status==="cancelled") return;
    if(o.createdBy && inR(o.date)){ const s=ensure(o.createdBy); s.created++; s.createdAmount+=orderTotal(o); }
    if(o.delivered && o.deliveredBy && inR(o.deliveredDate||o.date)){ const s=ensure(o.deliveredBy); s.delivered++; s.deliveredAmount+=orderTotal(o); }
    (o.payments||[]).forEach(p=>{ if(p.by && inR(p.date)){ const s=ensure(p.by); s.collected+=p.amount; } });
  });
  return stats;
}
function vMonitoring(){
  const f=monitorPeriod.from, t=monitorPeriod.to;
  const stats = monitorStats(f,t);
  const names = Object.keys(stats).sort((a,b)=>stats[b].collected-stats[a].collected);
  // objectifs individuels mensuels : S.objectives.team[name] = {ca, collected, orders}
  const teamObj = (S.objectives && S.objectives.team) || {};
  const totals = names.reduce((a,n)=>{const s=stats[n];a.created+=s.created;a.createdAmount+=s.createdAmount;a.delivered+=s.delivered;a.collected+=s.collected;return a;},{created:0,createdAmount:0,delivered:0,collected:0});
  // liste des acteurs possibles = utilisateurs + employés (pour fixer objectifs)
  const actors = [...new Set([...S.users.map(u=>u.name), ...names])];
  return `

  <div class="cards">
    <div class="card"><div class="v">${names.length}</div><div class="l">Collaborateurs actifs</div></div>

    <div class="card t"><div class="v">${fmt(totals.collected)}</div><div class="l">Total encaissé (équipe)</div></div>
  </div>

  <div class="panel"><h3>Performance par collaborateur</h3><div class="tablewrap"><table>
    <tr><th>Collaborateur</th><th class="num">Cmd créées</th><th class="num">Montant créé</th><th class="num">Cmd livrées</th><th class="num">Encaissé</th><th class="num">Objectif encaissé</th><th class="num">Atteinte</th></tr>
    ${names.length?names.map(n=>{
      const s=stats[n]; const ob=teamObj[n]||{};
      const goal=+ob.collected||0;
      const pct=goal?Math.round(s.collected/goal*100):0;

      return `<tr><td><b>${esc(n)}</b></td><td class="num">${s.created}</td><td class="num">${fmt(s.createdAmount)}</td>

    <div class="grid2">

  const ee = editEmployeeId ? S.employees.find(e=>e.id===editEmployeeId) : null;
  const active = S.employees.filter(e=>e.active!==false);
  const masseSalariale = active.reduce((a,e)=>a+(e.salary||0),0);
  const byDept={}; active.forEach(e=>{ const d=e.dept||"Autre"; byDept[d]=(byDept[d]||0)+1; });
  return `
  <h2>Ressources humaines</h2>
  <div class="cards">
    <div class="card"><div class="v">${active.length}</div><div class="l">Employés actifs</div></div>
    <div class="card t"><div class="v">${fmt(masseSalariale)}</div><div class="l">Masse salariale mensuelle</div></div>
    <div class="card"><div class="v">${Object.keys(byDept).length}</div><div class="l">Départements</div></div>
    <div class="card"><div class="v">${active.length?fmt(Math.round(masseSalariale/active.length)):"—"}</div><div class="l">Salaire moyen</div></div>
  </div>
  ${can("hr")?`<div class="panel"><h3>${ee?"Modifier l'employé":"Nouvel employé"}</h3>
    <div class="grid2">
      <div><label>Nom complet</label><input id="hr-name" value="${ee?esc(ee.name):""}" placeholder="Ex. Awa Sow"></div>
      <div><label>Poste</label><input id="hr-role" value="${ee?esc(ee.role):""}" placeholder="Ex. Commercial terrain"></div>
      <div><label>Département</label><select id="hr-dept">${HR_DEPARTMENTS.map(d=>`<option ${ee&&ee.dept===d?"selected":""}>${d}</option>`).join("")}</select></div>
      <div><label>Type de contrat</label><select id="hr-contract">${HR_CONTRACTS.map(c=>`<option ${ee&&ee.contract===c?"selected":""}>${c}</option>`).join("")}</select></div>
      <div><label>Code pays</label><select id="hr-dial">${COUNTRY_CODES.map(([code,lbl])=>`<option value="${code}" ${ee&&ee.dial===code?"selected":(!ee&&code==="+221"?"selected":"")}>${lbl} (${code})</option>`).join("")}</select></div>
      <div><label>Téléphone</label><input id="hr-local" value="${ee?esc(ee.local||""):""}" placeholder="77 ..." inputmode="numeric"></div>
      <div><label>Salaire mensuel net (FCFA)</label><input id="hr-salary" type="number" min="0" value="${ee?ee.salary:""}" placeholder="150000"></div>
      <div><label>Date d'embauche</label><input id="hr-hire" type="date" value="${ee?ee.hire:today()}"></div>
      <div><label>Congés acquis (jours)</label><input id="hr-leave" type="number" min="0" value="${ee?ee.leave:"0"}"></div>
    </div>
    <div class="row" style="margin-top:10px"><button class="btn" id="hr-save">${ee?"Enregistrer":"Ajouter l'employé"}</button>${ee?'<button class="btn ghost" id="hr-cancel">Annuler</button>':""}</div>
  </div>`:""}
  <div class="panel"><div class="row" style="justify-content:space-between;margin-bottom:8px"><h3 style="margin:0">Effectif (${S.employees.length})</h3>
    <div class="row"><button class="btn sm b" id="exp-hr-xlsx">Excel</button><button class="btn sm ghost" id="exp-hr-csv">CSV</button><button class="btn sm ghost" id="exp-hr-pdf">PDF</button></div></div>
    <div class="tablewrap"><table>
    <tr><th>Nom</th><th>Poste</th><th>Département</th><th>Contrat</th><th>Téléphone</th><th class="num">Salaire</th><th class="num">Congés</th><th>État</th>${can("hr")?"<th></th>":""}</tr>
    ${S.employees.length?[...S.employees].sort((a,b)=>b.id-a.id).map(e=>{
      const ph = e.local?(e.dial+" "+e.local):"—";
      return `<tr><td><b>${esc(e.name)}</b></td><td>${esc(e.role)}</td><td class="muted">${esc(e.dept)}</td><td>${esc(e.contract)}</td>
      <td>${esc(ph)}</td><td class="num">${fmt(e.salary||0)}</td><td class="num">${e.leave||0} j</td>
      <td>${e.active!==false?'<span class="badge ok">Actif</span>':'<span class="badge off">Inactif</span>'}</td>
      ${can("hr")?`<td class="row"><button class="btn sm ghost" data-hredit="${e.id}">Modifier</button><button class="btn sm ghost" data-hrtoggle="${e.id}">${e.active!==false?"Désactiver":"Activer"}</button><button class="del" data-hrdel="${e.id}">✕</button></td>`:""}</tr>`;
    }).join(""):`<tr><td colspan="9" class="empty">Aucun employé enregistré.</td></tr>`}
  </table></div></div>
  <div class="grid2">
    <div class="panel"><h3>Effectif par département</h3><canvas id="hr-dept" height="160"></canvas></div>
    <div class="panel"><h3>Charges de personnel</h3>
      <table><tr><td>Masse salariale mensuelle</td><td class="num"><b>${fmt(masseSalariale)}</b></td></tr>
      <tr><td>Projection annuelle (×12)</td><td class="num">${fmt(masseSalariale*12)}</td></tr>
      <tr><td>Effectif actif</td><td class="num">${active.length}</td></tr></table>
      <p class="muted" style="margin-top:8px">La masse salariale alimente le compte 661 (charges de personnel) lorsqu'elle est saisie en dépense de caisse.</p>
    </div>
  </div>`;
}
function drawHRCharts(){
  if(typeof Chart==="undefined") return;
  const byDept={}; S.employees.filter(e=>e.active!==false).forEach(e=>{ const d=e.dept||"Autre"; byDept[d]=(byDept[d]||0)+1; });
  const ctx=el("hr-dept"); if(ctx&&Object.keys(byDept).length) new Chart(ctx,{type:"bar",data:{labels:Object.keys(byDept),datasets:[{label:"Employés",data:Object.values(byDept),backgroundColor:"#0F2A4A"}]},options:{indexAxis:"y",...chartOpts()}});
}

/* ================== RENDU ================== */
function render(){
  const root = el("root");
  if (!S.users.length) { root.innerHTML = vSetup(); bindSetup(); return; }
  if (!session || !me()) { root.innerHTML = vLogin(); bindLogin(); return; }
  const views = {dash:vDash, weborders:vWebOrders, messages:vMessages, orders:vOrders, invoices:vInvoices, clients:vClients, products:vProducts, suppliers:vSuppliers, logistics:vLogistics, cash:vCash, accounting:vAccounting, control:vControl, marketing:vMarketing, hr:vHR, monitoring:vMonitoring, users:vUsers, backup:vBackup};
  const guard = {weborders:"orders_create", cash:"cash_view", suppliers:"suppliers", accounting:"accounting", control:"control", logistics:"logistics", marketing:"marketing", hr:"hr", monitoring:"monitoring"};
  if (guard[tab] && !can(guard[tab])) tab="dash";
  if ((tab==="users"||tab==="backup") && !isAdmin()) tab = "dash";
  root.innerHTML = chrome(views[tab]());
  bindApp();
  if (tab==="dash") setTimeout(drawCharts, 30);
  if (tab==="control") setTimeout(drawControlCharts, 30);
  if (tab==="marketing") setTimeout(drawMarketingCharts, 30);
  if (tab==="hr") setTimeout(drawHRCharts, 30);
  if (tab==="monitoring") setTimeout(drawMonitoringCharts, 30);
  if (tab==="messages") setTimeout(bindMessages, 20);
  if (tab==="invoices") setTimeout(bindInvoices, 20);
  setTimeout(refreshWebBadge, 20);
}

/* ================== BINDINGS ================== */
function bindSetup(){
  el("su-go").onclick = async ()=>{
    const name = el("su-name").value.trim(), login = el("su-login").value.trim().toLowerCase();
    const p1 = el("su-pass").value, p2 = el("su-pass2").value;
    if(!name||!login) return toast("Nom et identifiant requis");
    if(p1.length<4) return toast("Mot de passe : 4 caractères minimum");
    if(p1!==p2) return toast("Les mots de passe ne correspondent pas");
    const salt = Math.random().toString(36).slice(2,10);
    S.users.push({ id:nid(), name, login, salt, hash:await sha256(salt+p1), role:"admin", perms:{}, active:true });
    session = { userId:S.users[0].id };
    log("Compte administrateur créé");
    await save(); await saveSession(); render(); toast("Bienvenue, "+name+" ✓");
  };
}
function bindLogin(){
  const go = async ()=>{
    const login = el("lg-login").value.trim().toLowerCase(), pass = el("lg-pass").value;
    const u = S.users.find(u=>u.login===login);
    if(!u) return toast("Identifiant inconnu");
    if(u.active===false) return toast("Compte désactivé — voir l'administrateur");
    const h = await sha256(u.salt+pass);
    if(h!==u.hash) return toast("Mot de passe incorrect");
    session = { userId:u.id };
    log("Connexion");
    await save(); await saveSession(); tab="dash"; render(); toast("Bonjour "+u.name+" 👋");
  };
  el("lg-go").onclick = go;
  el("lg-pass").onkeydown = e=>{ if(e.key==="Enter") go(); };
}

function bindApp(){
  document.querySelectorAll("nav button").forEach(b=> b.onclick = ()=>{ tab=b.dataset.tab; searchQ=""; render(); });
  el("logout").onclick = async ()=>{ log("Déconnexion"); await save(); session=null; await saveSession(); render(); };
  const mp = el("myprofile"); if(mp) mp.onclick = openProfile;
  // Cartes KPI cliquables → navigation directe
  document.querySelectorAll("[data-gotab]").forEach(c=> c.onclick = ()=>{ const t=c.dataset.gotab; if(can(t)||["dash","orders","clients","products"].includes(t)){ tab=t; searchQ=""; render(); } });

  // ===== Commandes web (portail) =====
  document.querySelectorAll("[data-webaccept]").forEach(b=> b.onclick = async ()=>{
    const wo = webOrders.find(o=>o._id===b.dataset.webaccept); if(!wo) return;
    if(!confirm("Accepter la commande "+wo.ref+" de "+(wo.client_name||"")+" ?\n\nUn client et une commande seront créés dans DISTRIVIA Gestion.")) return;
    // 1) trouver ou créer le client (par email ou nom)
    let cli = S.clients.find(c=> (wo.client_email && c.email && c.email.toLowerCase()===String(wo.client_email).toLowerCase()) || c.name===wo.client_name );
    if(!cli){
      cli = { id:nid(), matricule:nextMatricule(), name:wo.client_name||"Client web", type:"Boutique / revendeur", zone:wo.zone||"", dial:"+221", local:"", phone:"", email:(wo.client_email||""), points:0, created:today() };
      S.clients.push(cli);
    }
    // 2) créer la commande (prix repris du catalogue produits si trouvé, sinon 0 à compléter)
    const lines = (wo.items||[]).map(it=>{
      const prod = S.products.find(p=>p.name===it.name);
      return { name:it.name, qty:it.qty||1, price: prod?prod.price:0, productId: prod?prod.id:null };
    });
    const num = "CMD-" + String(S.orderSeq++).padStart(4,"0");
    S.orders.push({ id:nid(), num, date:today(), clientId:cli.id, payMode:"comptant", dueDate:null,
      lines, status:"pending", delivered:false, payments:[], createdBy:(me().name+" (web)"),
      webRef:wo.ref, note:wo.note||"" });
    log("Commande web acceptée : "+wo.ref+" → "+num);
    await save();
    // 3) marquer la commande web comme confirmée
    if(FB.updateDoc) await FB.updateDoc("portal_orders", wo._id, { status:"confirmed", localNum:num });
    toast("Commande "+num+" créée ✓ — complétez les prix si besoin");
    tab="orders"; render();
  });
  document.querySelectorAll("[data-webreject]").forEach(b=> b.onclick = async ()=>{
    const wo = webOrders.find(o=>o._id===b.dataset.webreject); if(!wo) return;
    if(!confirm("Refuser la commande "+wo.ref+" ?")) return;
    if(FB.updateDoc) await FB.updateDoc("portal_orders", wo._id, { status:"cancelled" });
    toast("Commande web refusée");
  });
  document.querySelectorAll("[data-webappt]").forEach(b=> b.onclick = async ()=>{
    if(FB.updateDoc) await FB.updateDoc("portal_appointments", b.dataset.webappt, { status:"confirmed" });
    toast("Rendez-vous confirmé ✓");
  });
  document.querySelectorAll("[data-webquote]").forEach(b=> b.onclick = async ()=>{
    if(FB.updateDoc) await FB.updateDoc("portal_quotes", b.dataset.webquote, { status:"resolved" });
    toast("Cotation marquée vue ✓");
  });

  // Recherche globale (en-tête, style NetSuite)
  const gs = el("globalsearch");
  const gsr = el("hsearch-results");
  if(gs && gsr){
    const renderDrop = ()=>{
      searchQ = gs.value;
      if(searchQ.trim().length>=2){ gsr.innerHTML = globalSearchHTML(); gsr.classList.add("show"); bindSearchItems(); }
      else { gsr.innerHTML = ""; gsr.classList.remove("show"); }
    };
    gs.oninput = renderDrop;
    gs.onfocus = ()=>{ if(searchQ.trim().length>=2){ gsr.classList.add("show"); } };
    // fermer en cliquant ailleurs
    document.addEventListener("click", e=>{
      if(!e.target.closest(".hsearch")){ gsr.classList.remove("show"); }
    });
    if(searchQ.trim().length>=2) bindSearchItems();
  }

  // Produits
  // aperçu de la photo au moment de l'ajout
  let pendingImg = null;
  const pImg = el("p-img");
  if(pImg) pImg.onchange = async (e)=>{
    const f=e.target.files[0]; if(!f) return;
    try{ pendingImg = await compressImage(f, 500, .72);
      el("p-img-preview").innerHTML = `<img src="${pendingImg}" style="width:90px;height:90px;object-fit:cover;border-radius:10px;border:1px solid #eee">`;
    }catch(err){ toast("Image trop lourde ou invalide"); pendingImg=null; }
  };
  const pAdd = el("p-add");
  if(pAdd) pAdd.onclick = async ()=>{
    const name = el("p-name").value.trim(); if(!name) return toast("Nom du produit requis");
    S.products.push({ id:nid(), name, family:el("p-fam").value, cost:+el("p-cost").value||0, price:+el("p-price").value||0, stock:+el("p-stock").value||0, alert:+el("p-alert").value||0, img:pendingImg||null });
    log("Produit créé : "+name);
    await save(); render(); toast("Produit ajouté ✓");
  };
  // changer/ajouter une photo sur un produit existant
  document.querySelectorAll("[data-pimg]").forEach(b=> b.onclick = ()=>{
    const id=+b.dataset.pimg;
    const inp=document.createElement("input"); inp.type="file"; inp.accept="image/*";
    inp.onchange=async (e)=>{ const f=e.target.files[0]; if(!f) return;
      try{ const img=await compressImage(f,500,.72); const p=S.products.find(p=>p.id===id); p.img=img; log("Photo mise à jour : "+p.name); await save(); render(); toast("Photo enregistrée ✓"); }
      catch(err){ toast("Image invalide"); } };
    inp.click();
  });
  document.querySelectorAll("[data-rcv]").forEach(b=> b.onclick = async ()=>{
    const id=+b.dataset.rcv, q=+el("rcv-"+id).value;
    if(!q||q<1) return toast("Indiquez la quantité reçue");
    const p=S.products.find(p=>p.id===id); p.stock+=q;
    log("Réception stock : +"+q+" "+p.name);
    await save(); render(); toast("+"+q+" en stock ✓");
  });
  document.querySelectorAll("[data-delp]").forEach(b=> b.onclick = async ()=>{
    const id=+b.dataset.delp;
    if(S.orders.some(o=>o.lines.some(l=>l.productId===id))) return toast("Produit utilisé dans des commandes — suppression bloquée");
    if(!confirm("Supprimer ce produit ?")) return;
    const p=S.products.find(p=>p.id===id);
    S.products = S.products.filter(p=>p.id!==id);
    log("Produit supprimé : "+(p?p.name:id));
    await save(); render();
  });

  // Clients
  const cAdd = el("c-add");
  if(cAdd) cAdd.onclick = async ()=>{
    const name = el("c-name").value.trim(); if(!name) return toast("Nom du client requis");
    const dial = el("c-dial").value;
    const local = normPhone(dial, el("c-local").value);
    if(!local) return toast("Le numéro de téléphone est obligatoire");
    if(phoneExists(dial, local, editClientId)) return toast("⚠ Ce numéro de téléphone existe déjà pour un autre client");
    if(editClientId){
      const c = S.clients.find(c=>c.id===editClientId);
      c.name=name; c.type=el("c-type").value; c.zone=el("c-zone").value.trim(); c.dial=dial; c.local=local; c.phone=dial+" "+local;
      log("Client modifié : "+name); editClientId=null;
      await save(); render(); toast("Client mis à jour ✓");
    } else {
      S.clients.push({ id:nid(), matricule:nextMatricule(), name, type:el("c-type").value, zone:el("c-zone").value.trim(), dial, local, phone:dial+" "+local, points:0, created:today() });
      log("Client créé : "+name);
      await save(); render(); toast("Client ajouté ✓");
    }
  };
  const cCancel = el("c-cancel"); if(cCancel) cCancel.onclick = ()=>{ editClientId=null; render(); };
  document.querySelectorAll("[data-cedit]").forEach(b=> b.onclick = ()=>{ editClientId=+b.dataset.cedit; tab="clients"; render(); });
  document.querySelectorAll("[data-delc]").forEach(b=> b.onclick = async ()=>{
    const id=+b.dataset.delc;
    if(S.orders.some(o=>o.clientId===id)) return toast("Client avec commandes — suppression bloquée");
    const c=S.clients.find(c=>c.id===id);
    confirmAction({title:"Supprimer le client", message:`Supprimer définitivement <b>${esc(c?c.name:"")}</b> ? Cette action est irréversible.`, okLabel:"Supprimer", danger:true}, async ()=>{
      S.clients = S.clients.filter(c=>c.id!==id);
      log("Client supprimé : "+(c?c.name:id));
      await save(); render(); toast("Client supprimé");
    });
  });

  // Commande — brouillon
  if(el("o-client")){
    el("o-client").onchange = e=>{ draft.clientId=+e.target.value; };
    el("o-date").onchange = e=>{ draft.date=e.target.value; };
    el("o-pay").onchange = e=>{ draft.payMode=e.target.value; const w=el("o-due-wrap"); if(w) w.style.display = e.target.value==="credit"?"":"none"; };
    const oDue = el("o-due"); if(oDue) oDue.onchange = e=>{ draft.dueDate=e.target.value; };
    const oTva = el("o-tva"); if(oTva) oTva.onchange = e=>{ draft.tvaApplicable = e.target.value==="1"; };
    el("o-addline").onclick = ()=>{ const p=S.products[0]; draft.lines.push({productId:p.id, qty:1, price:p.price}); render(); };
    document.querySelectorAll("[data-lprod]").forEach(s=> s.onchange = e=>{
      const i=+s.dataset.lprod, pid=+e.target.value, p=S.products.find(p=>p.id===pid);
      draft.lines[i].productId=pid; draft.lines[i].price=p.price; render();
    });
    document.querySelectorAll("[data-lqty]").forEach(inp=> inp.onchange = ()=>{ draft.lines[+inp.dataset.lqty].qty=Math.max(1,+inp.value||1); render(); });
    document.querySelectorAll("[data-lprice]").forEach(inp=> inp.onchange = ()=>{ draft.lines[+inp.dataset.lprice].price=Math.max(0,+inp.value||0); render(); });
    document.querySelectorAll("[data-lrm]").forEach(b=> b.onclick = ()=>{ draft.lines.splice(+b.dataset.lrm,1); render(); });
    el("o-save").onclick = async ()=>{
      if(!draft.lines.length) return;
      // Validation échéance crédit (max 3 mois)
      let dueDate = null;
      if(draft.payMode==="credit"){
        dueDate = draft.dueDate || "";
        const max = new Date(); max.setMonth(max.getMonth()+3); const maxStr = max.toISOString().slice(0,10);
        if(!dueDate) return toast("Indiquez l'échéance de paiement (max 3 mois)");
        if(dueDate > maxStr) return toast("L'échéance ne peut pas dépasser 3 mois");
      }
      if(editOrder){
        const o = S.orders.find(o=>o.id===editOrder.id);
        // Si déjà livrée : réajuster le stock (remettre l'ancien, retirer le nouveau)
        if(o.delivered){
          o.lines.forEach(l=>{ const p=S.products.find(p=>p.id===l.productId); if(p) p.stock+=l.qty; });
          draft.lines.forEach(l=>{ const p=S.products.find(p=>p.id===l.productId); if(p) p.stock=Math.max(0,p.stock-l.qty); });
        }
        o.clientId=draft.clientId; o.date=draft.date; o.payMode=draft.payMode; o.lines=draft.lines; o.dueDate=dueDate;
        o.tvaApplicable = draft.tvaApplicable!==false;
        refreshStatus(o);
        log("Commande modifiée : "+o.num);
        editOrder=null; draft=null; await save(); render(); toast("Commande "+o.num+" modifiée ✓");
      } else {
        const num = "CMD-" + String(S.orderSeq++).padStart(4,"0");
        S.orders.push({ id:nid(), num, date:draft.date, clientId:draft.clientId, payMode:draft.payMode, dueDate, lines:draft.lines, status:"pending", delivered:false, payments:[], createdBy:me().name, tvaApplicable: draft.tvaApplicable!==false });
        log("Commande créée : "+num+" — "+clientName(draft.clientId)+" ("+fmt(draft.lines.reduce((a,l)=>a+l.qty*l.price,0))+")");
        draft=null; await save(); render(); toast("Commande "+num+" enregistrée ✓");
      }
    };
  }
  const oCancelEdit = el("o-canceledit"); if(oCancelEdit) oCancelEdit.onclick = ()=>{ editOrder=null; draft=null; render(); };

  // Modifier une commande
  document.querySelectorAll("[data-oedit]").forEach(b=> b.onclick = ()=>{ startEditOrder(+b.dataset.oedit); });
  // Annuler une commande
  document.querySelectorAll("[data-ocancel]").forEach(b=> b.onclick = async ()=>{
    if(!can("orders_cancel")) return toast("Droit insuffisant");
    const o=S.orders.find(o=>o.id===+b.dataset.ocancel);
    const reason = prompt("Motif de l'annulation de "+o.num+" :", "erreur de saisie");
    if(reason===null) return;
    if(orderPaid(o)>0 && !confirm("Cette commande a reçu "+fmt(orderPaid(o))+" de versements. Annuler quand même ? (les versements resteront tracés)")) return;
    // Si livrée, on remet le stock
    if(o.delivered){ o.lines.forEach(l=>{ const p=S.products.find(p=>p.id===l.productId); if(p) p.stock+=l.qty; }); }
    o.status="cancelled"; o.delivered=false; o.cancelReason=reason; o.cancelledBy=me().name; o.cancelledAt=now();
    log("Commande ANNULÉE : "+o.num+" — "+reason);
    await save(); render(); toast("Commande "+o.num+" annulée");
  });
  // Reçu de commande
  document.querySelectorAll("[data-oreceipt]").forEach(b=> b.onclick = ()=>{
    const o=S.orders.find(o=>o.id===+b.dataset.oreceipt);
    openModal(`<div class="row" style="justify-content:space-between"><h3>Reçu — ${esc(o.num)}</h3><button class="x" onclick="closeModal()">×</button></div>
      <div style="border:1px solid #eee;border-radius:8px;padding:10px;max-height:55vh;overflow:auto">${orderReceiptHTML(o)}</div>
      <div class="row" style="margin-top:12px"><button class="btn" id="rc-print">Imprimer / PDF</button><button class="btn ghost" onclick="closeModal()">Fermer</button></div>`);
    el("rc-print").onclick = ()=> printHTML(orderReceiptHTML(o));
  });
  // Ouvrir le détail (clic sur n° de commande)
  document.querySelectorAll("[data-odetail]").forEach(b=> b.onclick = ()=> openOrderDetail(+b.dataset.odetail));
  document.querySelectorAll("[data-cdetail]").forEach(b=> b.onclick = ()=> openClientDetail(+b.dataset.cdetail));
  document.querySelectorAll("[data-sdetail]").forEach(b=> b.onclick = ()=> openSupplierDetail(+b.dataset.sdetail));
